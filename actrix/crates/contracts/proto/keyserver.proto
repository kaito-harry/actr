syntax = "proto2";

package ks.v1;

// Import NonceCredential from admin common definitions
import "common.proto";

// Key Server 服务定义
// 负责生成和管理 Ed25519 签名密钥，私钥永不离开 KS
service KeyServer {
  // 生成新的 Ed25519 签名密钥对，返回 key_id 和验证公钥
  rpc GenerateSigningKey(GenerateSigningKeyRequest) returns (GenerateSigningKeyResponse);

  // 使用指定密钥对消息进行 Ed25519 签名
  rpc Sign(SignRequest) returns (SignResponse);

  // 获取指定 key_id 的验证公钥（verifying key）
  rpc GetVerifyingKey(GetVerifyingKeyRequest) returns (GetVerifyingKeyResponse);

  // 健康检查
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// ============================================================================
// 生成签名密钥相关消息
// ============================================================================

message GenerateSigningKeyRequest {
  // nonce-auth 认证凭证
  required admin.v1.NonceCredential credential = 1;
}

message GenerateSigningKeyResponse {
  // 生成的密钥 ID
  required uint32 key_id = 1;

  // 验证公钥（Base64 编码的 Ed25519 verifying key，32 字节）
  required string verifying_key = 2;

  // 密钥过期时间（Unix 时间戳，秒）
  required uint64 expires_at = 3;

  // 容忍期（秒）
  required uint64 tolerance_seconds = 4;
}

// ============================================================================
// 签名相关消息
// ============================================================================

message SignRequest {
  // 要使用的密钥 ID
  required uint32 key_id = 1;

  // 待签名的消息（原始字节）
  required bytes message = 2;

  // nonce-auth 认证凭证
  required admin.v1.NonceCredential credential = 3;
}

message SignResponse {
  // Ed25519 签名（64 字节）
  required bytes signature = 1;
}

// ============================================================================
// 获取验证公钥相关消息
// ============================================================================

message GetVerifyingKeyRequest {
  // 要查询的密钥 ID
  required uint32 key_id = 1;

  // nonce-auth 认证凭证
  required admin.v1.NonceCredential credential = 2;
}

message GetVerifyingKeyResponse {
  // 密钥 ID
  required uint32 key_id = 1;

  // 验证公钥（Base64 编码的 Ed25519 verifying key，32 字节）
  required string verifying_key = 2;

  // 密钥过期时间（Unix 时间戳，秒）
  required uint64 expires_at = 3;

  // 容忍期（秒）
  required uint64 tolerance_seconds = 4;
}

// ============================================================================
// 健康检查相关消息
// ============================================================================

message HealthCheckRequest {
  // nonce-auth 认证凭证
  required admin.v1.NonceCredential credential = 1;
}

message HealthCheckResponse {
  // 服务状态
  required string status = 1;

  // 服务名称
  required string service = 2;

  // 存储后端名称
  required string backend = 3;

  // 当前密钥数量
  required uint32 key_count = 4;

  // 当前时间戳（Unix 时间戳，秒）
  required uint64 timestamp = 5;
}

# Actrix Configuration Example
#
# Service enable bitmask (binary representation):
#   xxxxx
#   ││││└─ Signaling (00001 = 1)
#   │││└── STUN      (00010 = 2)
#   ││└─── TURN      (00100 = 4)
#   │└──── AIS       (01000 = 8)
#   └───── KS        (10000 = 16)
#
# All services are controlled by this bitmask. No individual enabled fields are needed.
#
# Examples:
#   31 (0b11111) = All services (1+2+4+8+16)
#   22 (0b10110) = KS + TURN + STUN (16+4+2)
#   6  (0b00110) = TURN + STUN (4+2)
#   4  (0b00100) = TURN only
#   2  (0b00010) = STUN only
#   1  (0b00001) = Signaling only
#   8  (0b01000) = AIS only
#   16 (0b10000) = KS only
enable = 22

# Instance identifier (used for monitoring and tracing)
name = "actrix-01"

# Environment: dev/prod/test
# - dev: allows HTTP, relaxed security
# - prod: enforces HTTPS, strict security
# - test: for automated testing
env = "dev"

# SQLite database storage directory path
# Main database file will be stored as {sqlite_path}/actrix.db
sqlite_path = "database"

# Geographic location tag (for multi-region deployment monitoring)
# Format: cloud-provider,region,zone
# Examples: "aws,us-west-2,zone-a", "aliyun,beijing,zone-b"
location_tag = "local,dev,default"

# Shared PSK for inter-service authentication
# IMPORTANT: Change this in production!
# Generate a strong key: openssl rand -hex 32
actrix_shared_key = "example-key-please-replace-with-secure-random-value-32chars+"

# Recording pipeline (logging + tracing)
[recording]
# Global sink — default for all channels. Per-channel sink overrides below.
# Supported URI schemes: file://, otlp+http://, otlp+grpc://
# If omitted, output goes to stderr.
# sink = "file:///var/log/actrix/actrix.log"
service_name = "actrix"

# Each channel has its own semantic filter and optional sink override.
# RUST_LOG env var overrides all per-channel filters (pass-all mode).

[recording.observability]
# Resolution: off / digest / detailed / full
filter = "digest"
# sink = "file:///var/log/actrix/observability.log"

[recording.audit]
# Scope: off / mutations / all
filter = "mutations"         # only write actions (create/update/delete/rotate)
# sink = "otlp+http://127.0.0.1:4318/v1/logs"

[recording.security]
# Severity: off / critical / high / medium / all
filter = "all"               # security events should not be missed
# sink = "otlp+grpc://127.0.0.1:4317"

[recording.operations]
# Detail: off / lifecycle / detailed
filter = "lifecycle"         # start/stop, deploy, reload
# sink = "file:///var/log/actrix/operations.log"

# ============================================================================
# Monitoring Endpoints (/health, /metrics)
# ============================================================================
# Two auth methods, usable independently or together (OR logic):
#   1. IP whitelist — CIDR notation (bare IP implies /32 or /128)
#   2. HTTP Basic Auth — htpasswd file (each line: user:password)
# When both are configured, matching either allows access.
# When neither is configured (default), endpoints are publicly accessible.
#
# Per-service overrides completely replace global config for that service.
[monitoring]
# allowed_ips = ["127.0.0.1/32", "10.0.0.0/8", "::1/128"]
# htpasswd_file = "/etc/actrix/monitoring.htpasswd"

# Per-service override example:
# [monitoring.services.ks]
# allowed_ips = ["192.168.1.0/24"]
# htpasswd_file = ""  # disable Basic Auth for KS endpoints

# Process management (optional)
# pid = "/var/run/actrix.pid"  # (optional)
# user = "actrix"  # (optional) Drop privileges to this user after binding ports
# group = "actrix"  # (optional) Drop privileges to this group

# ============================================================================
# Network Binding Configuration
# ============================================================================

[bind]
# HTTP/HTTPS binding (unified)
# Configure cert + key to enable HTTPS, otherwise plain HTTP
[bind.http]
domain_name = "localhost"
advertised_ip = "127.0.0.1"
ip = "::"
port = 8080
# advertised_port = 8080  # (optional, defaults to port)
# TLS — uncomment to enable HTTPS:
# cert = "certificates/server.crt"
# key = "certificates/server.key"

# ICE services (STUN/TURN)
[bind.ice]
ip = "0.0.0.0"
port = 3478
# Advertised public IP (must be routable)
# Replace with your actual public IP
advertised_ip = "203.0.113.10"
# Advertised port (usually same as bind port)
advertised_port = 3478

# ============================================================================
# TURN Configuration
# ============================================================================
[turn]
# Relay port range for TURN data channels
# Format: start-end (e.g., "49152-65535")
# Larger range = more concurrent relay sessions
relay_port_range = "49152-65535"

# TURN realm
realm = "actrix.example.com"

# ============================================================================
# Service Configuration (optional)
# ============================================================================
# All HTTP services share the instance-level HTTP/HTTPS port (bind.http/bind.https)
#
# Key Server (KS) Configuration (optional)
# Service enablement is controlled by the bitmask (enable field)
# Set ENABLE_KS bit (16) in the enable field to enable this service
[services.ks]

[services.ks.storage]
backend = "sqlite"
key_ttl_seconds = 3600

[services.ks.storage.sqlite]
path = "ks.db"

[services.signer]
tolerance_seconds = 3600

[services.signer.storage]
backend = "sqlite"
key_ttl_seconds = 3600

[services.signer.storage.sqlite]

# AIS (Actor Identity Service) Configuration (optional)
# Service enablement is controlled by the bitmask (enable field)
# Set ENABLE_AIS bit (8) in the enable field to enable this service
[services.ais]

[services.ais.server]
# signaling_heartbeat_interval_secs = 30  # (optional, default: 30)
# token_ttl_secs = 3600  # (optional, default: 3600)

# AIS automatically uses local KS if enabled, or configure explicitly (optional):
# [services.ais.dependencies.ks]
# endpoint = "http://remote-ks:8080"  # gRPC endpoint（复用该实例主端口）

# MFR (Manufacturer Registry) Configuration (optional)
# Controls publish nonce retention for audit / replay investigation.
[services.mfr]
# How long to retain expired/used publish nonces, in seconds.
# Default: 86400 (24 hours)
# nonce_retain_secs = 86400

# Signaling Service Configuration (optional)
# Service enablement is controlled by the bitmask (enable field)
# Set ENABLE_SIGNALING bit (1) in the enable field to enable this service
[services.signaling]

[services.signaling.server]
ws_path = "/signaling"

# Rate limiting configuration (optional, all have defaults)
# [services.signaling.server.rate_limit.connection]
# enabled = true  # (optional, default: true)
# per_minute = 5  # (optional, default: 5)
# burst_size = 10  # (optional, default: 10)
# max_concurrent_per_ip = 100  # (optional, default: 100)
#
# [services.signaling.server.rate_limit.message]
# enabled = true  # (optional, default: true)
# per_second = 10  # (optional, default: 10)
# burst_size = 50  # (optional, default: 50)

# Signaling dependencies (optional, auto-discovered if local services enabled)
# [services.signaling.dependencies.ks]
# endpoint = "http://remote-ks:8080"  # (optional, gRPC endpoint)
#
# [services.signaling.dependencies.ais]
# endpoint = "http://remote-ais:8080"  # (optional)

# ============================================================================
# Control Plane (always enabled, shared with main HTTP port)
# ============================================================================
[control]
# Control endpoints are enabled independently via [control.admin_ui].enabled
# and [control.grpc_api].enabled; both may run simultaneously on the shared
# HTTP port.
#
# Legacy override: set `head` to force a single endpoint and disable the other
# (mutually exclusive). Omit it (recommended) to control each endpoint with its
# own `enabled` flag.
#   head = "admin_ui"   # admin_ui on, grpc_api off
#   head = "grpc_api"   # grpc_api on, admin_ui off

[control.admin_ui]
# Enable the local web console under /admin (default: true).
enabled = true
# Login password for Admin UI (required when admin_ui is enabled, min 8 chars).
password = "changeme"
# JWT session expiry in seconds (default: 86400 = 24h)
session_expiry_secs = 86400

[control.grpc_api]
# Enable the supervisor-facing NodeAdminService gRPC API under
# /admin.v1.NodeAdminService/* (default: false). When enabled, the node is
# considered superv-managed: realms are pushed by superv and local realm
# writes (create/update/rotate/delete) through the Admin UI are disabled.
enabled = false
node_id = "actrix-node-01"
node_name = "actrix-edge-01"
# Shared secret (hex, >= 64 chars) used to sign mutable control-plane ops.
# Required when grpc_api is enabled.
shared_secret = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
max_clock_skew_secs = 300

# ============================================================================
# Production Configuration Example
# ============================================================================
# This section demonstrates a production-ready configuration.
# Copy and modify these settings for production deployment.
#
# Key differences from development:
# - env = "prod"
# - recording.sink = "file:///var/log/actrix/actrix.log"
# - HTTPS with valid certificates
# - Real public IP for TURN
# - optional per-channel sink override for OTLP
# - Strong actrix_shared_key
#
# Example production config:
#
# enable = 22
# name = "actrix-prod-01"
# env = "prod"
# [recording]
# sink = "file:///var/log/actrix/actrix.log"
# service_name = "actrix-prod-01"
# [recording.audit]
# filter = "all"
# sink = "otlp+grpc://otel-collector.internal:4317"
# [recording.security]
# filter = "all"
# 
# sqlite_path = "/var/lib/actrix"
# location_tag = "aws,us-west-2,zone-a"
# actrix_shared_key = "REPLACE_WITH_STRONG_RANDOM_KEY_MINIMUM_32_CHARS"
# pid = "/var/run/actrix.pid"
# user = "actrix"
# group = "actrix"
#
# [bind.http]
# domain_name = "actrix.example.com"
# advertised_ip = "203.0.113.10"
# ip = "::"
# port = 443
# cert = "/etc/actrix/tls/fullchain.pem"
# key = "/etc/actrix/tls/privkey.pem"
#
# [bind.ice]
# ip = "0.0.0.0"
# port = 3478
# advertised_ip = "203.0.113.10"  # Your actual public IP
# advertised_port = 3478
#
# [turn]
# relay_port_range = "49152-65535"
# realm = "actrix.example.com"

# ACL (Access Control List) Configuration
[acl]
# Enable ACL enforcement for Presence, Discovery, and Relay
# When enabled, ACL checks are performed for:
# - Presence notifications (ActrUpEvent)
# - Service discovery (DiscoveryRequest)
# - WebRTC relay (ActrRelay)
enabled = true

# Default policy when no ACL rule exists
# - "deny": Deny discovery/relay if no ACL rule found (recommended, secure by default)
# - "allow": Allow discovery/relay if no ACL rule found (insecure, use only for testing)
default_policy = "deny"

# Note: ACL rules are stored in SQLite database (actoracl table)
# Example rules (inserted via SQL or application API):
# INSERT INTO actoracl (realm_id, from_type, to_type, access) VALUES (1, 'user', 'service', 1);
# INSERT INTO actoracl (realm_id, from_type, to_type, access) VALUES (1, 'anonymous', 'admin', 0);

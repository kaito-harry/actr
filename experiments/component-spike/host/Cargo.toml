[package]
name = "spike-host"
version = "0.1.0"
edition = "2021"
publish = false

# Mark as an independent workspace so the repo-root workspace does not absorb this crate.
[workspace]

[dependencies]
# wasmtime pinned to 43.0.1 (the version the spike was validated against).
wasmtime = { version = "=43.0.1", features = ["component-model", "runtime", "cranelift"] }
wasmtime-wasi = "=43.0.1"
anyhow = "1"

[profile.release]
opt-level = 3

name: Notify Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  notify-merge:
    name: Notify WeChat on PR Merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Send WeChat Work notification
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO: ${{ github.repository }}
        run: |
          SAFE_TITLE=$(echo "$PR_TITLE" | sed 's/<[^>]*>//g')
          CONTENT=$(printf '<font color="warning">New PR merged to main branch</font>\n> Project: <font color="comment">%s</font>\n> Issue Author: <font color="comment">%s</font>\n> Issue: <font color="comment">[#%s](%s)</font>\n> Title: <font color="comment">%s</font>\n> MR: <font color="comment">%s</font>' \
            "$REPO" "$PR_AUTHOR" "$PR_NUMBER" "$PR_URL" "$SAFE_TITLE" "$PR_URL")
          jq -n --arg content "$CONTENT" '{msgtype: "markdown", markdown: {content: $content}}' > /tmp/payload.json
          curl -s --fail -X POST "$WECHAT_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d @/tmp/payload.json
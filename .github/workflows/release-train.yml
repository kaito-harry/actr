name: Release Train (Basic)

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable semver shared by the monorepo-managed release train.
        required: true
        type: string
      dry_run:
        description: Validate the full flow without publishing.
        required: true
        type: boolean
        default: false
      skip_python:
        description: Skip Python package validation and publishing.
        required: true
        type: boolean
        default: false
      pre_release:
        description: Publish as a pre-release (npm tag "pre", allows pre-release semver).
        required: true
        type: boolean
        default: false

concurrency:
  group: release-train-basic
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  PROTOC_VERSION: "29.3"

jobs:
  release:
    name: Run basic release train
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      PACKAGE_SYNC_GITHUB_TOKEN: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Switch to local release branch
        run: |
          git switch "${{ github.ref_name }}" || git switch -c "${{ github.ref_name }}" "origin/${{ github.ref_name }}"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@actrium"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Run release train
        run: |
          args=(--version "${{ inputs.version }}")
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "${{ inputs.skip_python }}" == "true" ]]; then
            args+=(--skip-python)
          fi
          if [[ "${{ inputs.pre_release }}" == "true" ]]; then
            args+=(--pre-release)
          fi
          args+=(--branch "${{ github.ref_name }}")
          scripts/release-train.sh "${args[@]}"

      - name: Upload release reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: basic-release-train-report-${{ inputs.version }}
          path: release/reports/release-train-v${{ inputs.version }}.*
          if-no-files-found: error

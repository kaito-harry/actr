name: Release Train (Staged)

on:
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "core/**/Cargo.toml"
      - "cli/Cargo.toml"
      - "testing/**/Cargo.toml"
      - "tools/protoc-gen/**/Cargo.toml"
      - "tools/protoc-gen/**/pyproject.toml"
      - "bindings/web/Cargo.toml"
      - "bindings/web/crates/**/Cargo.toml"
      - "bindings/web/packages/**/package.json"
      - "bindings/typescript/Cargo.toml"
      - "bindings/typescript/package.json"
  workflow_dispatch:
    inputs:
      version:
        description: Stable semver (optional; auto-detected from workspace Cargo.toml if omitted).
        required: false
        type: string
      dry_run:
        description: Validate without publishing.
        required: false
        type: boolean
        default: false
      skip_python:
        description: Skip Python package validation and publishing.
        required: false
        type: boolean
        default: false
      pre_release:
        description: Publish as a pre-release.
        required: false
        type: boolean
        default: false

concurrency:
  group: release-train-staged
  cancel-in-progress: false

permissions:
  actions: read
  contents: write
  id-token: write

env:
  PROTOC_VERSION: "29.3"

jobs:
  # ── Gate ──────────────────────────────────────────────────────────────
  gate:
    name: Gate on release commit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      release_sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Check if head commit is a release merge
        id: check
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$HEAD_COMMIT_MESSAGE" | grep -qE '^chore\(release\): basic train v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout release commit
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'push' && github.sha || 'main' }}

      - name: Resolve release SHA
        if: steps.check.outputs.should_run == 'true'
        id: release
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Wait for CI Gate
        if: steps.check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
        run: |
          deadline=$((SECONDS + 2400))
          while (( SECONDS < deadline )); do
            run_info=$(
              gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/ci-gate.yml/runs" \
                -f "head_sha=${RELEASE_SHA}" \
                -f event=push \
                -f per_page=20 \
                --jq '.workflow_runs | sort_by(.created_at) | last | select(. != null) | [.id, .status, (.conclusion // "")] | @tsv'
            )

            if [[ -z "$run_info" ]]; then
              echo "Waiting for CI Gate run for ${RELEASE_SHA}"
              sleep 15
              continue
            fi

            IFS=$'\t' read -r run_id status conclusion <<<"$run_info"
            echo "CI Gate run ${run_id}: status=${status}, conclusion=${conclusion:-pending}"
            if [[ "$status" == "completed" ]]; then
              if [[ "$conclusion" == "success" ]]; then
                exit 0
              fi
              echo "CI Gate did not succeed for ${RELEASE_SHA}: ${conclusion}" >&2
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for CI Gate run for ${RELEASE_SHA}" >&2
          exit 1

  # ── Context ───────────────────────────────────────────────────────────
  context:
    name: Resolve release context
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
      pre_release: ${{ steps.resolve.outputs.pre_release }}
      skip_python: ${{ steps.resolve.outputs.skip_python }}
      release_sha: ${{ needs.gate.outputs.release_sha }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Resolve version and flags
        id: resolve
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            ver="${{ inputs.version }}"
          else
            ver=$(python3 -c "import tomllib;from pathlib import Path;d=tomllib.loads(Path('Cargo.toml').read_text());print(d['workspace']['package']['version'])")
          fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${{ inputs.dry_run || 'false' }}" >> "$GITHUB_OUTPUT"
          echo "pre_release=${{ inputs.pre_release || 'false' }}" >> "$GITHUB_OUTPUT"
          echo "skip_python=${{ inputs.skip_python || 'false' }}" >> "$GITHUB_OUTPUT"

  # ── Create Tag ────────────────────────────────────────────────────────
  create-tag:
    name: Create release tag
    needs:
      - context
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Verify release commit
        env:
          EXPECTED_RELEASE_SHA: ${{ needs.context.outputs.release_sha }}
        run: |
          actual_sha=$(git rev-parse HEAD)
          if [[ "$actual_sha" != "$EXPECTED_RELEASE_SHA" ]]; then
            echo "main moved after CI Gate: expected ${EXPECTED_RELEASE_SHA}, got ${actual_sha}" >&2
            exit 1
          fi

      - name: Run create-tag stage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=(--stage create-tag --branch main --version "${{ needs.context.outputs.version }}")
          if [[ "${{ needs.context.outputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "${{ needs.context.outputs.skip_python }}" == "true" ]]; then
            args+=(--skip-python)
          fi
          if [[ "${{ needs.context.outputs.pre_release }}" == "true" ]]; then
            args+=(--pre-release)
          fi
          scripts/release-train.sh "${args[@]}"

      - name: Upload create-tag artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: create-tag-artifacts
          path: release/reports/release-train-v${{ needs.context.outputs.version }}.*
          if-no-files-found: warn

  # ── Publish Rust ──────────────────────────────────────────────────────
  publish-rust:
    name: Publish Rust crates
    needs:
      - context
      - create-tag
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Download create-tag artifacts
        uses: actions/download-artifact@v4
        with:
          name: create-tag-artifacts
          path: release/reports

      - name: Run publish-rust stage
        run: |
          args=(--stage publish-rust --branch main --version "${{ needs.context.outputs.version }}")
          if [[ "${{ needs.context.outputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "${{ needs.context.outputs.skip_python }}" == "true" ]]; then
            args+=(--skip-python)
          fi
          if [[ "${{ needs.context.outputs.pre_release }}" == "true" ]]; then
            args+=(--pre-release)
          fi
          scripts/release-train.sh "${args[@]}"

      - name: Upload publish-rust artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-rust-artifacts
          path: release/reports/release-train-v${{ needs.context.outputs.version }}.publish-rust.state.tsv
          if-no-files-found: warn

  # ── Publish Python ────────────────────────────────────────────────────
  publish-python:
    name: Publish Python package
    needs:
      - context
      - create-tag
    runs-on: ubuntu-latest
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download create-tag artifacts
        uses: actions/download-artifact@v4
        with:
          name: create-tag-artifacts
          path: release/reports

      - name: Run publish-python stage
        run: |
          args=(--stage publish-python --branch main --version "${{ needs.context.outputs.version }}")
          if [[ "${{ needs.context.outputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "${{ needs.context.outputs.skip_python }}" == "true" ]]; then
            args+=(--skip-python)
          fi
          if [[ "${{ needs.context.outputs.pre_release }}" == "true" ]]; then
            args+=(--pre-release)
          fi
          scripts/release-train.sh "${args[@]}"

      - name: Upload publish-python artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-python-artifacts
          path: release/reports/release-train-v${{ needs.context.outputs.version }}.publish-python.state.tsv
          if-no-files-found: warn

  # ── Publish Swift ─────────────────────────────────────────────────────
  publish-swift:
    name: Publish Swift package
    needs:
      - context
      - create-tag
    runs-on: ubuntu-latest
    env:
      PACKAGE_SYNC_GITHUB_TOKEN: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Download create-tag artifacts
        uses: actions/download-artifact@v4
        with:
          name: create-tag-artifacts
          path: release/reports

      - name: Run publish-swift stage
        run: |
          args=(--stage publish-swift --branch main --version "${{ needs.context.outputs.version }}")
          if [[ "${{ needs.context.outputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "${{ needs.context.outputs.skip_python }}" == "true" ]]; then
            args+=(--skip-python)
          fi
          if [[ "${{ needs.context.outputs.pre_release }}" == "true" ]]; then
            args+=(--pre-release)
          fi
          scripts/release-train.sh "${args[@]}"

      - name: Upload publish-swift artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-swift-artifacts
          path: release/reports/release-train-v${{ needs.context.outputs.version }}.publish-swift.state.tsv
          if-no-files-found: warn

  # ── Publish Kotlin ────────────────────────────────────────────────────
  publish-kotlin:
    name: Publish Kotlin package
    needs:
      - context
      - create-tag
    runs-on: ubuntu-latest
    env:
      PACKAGE_SYNC_GITHUB_TOKEN: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Download create-tag artifacts
        uses: actions/download-artifact@v4
        with:
          name: create-tag-artifacts
          path: release/reports

      - name: Run publish-kotlin stage
        run: |
          args=(--stage publish-kotlin --branch main --version "${{ needs.context.outputs.version }}")
          if [[ "${{ needs.context.outputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "${{ needs.context.outputs.skip_python }}" == "true" ]]; then
            args+=(--skip-python)
          fi
          if [[ "${{ needs.context.outputs.pre_release }}" == "true" ]]; then
            args+=(--pre-release)
          fi
          scripts/release-train.sh "${args[@]}"

      - name: Upload publish-kotlin artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-kotlin-artifacts
          path: release/reports/release-train-v${{ needs.context.outputs.version }}.publish-kotlin.state.tsv
          if-no-files-found: warn

  # ── Publish Web ───────────────────────────────────────────────────────
  publish-web:
    name: Publish Web npm packages
    needs:
      - context
      - create-tag
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@actrium"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Download create-tag artifacts
        uses: actions/download-artifact@v4
        with:
          name: create-tag-artifacts
          path: release/reports

      - name: Run publish-web stage
        run: |
          args=(--stage publish-web --branch main --version "${{ needs.context.outputs.version }}")
          if [[ "${{ needs.context.outputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "${{ needs.context.outputs.skip_python }}" == "true" ]]; then
            args+=(--skip-python)
          fi
          if [[ "${{ needs.context.outputs.pre_release }}" == "true" ]]; then
            args+=(--pre-release)
          fi
          scripts/release-train.sh "${args[@]}"

      - name: Upload publish-web artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-web-artifacts
          path: release/reports/release-train-v${{ needs.context.outputs.version }}.publish-web.state.tsv
          if-no-files-found: warn

  # ── Build TypeScript Native ───────────────────────────────────────────
  build-typescript-native:
    name: Build TS native (${{ matrix.target }})
    needs:
      - context
      - create-tag
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: bindings/typescript
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15-intel
            artifact: actr.darwin-x64.node
            build_args: ""
            use_zig: false
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: actr.darwin-arm64.node
            build_args: ""
            use_zig: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: actr.linux-x64-gnu.node
            build_args: ""
            use_zig: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: actr.linux-x64-musl.node
            build_args: "--cross-compile"
            use_zig: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: actr.linux-arm64-gnu.node
            build_args: "--cross-compile"
            use_zig: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: actr.linux-arm64-musl.node
            build_args: "--cross-compile"
            use_zig: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: actr.win32-x64-msvc.node
            build_args: ""
            use_zig: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: bindings/typescript/package.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Setup Zig
        if: ${{ matrix.use_zig }}
        uses: mlugg/setup-zig@v2

      - name: Install dependencies
        run: npm install

      - name: Build native package
        shell: bash
        run: npx napi build --platform --target ${{ matrix.target }} --release --output-dir artifacts ${{ matrix.build_args }}

      - name: Verify native artifact
        shell: bash
        run: |
          ls -la artifacts
          test -f "artifacts/${{ matrix.artifact }}"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bindings/typescript/artifacts/${{ matrix.artifact }}
          if-no-files-found: error

  # ── Publish TypeScript Workload ───────────────────────────────────────
  publish-typescript-workload:
    name: Publish @actrium/actr-workload
    needs:
      - context
      - create-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@actrium"

      - name: Download create-tag artifacts
        uses: actions/download-artifact@v4
        with:
          name: create-tag-artifacts
          path: release/reports

      - name: Run publish-typescript-workload stage
        run: |
          args=(--stage publish-typescript-workload --branch main --version "${{ needs.context.outputs.version }}")
          if [[ "${{ needs.context.outputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "${{ needs.context.outputs.skip_python }}" == "true" ]]; then
            args+=(--skip-python)
          fi
          if [[ "${{ needs.context.outputs.pre_release }}" == "true" ]]; then
            args+=(--pre-release)
          fi
          scripts/release-train.sh "${args[@]}"

      - name: Upload publish-typescript-workload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-typescript-workload-artifacts
          path: release/reports/release-train-v${{ needs.context.outputs.version }}.publish-typescript-workload.state.tsv
          if-no-files-found: warn

  # ── Publish TypeScript ────────────────────────────────────────────────
  publish-typescript:
    name: Publish @actrium/actr
    needs:
      - context
      - build-typescript-native
      - publish-typescript-workload
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: bindings/typescript/package.json
          registry-url: "https://registry.npmjs.org"
          scope: "@actrium"

      - name: Show Node.js and npm versions
        run: |
          node -v
          npm -v

      - name: Download create-tag artifacts
        uses: actions/download-artifact@v4
        with:
          name: create-tag-artifacts
          path: release/reports


      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: actr.*.node
          path: bindings/typescript/artifacts
          merge-multiple: true

      - name: Run publish-typescript stage
        run: |
          args=(--stage publish-typescript --branch main --version "${{ needs.context.outputs.version }}")
          if [[ "${{ needs.context.outputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "${{ needs.context.outputs.skip_python }}" == "true" ]]; then
            args+=(--skip-python)
          fi
          if [[ "${{ needs.context.outputs.pre_release }}" == "true" ]]; then
            args+=(--pre-release)
          fi
          scripts/release-train.sh "${args[@]}"

      - name: Upload publish-typescript artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-typescript-artifacts
          path: release/reports/release-train-v${{ needs.context.outputs.version }}.publish-typescript.state.tsv
          if-no-files-found: warn

  # ── Collect Report ────────────────────────────────────────────────────
  collect-report:
    name: Collect release report
    if: always()
    needs:
      - context
      - create-tag
      - publish-rust
      - publish-python
      - publish-swift
      - publish-kotlin
      - publish-web
      - build-typescript-native
      - publish-typescript-workload
      - publish-typescript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Download all stage artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/reports
          merge-multiple: true

      - name: Resolve report version
        id: report_version
        run: |
          ver="${{ needs.context.outputs.version }}"
          echo "value=${ver}" >> "$GITHUB_OUTPUT"

      - name: Run report stage
        run: |
          args=(--stage report --version "${{ needs.context.outputs.version }}")
          if [[ "${{ needs.context.outputs.skip_python }}" == "true" ]]; then
            args+=(--skip-python)
          fi
          if [[ "${{ needs.context.outputs.pre_release }}" == "true" ]]; then
            args+=(--pre-release)
          fi
          scripts/release-train.sh "${args[@]}"

      - name: Upload consolidated release report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-train-report-${{ steps.report_version.outputs.value }}
          path: |
            release/reports/release-train-v${{ steps.report_version.outputs.value }}.state.tsv
            release/reports/release-train-v${{ steps.report_version.outputs.value }}.md
            release/reports/release-train-v${{ steps.report_version.outputs.value }}.json
          if-no-files-found: warn

  # ── Notify WeChat ─────────────────────────────────────────────────────
  notify-wechat:
    name: Notify WeChat
    needs:
      - context
      - collect-report
    runs-on: ubuntu-latest
    if: always()
    env:
      RELEASE_WEBHOOK_URL: ${{ secrets.RELEASE_WEBHOOK_URL }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Download consolidated report
        uses: actions/download-artifact@v4
        with:
          name: release-train-report-${{ needs.context.outputs.version }}
          path: release/reports

      - name: Run notify-wechat stage
        run: |
          args=(--stage notify-wechat --version "${{ needs.context.outputs.version }}")
          if [[ "${{ needs.context.outputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "${{ needs.context.outputs.pre_release }}" == "true" ]]; then
            args+=(--pre-release)
          fi
          scripts/release-train.sh "${args[@]}"

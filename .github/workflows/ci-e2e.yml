          key: spm-${{ runner.os }}-${{ hashFiles('e2e/swift-datastream-app/project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,aarch64-apple-ios,aarch64-apple-ios-sim
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install macOS e2e dependencies
        run: |
          brew install xcodegen jq sqlite libssh2 pkg-config
          brew link libssh2
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Cache uniffi-bindgen binary
        id: cache-uniffi
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/uniffi-bindgen*
          key: uniffi-bindgen-0.31.1-${{ runner.os }}-${{ runner.arch }}
      - name: Install UniFFI bindgen
        if: steps.cache-uniffi.outputs.cache-hit != 'true'
        run: cargo install --locked uniffi --version 0.31.1 --features cli --bin uniffi-bindgen
      - name: Build local Swift XCFramework (iOS + macOS)
        working-directory: bindings/swift
        env:
          ACTR_BUILD_PROFILE: debug
          ACTR_XCFRAMEWORK_TARGETS: all
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          ACTR_BINDINGS_PATH=dist/ActrBindings \
          ACTR_BINARY_PATH=dist/ActrFFI.xcframework \
          ./build-xcframework.sh
          echo "ACTR_BINARY_PATH=dist/ActrFFI.xcframework" >> "$GITHUB_ENV"
          echo "ACTR_BINDINGS_PATH=dist/ActrBindings" >> "$GITHUB_ENV"
      - name: Run Swift DataStreamApp e2e
        env:
          CAPTURE_DIAGNOSTICS_ON_SUCCESS: "1"
        run: bash e2e/swift-datastream-app/run.sh
      - name: Upload sanitized diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-datastream-app-e2e-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e/swift-datastream-app/.tmp/sanitized-logs/
          retention-days: 7
          if-no-files-found: warn
      - name: Upload Swift DataStreamApp debug symbols
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-datastream-app-e2e-symbols-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e/swift-datastream-app/.tmp/symbols/
          retention-days: 7
          if-no-files-found: warn

  swift-ts-workload-e2e:
    name: Swift TS Workload E2E
    runs-on: macos-latest
    timeout-minutes: 240
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('e2e/swift-ts-workload/manifest.toml') }}
          restore-keys: |
            spm-${{ runner.os }}-
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2,wasm32-unknown-unknown,aarch64-apple-ios,aarch64-apple-ios-sim
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install macOS e2e dependencies
        run: |
          brew install xcodegen jq sqlite libssh2 pkg-config
          brew link libssh2
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - name: Install wasm Component Model toolchain
        run: |
          cargo install wasm-component-ld --version 0.5.22 --locked
          cargo install wasm-tools --version 1.247.0 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Cache uniffi-bindgen binary
        id: cache-uniffi
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/uniffi-bindgen*
          key: uniffi-bindgen-0.31.1-${{ runner.os }}-${{ runner.arch }}
      - name: Install UniFFI bindgen
        if: steps.cache-uniffi.outputs.cache-hit != 'true'
        run: cargo install --locked uniffi --version 0.31.1 --features cli --bin uniffi-bindgen
      - name: Build local Swift XCFramework (iOS + macOS)
        working-directory: bindings/swift
        env:
          ACTR_BUILD_PROFILE: debug
          ACTR_XCFRAMEWORK_TARGETS: all
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          ACTR_BINDINGS_PATH=dist/ActrBindings \
          ACTR_BINARY_PATH=dist/ActrFFI.xcframework \
          ./build-xcframework.sh
          echo "ACTR_BINARY_PATH=dist/ActrFFI.xcframework" >> "$GITHUB_ENV"
          echo "ACTR_BINDINGS_PATH=dist/ActrBindings" >> "$GITHUB_ENV"
      - name: Run Swift TS Workload e2e
        env:
          CAPTURE_DIAGNOSTICS_ON_SUCCESS: "1"
        run: bash e2e/swift-ts-workload/run.sh
      - name: Upload sanitized diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-ts-workload-e2e-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e/swift-ts-workload/.tmp/sanitized-logs/
          retention-days: 7
          if-no-files-found: warn
      - name: Upload Swift TS Workload debug symbols
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-ts-workload-e2e-symbols-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e/swift-ts-workload/.tmp/symbols/
          retention-days: 7
          if-no-files-found: warn

  python-web-e2e:
    name: Python Web E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm Component Model toolchain
        run: |
          cargo install wasm-component-ld --version 0.5.22 --locked
          cargo install wasm-tools --version 1.247.0 --locked
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux test deps
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome*
          sudo apt-get update
          sudo apt-get install -y lsof netcat-openbsd
          google-chrome --version || google-chrome-stable --version || true
      - name: Install web binding root deps (puppeteer)
        working-directory: bindings/web
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Pre-build actr CLI (release)
        run: cargo build --locked --release -p actr-cli --bin actr --features wasm-engine
      - name: Run generated Python echo browser e2e
        working-directory: bindings/web/examples/echo
        env:
          ACTR_CMD: ${{ github.workspace }}/target/release/actr
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
          PYTHON_SERVER_READY_ATTEMPTS: "1200"
          PYTHON_ECHO_MESSAGE: hello-from-actr-web
        run: bash start-python-mock.sh

  kotlin-echo-app-e2e:
    name: Kotlin EchoApp E2E
    # Kotlin/Android mirror of swift-echo-app. Builds the native .so fresh (the
    # .so files are gitignored), publishes the AAR to mavenLocal, bootstraps a
    # local actrix + Rust EchoService, scaffolds a Kotlin client (linked mode),
    # and verifies via `./gradlew connectedDebugAndroidTest` on an x86_64 emulator.
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Enable KVM (emulator hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0777", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,aarch64-linux-android,x86_64-linux-android
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653'
      - name: Install Linux e2e dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq sqlite3 lsof perl
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - name: Install uniffi-bindgen
        run: cargo install uniffi --version 0.31.1 --locked --features cli --bin uniffi-bindgen
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Build Android native lib (x86_64) + publish AAR to mavenLocal
        env:
          ACTR_ANDROID_TARGETS: x86_64-linux-android
          ACTR_COPY_DEMO_JNILIBS: "false"
        run: |
          bash bindings/kotlin/build-android.sh
          cd bindings/kotlin && ./gradlew :actr-kotlin:publishToMavenLocal --no-daemon
      - name: Run Kotlin EchoApp e2e (emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: default
          profile: pixel_6_pro
          sdcard-path-or-size: 512M
          disk-size: 1536M
          ram-size: 4096M
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: bash e2e/kotlin-echo-app/run.sh
      - name: Upload sanitized diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-echo-app-e2e-logs-${{ github.run_id }}-${{ github.run_attempt }}

name: CI (E2E)

on:
  schedule:
    # GitHub Actions cron uses UTC. 18:00 UTC = 02:00 UTC+8 next day.
    - cron: "0 18 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PROTOC_VERSION: "29.3"

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-runtime-echo-e2e:
    name: Package Runtime Echo E2E
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install Linux e2e dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome*
          sudo apt-get update
          sudo apt-get install -y jq sqlite3 lsof perl
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Run package runtime echo e2e
        run: bash e2e/package-runtime-echo/run.sh

  # The standalone Rust echo e2e (`cargo test --test e2e_rust_echo`) was
  # superseded by `package-runtime-echo` once the Rust service template moved
  # to the cdylib + `actr run` packaging model. The dedicated job has been
  # removed; equivalent coverage now lives in the `package-runtime-echo-e2e`
  # job above.

  polyglot-echo-e2e:
    name: Polyglot Echo E2E
    # Server-form matrix against an in-tree EchoService: three server forms
    # (cdylib-rust / linked-rust / wasm-rust) driven by the Rust client, plus
    # the Rust server-stream + bidi DataStream scenarios. Runs entirely against
    # the in-tree mock-actrix. One job runs the whole matrix sequentially so the
    # slow setup (mock-actrix + actr CLI + service build) is amortised across
    # every scenario.
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Install Linux e2e dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq lsof
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm Component Model toolchain
        run: |
          cargo install wasm-component-ld --version 0.5.22 --locked
          cargo install wasm-tools --version 1.247.0 --locked
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
        with:
          # Distinct from package-runtime-echo's cache: the polyglot scenario
          # uses its own CARGO_TARGET_DIR tree under target/e2e-cache/polyglot-echo/.
          key: polyglot-echo-e2e
          workspaces: |
            . -> target/e2e-cache/polyglot-echo/actr-cli
            . -> target/e2e-cache/polyglot-echo/mock-actrix
            . -> target/e2e-cache/polyglot-echo/service-build
            . -> target/e2e-cache/polyglot-echo/driver-rust
            . -> target/e2e-cache/polyglot-echo/linked-rust
            . -> target/e2e-cache/polyglot-echo/wasm-rust
            . -> target/e2e-cache/polyglot-echo/stream-server
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      # ── server forms (Rust client, echo scenario) ──────────────────────────
      - name: Run polyglot-echo (--server cdylib-rust --client rust)
        run: bash e2e/polyglot-echo/run.sh --server cdylib-rust --client rust polyglot-ci-cdylib
      - name: Run polyglot-echo (--server linked-rust --client rust)
        run: bash e2e/polyglot-echo/run.sh --server linked-rust --client rust polyglot-ci-linked
      - name: Run polyglot-echo (--server wasm-rust --client rust)
        # The wasm-rust first call occasionally hits a transient startup timeout.
        # Retry once, but surface attempt 1's exit code so a real regression is
        # distinguishable from the known-transient flake in the logs.
        run: |
          set +e
          bash e2e/polyglot-echo/run.sh --server wasm-rust --client rust polyglot-ci-wasm
          attempt1=$?
          if [ "$attempt1" -ne 0 ]; then
            echo "::warning::wasm-rust echo attempt 1 failed with exit code $attempt1; retrying once with fresh processes"
            set -e
            bash e2e/polyglot-echo/run.sh --server wasm-rust --client rust polyglot-ci-wasm
          fi
      # ── streaming scenarios (Rust client, dedicated linked stream server) ───
      - name: Run polyglot-echo (--client rust --scenario server-stream)
        run: bash e2e/polyglot-echo/run.sh --client rust --scenario server-stream polyglot-ci-stream
      - name: Run polyglot-echo (--client rust --scenario bidi)
        run: bash e2e/polyglot-echo/run.sh --client rust --scenario bidi polyglot-ci-bidi
      # ── cross-language client (TypeScript driver, echo scenario) ────────────
      - name: Run polyglot-echo (--server cdylib-rust --client ts)
        run: bash e2e/polyglot-echo/run.sh --server cdylib-rust --client ts polyglot-ci-ts

  typescript-e2e:
    name: TypeScript E2E
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Linux e2e dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome*
          sudo apt-get update
          sudo apt-get install -y jq lsof perl
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Pre-build actr and mock-actrix
        run: |
          cargo build --locked --release -p actr-cli --bin actr --features wasm-engine
          cargo build --locked --release -p actr-mock-actrix --bin mock-actrix
      - name: Run TypeScript stream e2e
        run: bash e2e/typescript-stream/run.sh

  web-browser-e2e:
    name: Web Browser E2E
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Linux e2e dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome*
          sudo apt-get update
          sudo apt-get install -y lsof
          google-chrome --version || google-chrome-stable --version || true
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm Component Model toolchain
        run: |
          cargo install wasm-component-ld --version 0.5.22 --locked
          cargo install wasm-tools --version 1.247.0 --locked
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Install web binding root deps (puppeteer)
        working-directory: bindings/web
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Pre-build actr CLI and mock-actrix
        run: |
          cargo build --locked --release -p actr-cli --bin actr --features wasm-engine
          cargo build --locked --release -p actr-mock-actrix --bin mock-actrix
      - name: Run web browser e2e
        env:
          ACTR_CMD: ${{ github.workspace }}/target/release/actr
          ACTR_E2E_ACTR_BIN: ${{ github.workspace }}/target/release/actr
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
          SUITES: BasicFunction
        run: bash e2e/web-browser/run.sh

  swift-echo-app-e2e:
    name: Swift EchoApp E2E
    runs-on: macos-latest
    timeout-minutes: 240
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('e2e/swift-echo-app/project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,aarch64-apple-ios,aarch64-apple-ios-sim
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install macOS e2e dependencies
        run: |
          brew install xcodegen jq sqlite libssh2 pkg-config
          brew link libssh2
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Cache uniffi-bindgen binary
        id: cache-uniffi
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/uniffi-bindgen*
          key: uniffi-bindgen-0.31.1-${{ runner.os }}-${{ runner.arch }}

      - name: Install UniFFI bindgen
        if: steps.cache-uniffi.outputs.cache-hit != 'true'
        run: cargo install --locked uniffi --version 0.31.1 --features cli --bin uniffi-bindgen

      - name: Build local Swift XCFramework (iOS + macOS)
        working-directory: bindings/swift
        env:
          ACTR_BUILD_PROFILE: debug
          ACTR_XCFRAMEWORK_TARGETS: all
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          ACTR_BINDINGS_PATH=dist/ActrBindings \
          ACTR_BINARY_PATH=dist/ActrFFI.xcframework \
          ./build-xcframework.sh
          echo "ACTR_BINARY_PATH=dist/ActrFFI.xcframework" >> "$GITHUB_ENV"
          echo "ACTR_BINDINGS_PATH=dist/ActrBindings" >> "$GITHUB_ENV"

      - name: Run Swift EchoApp e2e
        env:
          CAPTURE_DIAGNOSTICS_ON_SUCCESS: "1"
          CAPTURE_CRASH_BACKTRACE: "1"
        run: bash e2e/swift-echo-app/run.sh

      - name: Upload sanitized diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-echo-app-e2e-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e/swift-echo-app/.tmp/sanitized-logs/
          retention-days: 7
          if-no-files-found: warn
      - name: Upload Swift EchoApp debug symbols
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-echo-app-e2e-symbols-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e/swift-echo-app/.tmp/symbols/
          retention-days: 7
          if-no-files-found: warn

  swift-datastream-app-e2e:
    name: Swift DataStreamApp E2E
    runs-on: macos-latest
    timeout-minutes: 240
    permissions:
      contents: read
    steps:

name: Reusable actrix Release

on:
  workflow_call:
    inputs:
      tag: { required: true, type: string }
      source_ref: { required: true, type: string }
      publish: { required: true, type: boolean }
      replace_assets: { required: true, type: boolean }
      allow_validation_tag: { required: false, type: boolean, default: false }
      release_version: { required: false, type: string, default: "" }

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate actrix release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag_sha: ${{ steps.release.outputs.tag_sha }}
      source_sha: ${{ steps.release.outputs.source_sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}
          path: source
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/checkout@v5
        if: inputs.publish
        with:
          ref: ${{ inputs.tag }}
          path: tag-source
          fetch-depth: 0
          persist-credentials: false
      - name: Validate tag and workspace version
        id: release
        env:
          TAG: ${{ inputs.tag }}
          PUBLISH: ${{ inputs.publish }}
          ALLOW_VALIDATION_TAG: ${{ inputs.allow_validation_tag }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          if [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          elif [[ "$ALLOW_VALIDATION_TAG" == "true" && "$TAG" =~ ^validation-v([0-9]+\.[0-9]+\.[0-9]+-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "::error::Expected vX.Y.Z or an enabled validation-vX.Y.Z-<pre> tag, got $TAG"
            exit 1
          fi
          if [[ -n "$RELEASE_VERSION" && "$VERSION" != "$RELEASE_VERSION" ]]; then
            echo "::error::Tag $TAG resolved to $VERSION, expected $RELEASE_VERSION"
            exit 1
          fi
          WORKSPACE_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' source/Cargo.toml | head -1)
          [[ "$WORKSPACE_VERSION" == "$VERSION" ]] || {
            echo "::error::Tag $TAG expects workspace version $VERSION, got $WORKSPACE_VERSION"
            exit 1
          }
          SOURCE_SHA=$(git -C source rev-parse HEAD)
          if [[ "$PUBLISH" == "true" ]]; then
            TAG_SHA=$(git -C tag-source rev-parse HEAD)
          else
            TAG_SHA="$SOURCE_SHA"
          fi
          {
            echo "version=$VERSION"
            echo "tag_sha=$TAG_SHA"
            echo "source_sha=$SOURCE_SHA"
          } >>"$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.target.asset }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: ubuntu-latest, asset: actrix-linux-x86_64, exe_ext: "" }
          - { os: ubuntu-24.04-arm, asset: actrix-linux-arm64, exe_ext: "" }
          - { os: macos-14, asset: actrix-macos-arm64, exe_ext: "" }
          - { os: windows-latest, asset: actrix-windows-x86_64, exe_ext: ".exe" }
    runs-on: ${{ matrix.target.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}
          path: source
          persist-credentials: false
      - uses: actions/checkout@v5
        with:
          path: automation
          persist-credentials: false

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Install OpenSSL for legacy ecies backend
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $manifest = Get-Content source/Cargo.toml -Raw
          if ($manifest -match 'ecies\s*=\s*\{[^}]*default-features\s*=\s*false') {
            Write-Host "ecies default features are disabled; OpenSSL is not required."
            exit 0
          }

          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) {
            $vcpkgRoot = 'C:\vcpkg'
          }
          $vcpkgExe = Join-Path $vcpkgRoot 'vcpkg.exe'
          if (-not (Test-Path $vcpkgExe)) {
            Write-Error "vcpkg.exe not found at $vcpkgExe"
            exit 1
          }

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_DEFAULT_TRIPLET=x64-windows-static-md" | Out-File -FilePath $env:GITHUB_ENV -Append
          & $vcpkgExe install openssl:x64-windows-static-md

      # Build the Admin UI so the release binary embeds the real dist
      # (rust-embed). build.rs would also try this, but doing it explicitly
      # keeps the release reproducible (frozen lockfile).
      - name: Build Admin UI
        working-directory: source/actrix/crates/actrixd/admin/web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build actrix (release)
        run: cargo build --release -p actrix
        working-directory: source

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "source/target/release/actrix${{ matrix.target.exe_ext }}" "dist/${{ matrix.target.asset }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.asset }}
          path: dist/${{ matrix.target.asset }}
          if-no-files-found: error

  build-deploy:
    name: actrix-deploy-linux-${{ matrix.arch }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, arch: x86_64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}
          path: source
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: source/actrix/deploy
      - name: Build actrix-deploy (release)
        working-directory: source/actrix/deploy
        run: cargo build --release
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "source/actrix/deploy/target/release/deploy" "dist/actrix-deploy-linux-${{ matrix.arch }}"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: actrix-deploy-linux-${{ matrix.arch }}
          path: dist/actrix-deploy-linux-${{ matrix.arch }}
          if-no-files-found: error

  publish:
    name: Upload actrix assets
    if: inputs.publish
    needs: [validate, build, build-deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: actrix-*
          path: dist
          merge-multiple: true

      - name: Verify complete asset set
        env:
          ASSETS: actrix-linux-x86_64 actrix-linux-arm64 actrix-macos-arm64 actrix-windows-x86_64 actrix-deploy-linux-x86_64 actrix-deploy-linux-arm64
        run: |
          set -euo pipefail
          for asset in $ASSETS; do
            test -f "dist/${asset}" || { echo "Missing asset: ${asset}" >&2; exit 1; }
          done

      - name: Generate SHA-256 sidecars
        run: |
          set -euo pipefail
          cd dist
          for asset in actrix-*; do
            [[ "$asset" == *.sha256 ]] && continue
            sha256sum "$asset" > "$asset.sha256"
            echo "Generated $asset.sha256"
          done

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          REPLACE_ASSETS: ${{ inputs.replace_assets }}
        run: |
          set -euo pipefail
          upload_args=()
          if [[ "$REPLACE_ASSETS" == "true" ]]; then
            upload_args+=(--clobber)
          fi
          for asset in dist/*; do
            echo "Uploading $(basename "$asset") to $TAG"
            gh release upload "$TAG" "$asset" --repo "$GITHUB_REPOSITORY" "${upload_args[@]}"
          done

  report:
    name: Collect actrix release state
    if: always()
    needs: [validate, build, build-deploy, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Report
        run: |
          echo "actrix release complete for ${{ inputs.tag }}"

name: CI (Web)

on:
  workflow_call:
  workflow_dispatch:

env:
  PROTOC_VERSION: "29.3"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  format-and-check:
    name: Web Format And Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: wasm32-unknown-unknown

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Check formatting
        working-directory: bindings/web
        run: cargo fmt --all -- --check

      - name: Check web workspace
        working-directory: bindings/web
        run: cargo check --workspace --target wasm32-unknown-unknown --locked

      - name: WIT codegen drift gate (Option U)
        run: cargo run -p actr-wit-compile-web -- --check

      - name: Build sw-host runtime assets
        working-directory: bindings/web/crates/sw-host
        env:
          ACTR_SKIP_CLI_ASSET_SYNC: "1"
        run: bash build.sh

      - name: cli/assets sync drift gate
        run: bash bindings/web/scripts/sync-cli-assets.sh --check --skip-sw-host

  browser-e2e:
    name: Web Browser E2E (Puppeteer)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # echo example builds CM-targeted guest workloads (wasm32-wasip2)
          # plus the wasm-bindgen guest (wasm32-unknown-unknown).
          targets: wasm32-wasip2,wasm32-unknown-unknown

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Install wasm Component Model toolchain
        run: |
          cargo install wasm-component-ld --version 0.5.22 --locked
          cargo install wasm-tools --version 1.249.0 --locked

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux test deps
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome*
          sudo apt-get update
          sudo apt-get install -y lsof
          # Headless Chrome for Puppeteer; the snap-only chromium on
          # ubuntu-latest cannot launch under sudo, so prefer the apt
          # google-chrome-stable mirror that the runner already ships.
          which google-chrome || which google-chrome-stable || true
          google-chrome --version || google-chrome-stable --version || true

      - name: Install web binding root deps (puppeteer)
        working-directory: bindings/web
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile

      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build

      - name: Pre-build actr CLI (release, embeds web assets)
        run: cargo build --release -p actr-cli --bin actr --features wasm-engine

      - name: Pre-build mock-actrix
        run: cargo build --release -p actr-mock-actrix --bin mock-actrix

      - name: Run echo browser e2e
        working-directory: bindings/web/examples/echo
        env:
          ACTR_CMD: ${{ github.workspace }}/target/release/actr
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
          # BasicFunction is the default; expand here if more suites
          # are stable in headless CI.
          SUITES: BasicFunction
        run: bash start-mock.sh

      - name: Run generated TypeScript workload browser e2e
        env:
          ACTR_E2E_ACTR_BIN: ${{ github.workspace }}/target/release/actr
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
        run: cargo test -p actr-cli --test e2e_typescript_generated_echo_web -- --ignored --test-threads=1

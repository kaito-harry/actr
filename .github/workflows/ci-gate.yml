name: CI Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_run:
        description: Run every domain workflow instead of affected-only detection
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  PROTOC_VERSION: "29.3"

jobs:
  determine:
    name: Determine Affected Targets
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.targets.outputs.mode }}
      changed_files_json: ${{ steps.targets.outputs.changed_files_json }}
      reasons_json: ${{ steps.targets.outputs.reasons_json }}
      rust_core: ${{ steps.targets.outputs.rust_core }}
      ts_binding: ${{ steps.targets.outputs.ts_binding }}
      ts_workload: ${{ steps.targets.outputs.ts_workload }}
      python_codegen: ${{ steps.targets.outputs.python_codegen }}
      python_workload: ${{ steps.targets.outputs.python_workload }}
      swift_binding: ${{ steps.targets.outputs.swift_binding }}
      kotlin_binding: ${{ steps.targets.outputs.kotlin_binding }}
      web_binding: ${{ steps.targets.outputs.web_binding }}
      release_related: ${{ steps.targets.outputs.release_related }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Test target detection
        run: python .github/scripts/ci_targets_test.py
      - name: Test CI configuration
        run: python .github/scripts/ci_gate_test.py

      - id: targets
        name: Compute targets
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          MANUAL_FULL: ${{ github.event_name == 'workflow_dispatch' && inputs.full_run || false }}
        run: |
          python .github/scripts/ci_targets.py \
            --event-name "$EVENT_NAME" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --manual-full "$MANUAL_FULL"

  audit:
    name: Dependency Audit
    needs: determine
    if: needs.determine.outputs.rust_core == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked
      - name: Audit Cargo.lock
        # Existing advisories outside the WASM host are tracked separately:
        # maxminddb (framework GeoIP), protobuf 2 (prometheus), rsa (TURN).
        run: >-
          cargo audit
          --ignore RUSTSEC-2025-0132
          --ignore RUSTSEC-2024-0437
          --ignore RUSTSEC-2023-0071

  rust:
    name: Rust
    needs: determine
    if: needs.determine.outputs.rust_core == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      # Fail the build if core/hyper/build.rs can't compile the wasm fixture
      # (missing wasm32-wasip2 / wasm-component-ld) rather than silently
      # compiling the fixture tests out.
      ACTR_REQUIRE_WASM_FIXTURE: "1"
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          # wasm32-wasip2 is required by core/hyper/build.rs to compile the
          # wasm_actor_fixture Component under --all-features (wasm-engine).
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      - name: Verify actr-hyper WIT drift
        # core/hyper/wit/actr-workload.wit is a publish-time copy of the
        # framework original (shipped in the actr-hyper tarball so bindgen
        # works without the sibling framework crate). Fail fast if they drift.
        run: |
          cmp core/framework/wit/actr-workload.wit core/hyper/wit/actr-workload.wit
          cmp core/framework/wit-v2/actr-workload.wit core/hyper/wit-v2/actr-workload.wit
      - name: Cache cargo-installed tools
        id: cargo-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-pack
            ~/.cargo/bin/wasm-component-ld
            ~/.cargo/bin/wasm-tools
          key: cargo-tools-v1-${{ runner.os }}-wp0.13.1-wcld0.5.22-wt1.249.0
      - name: Install wasm-pack
        if: steps.cargo-tools.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --version 0.15.0 --locked
      - name: Install wasm Component Model toolchain
        if: steps.cargo-tools.outputs.cache-hit != 'true'
        run: |
          cargo install wasm-component-ld --version 0.5.26 --locked
          cargo install wasm-tools --version 1.253.0 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Test Rust protoc plugin well-known types
        run: cargo test -p actr-framework-protoc-codegen --test well_known_type_smoke
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings


  test:
    name: Test (Rust)
    needs: determine
    if: needs.determine.outputs.rust_core == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      # Fail the build if core/hyper/build.rs can't compile the wasm fixture
      # (missing wasm32-wasip2 / wasm-component-ld) rather than silently
      # compiling the fixture tests out.
      ACTR_REQUIRE_WASM_FIXTURE: "1"
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # wasm32-wasip2 is required by core/hyper/build.rs to compile the
          # wasm_actor_fixture Component under --all-features (wasm-engine).
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      - name: Verify actr-hyper WIT drift
        # core/hyper/wit/actr-workload.wit is a publish-time copy of the
        # framework original (shipped in the actr-hyper tarball so bindgen
        # works without the sibling framework crate). Fail fast if they drift.
        run: |
          cmp core/framework/wit/actr-workload.wit core/hyper/wit/actr-workload.wit
          cmp core/framework/wit-v2/actr-workload.wit core/hyper/wit-v2/actr-workload.wit
      - name: Cache cargo-installed tools
        id: cargo-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-pack
            ~/.cargo/bin/wasm-component-ld
            ~/.cargo/bin/wasm-tools
          key: cargo-tools-v1-${{ runner.os }}-wp0.13.1-wcld0.5.22-wt1.249.0
      - name: Install wasm-pack
        if: steps.cargo-tools.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --version 0.15.0 --locked
      - name: Install wasm Component Model toolchain
        if: steps.cargo-tools.outputs.cache-hit != 'true'
        run: |
          cargo install wasm-component-ld --version 0.5.26 --locked
          cargo install wasm-tools --version 1.253.0 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Run tests
        run: cargo test --workspace --verbose --all-features

  rust_msrv:
    name: Rust MSRV (1.95)
    needs: determine
    if: needs.determine.outputs.rust_core == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      # Force the wasip2 guest fixture to link under the pinned MSRV toolchain
      # instead of silently compiling the fixture tests out.
      ACTR_REQUIRE_WASM_FIXTURE: "1"
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust (MSRV)
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      - name: Cache cargo-installed tools
        id: cargo-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-pack
            ~/.cargo/bin/wasm-component-ld
            ~/.cargo/bin/wasm-tools
          key: cargo-tools-v1-${{ runner.os }}-wp0.13.1-wcld0.5.22-wt1.249.0
      - name: Install wasm-pack
        if: steps.cargo-tools.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --version 0.15.0 --locked
      - name: Install wasm Component Model toolchain
        if: steps.cargo-tools.outputs.cache-hit != 'true'
        run: |
          cargo install wasm-component-ld --version 0.5.26 --locked
          cargo install wasm-tools --version 1.253.0 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Build at MSRV (locked)
        run: cargo build --workspace --all-targets --all-features --locked

  typescript:
    name: TypeScript
    needs: determine
    if: needs.determine.outputs.ts_binding == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            bindings/typescript/package.json
            tools/protoc-gen/typescript/package-lock.json
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        working-directory: bindings/typescript
        run: npm install
      - name: Check formatting
        working-directory: bindings/typescript
        run: npm run format
      - name: Run lint
        working-directory: bindings/typescript
        run: npm run lint
      - name: Build
        working-directory: bindings/typescript
        run: npm run build
      - name: Run unit tests
        working-directory: bindings/typescript
        run: npm test
      - name: Test TypeScript protoc plugin
        working-directory: tools/protoc-gen/typescript
        run: |
          npm ci
          npm test
      - name: Cargo check
        working-directory: bindings/typescript
        run: cargo check --locked --manifest-path Cargo.toml

  typescript_workload:
    name: TypeScript Workload
    needs: determine
    if: needs.determine.outputs.ts_workload == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            bindings/typescript/actr-workload/package-lock.json
            examples/typescript/echo-workload/package-lock.json
      - name: Verify TypeScript workload WIT drift
        run: |
          cmp core/framework/wit/actr-workload.wit bindings/typescript/actr-workload/src/wit/actr-workload.wit
          cmp core/framework/wit-v2/actr-workload.wit bindings/typescript/actr-workload/src/wit-v2/actr-workload.wit
      - name: Build TypeScript workload package
        working-directory: bindings/typescript/actr-workload
        run: |
          npm ci
          npm run build
          npm test
          node dist/cli.js bindings /tmp/actr-workload-ts-bindings --wit ../../../core/framework/wit/actr-workload.wit
          npm pack --dry-run
      - name: Build TypeScript EchoService workload
        working-directory: examples/typescript/echo-workload
        run: |
          npm ci
          npm run build
          npm run componentize

  python_codegen:
    name: Python Codegen
    needs: determine
    if: needs.determine.outputs.python_codegen == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: tools/protoc-gen/python
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tools/protoc-gen/python/pyproject.toml
      - name: Install package
        run: pip install -e .
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      - name: Smoke generate typed workload
        run: |
          tmp="$(mktemp -d)"
          mkdir -p "$tmp/protos/local" "$tmp/generated"
          cat > "$tmp/protos/local/echo.proto" <<'PROTO'
          syntax = "proto3";
          package echo;

          message EchoRequest {
            string message = 1;
          }

          message EchoResponse {
            string reply = 1;
          }

          service EchoService {
            rpc Echo(EchoRequest) returns (EchoResponse);
          }
          PROTO

          protoc \
            --proto_path="$tmp/protos" \
            --python_out="$tmp/generated" \
            --plugin="protoc-gen-actrframework-python=$(command -v protoc-gen-actrframework-python)" \
            --actrframework-python_opt="LocalFiles=local/echo.proto" \
            --actrframework-python_out="$tmp/generated" \
            "$tmp/protos/local/echo.proto"

          python -m compileall "$tmp/generated"
          PYTHONPATH="$tmp" python - <<'PY'
          import generated.echo_workload
          import generated.local.echo_pb2

          assert hasattr(generated.echo_workload, "EchoServiceDispatcher")
          PY

          if grep -R -E "from actr import|import actr" "$tmp/generated"; then
            echo "legacy actr runtime import leaked into generated Python" >&2
            exit 1
          fi
      - name: Build package
        run: |
          python -m pip install -U build
          python -m build

  python_workload:
    name: Python Workload
    needs: determine
    if: needs.determine.outputs.python_workload == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: bindings/python/actr-workload/pyproject.toml
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      - name: Verify actr-hyper WIT drift
        # core/hyper/wit/actr-workload.wit is a publish-time copy of the
        # framework original (shipped in the actr-hyper tarball so bindgen
        # works without the sibling framework crate). Fail fast if they drift.
        run: |
          cmp core/framework/wit/actr-workload.wit core/hyper/wit/actr-workload.wit
          cmp core/framework/wit-v2/actr-workload.wit core/hyper/wit-v2/actr-workload.wit
      - name: Cache cargo-installed tools
        id: cargo-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-tools
            ~/.cargo/bin/wasm-pack
          key: cargo-tools-v1-${{ runner.os }}-wt1.249.0-wp0.13.1
      - name: Install wasm-tools
        if: steps.cargo-tools.outputs.cache-hit != 'true'
        run: cargo install wasm-tools --version 1.253.0 --locked
      - name: Install wasm-pack
        if: steps.cargo-tools.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --version 0.15.0 --locked
      - name: Verify TypeScript workload WIT drift
        run: |
          cmp core/framework/wit/actr-workload.wit bindings/typescript/actr-workload/src/wit/actr-workload.wit
          cmp core/framework/wit-v2/actr-workload.wit bindings/typescript/actr-workload/src/wit-v2/actr-workload.wit
      - name: Build actr-workload package
        run: |
          python -m pip install -U build
          python -m build bindings/python/actr-workload
      - name: Install actr-workload build extra
        run: python -m pip install -e 'bindings/python/actr-workload[build]'
      - name: Verify componentize-py pin
        run: componentize-py --version | grep 'componentize-py 0.23.0'
      - name: Generate workload bindings
        run: |
          rm -rf /tmp/actr-workload-bindings
          actr-workload bindings /tmp/actr-workload-bindings
          test -f /tmp/actr-workload-bindings/actr_workload_bindings/exports/workload.py
          test -f /tmp/actr-workload-bindings/actr_workload_bindings/imports/host.py
      - name: Compile Python sources
        run: python -m compileall bindings/python/actr-workload/src examples/python/echo-workload/workload.py
      - name: Build Python echo workload
        working-directory: examples/python/echo-workload
        run: ./build.sh package

  swift:
    name: Swift
    needs: determine
    if: needs.determine.outputs.swift_binding == 'true'
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      - name: Cache uniffi-bindgen binary
        id: cache-uniffi
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/uniffi-bindgen*
          key: uniffi-bindgen-0.31.1-${{ runner.os }}-${{ runner.arch }}
      - name: Install UniFFI bindgen
        if: steps.cache-uniffi.outputs.cache-hit != 'true'
        run: cargo install --locked uniffi --version 0.31.1 --features cli --bin uniffi-bindgen
      - name: Install Swift tools and libraries
        run: brew install swiftlint opus
      - name: Run SwiftLint
        run: swiftlint lint --strict
      - name: Build local Swift XCFramework
        working-directory: bindings/swift
        env:
          ACTR_BUILD_PROFILE: debug
          ACTR_XCFRAMEWORK_TARGETS: macos
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          ACTR_BINDINGS_PATH=dist/ActrBindings \
          ACTR_BINARY_PATH=dist/ActrFFI.xcframework \
          ./build-xcframework.sh
      - name: Build Swift bindings package
        working-directory: bindings/swift
        run: |
          ACTR_BINDINGS_PATH=dist/ActrBindings \
          ACTR_BINARY_PATH=dist/ActrFFI.xcframework \
          swift build
      - name: Pre-build mock-actrix
        run: cargo build -p actr-mock-actrix --bin mock-actrix
      - name: Test Swift bindings package
        working-directory: bindings/swift
        env:
          ACTR_SWIFT_E2E: "1"
        run: |
          ../../target/debug/mock-actrix --port 8081 > "$RUNNER_TEMP/mock-actrix.log" 2>&1 &
          mock_pid="$!"
          trap 'kill "$mock_pid" || true' EXIT
          for _ in {1..60}; do
            if grep -q "mock-actrix listening" "$RUNNER_TEMP/mock-actrix.log"; then
              cat "$RUNNER_TEMP/mock-actrix.log"
              break
            fi
            if ! kill -0 "$mock_pid" 2>/dev/null; then
              cat "$RUNNER_TEMP/mock-actrix.log"
              exit 1
            fi
            sleep 1
          done
          if ! grep -q "mock-actrix listening" "$RUNNER_TEMP/mock-actrix.log"; then
            cat "$RUNNER_TEMP/mock-actrix.log"
            exit 1
          fi
          ACTR_BINDINGS_PATH=dist/ActrBindings \
          ACTR_BINARY_PATH=dist/ActrFFI.xcframework \
          swift test
      - name: Build Swift codegen package
        working-directory: tools/protoc-gen/swift
        run: swift build

  kotlin:
    name: Kotlin
    needs: determine
    if: needs.determine.outputs.kotlin_binding == 'true'
    uses: ./.github/workflows/ci-kotlin.yml

  web:
    name: Web
    needs: determine
    if: needs.determine.outputs.web_binding == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: wasm32-unknown-unknown
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      - uses: Swatinem/rust-cache@v2
      - name: Cache cargo-installed tools
        id: cargo-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-pack
          key: cargo-tools-v1-${{ runner.os }}-wp0.13.1
      - name: Install wasm-pack
        if: steps.cargo-tools.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --version 0.15.0 --locked
      - name: Check formatting
        working-directory: bindings/web
        run: cargo fmt --all -- --check
      - name: Check web workspace
        working-directory: bindings/web
        run: cargo check --workspace --target wasm32-unknown-unknown --locked
      - name: WIT codegen drift gate (Option U)
        run: cargo run -p actr-wit-compile-web -- --check
      - name: Build sw-host runtime assets
        working-directory: bindings/web/crates/sw-host
        env:
          ACTR_SKIP_CLI_ASSET_SYNC: "1"
        run: bash build.sh
      - name: cli/assets sync drift gate
        run: bash bindings/web/scripts/sync-cli-assets.sh --check --skip-sw-host

  gate:
    name: Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - determine
      - audit
      - rust
      - typescript
      - typescript_workload
      - python_codegen
      - python_workload
      - swift
      - kotlin
      - web
      - test
    env:
      MODE: ${{ needs.determine.outputs.mode }}
      CHANGED_FILES_JSON: ${{ needs.determine.outputs.changed_files_json }}
      REASONS_JSON: ${{ needs.determine.outputs.reasons_json }}
      RUST_RESULT: ${{ needs.rust.result }}
      AUDIT_RESULT: ${{ needs.audit.result }}
      TYPESCRIPT_RESULT: ${{ needs.typescript.result }}
      TYPESCRIPT_WORKLOAD_RESULT: ${{ needs.typescript_workload.result }}
      PYTHON_CODEGEN_RESULT: ${{ needs.python_codegen.result }}
      PYTHON_WORKLOAD_RESULT: ${{ needs.python_workload.result }}
      SWIFT_RESULT: ${{ needs.swift.result }}
      KOTLIN_RESULT: ${{ needs.kotlin.result }}
      WEB_RESULT: ${{ needs.web.result }}
      TEST_RESULT: ${{ needs.test.result }}
    steps:
      - name: Summarize gate
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          results = {
              "audit": os.environ["AUDIT_RESULT"],
              "rust": os.environ["RUST_RESULT"],
              "typescript": os.environ["TYPESCRIPT_RESULT"],
              "typescript_workload": os.environ["TYPESCRIPT_WORKLOAD_RESULT"],
              "python_codegen": os.environ["PYTHON_CODEGEN_RESULT"],
              "python_workload": os.environ["PYTHON_WORKLOAD_RESULT"],
              "swift": os.environ["SWIFT_RESULT"],
              "kotlin": os.environ["KOTLIN_RESULT"],
              "web": os.environ["WEB_RESULT"],
              "test": os.environ["TEST_RESULT"],
          }

          changed_files = json.loads(os.environ["CHANGED_FILES_JSON"])
          reasons = json.loads(os.environ["REASONS_JSON"])
          mode = os.environ["MODE"]

          summary_lines = [
              "## CI Gate",
              "",
              f"- Mode: `{mode}`",
              f"- Changed files: `{len(changed_files)}`",
              "",
              "### Domain Results",
          ]
          summary_lines.extend([f"- `{name}`: `{result}`" for name, result in results.items()])

          if reasons:
              summary_lines.append("")
              summary_lines.append("### Trigger Reasons")
              summary_lines.extend([f"- `{reason}`" for reason in reasons])

          if changed_files:
              summary_lines.append("")
              summary_lines.append("### Changed Files")
              summary_lines.extend([f"- `{path}`" for path in changed_files])

          if os.environ.get("GITHUB_STEP_SUMMARY"):
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
                  fh.write("\n".join(summary_lines) + "\n")

          failed = [name for name, result in results.items() if result not in {"success", "skipped"}]
          if failed:
              print(f"CI gate failed because these domains did not pass: {', '.join(failed)}", file=sys.stderr)
              sys.exit(1)
          PY

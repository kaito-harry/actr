name: CI (actrix)

on:
  push:
    branches: [main]
    paths:
      - "actrix/**"
      - ".github/workflows/ci-actrix.yml"
  pull_request:
    branches: [main]
    paths:
      - "actrix/**"
      - ".github/workflows/ci-actrix.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: actrix

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: actrix

      - name: Run unit tests
        run: cargo test --workspace --all-features --lib --bins

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: actrix

      - name: Run integration tests
        run: cargo test --workspace --all-features --test '*'

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: actrix

      - run: cargo clippy --workspace --all-features -- -D warnings

  build:
    name: Build Release (${{ matrix.platform.artifact_name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            artifact_name: actrix-linux-x86_64
          - os: macos-14
            artifact_name: actrix-macos-arm64
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: actrix

      - name: Build release
        run: cargo build --release --all-features

      - name: Upload binary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: actrix/target/release/actrix

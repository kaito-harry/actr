name: Reusable Protoc Plugins Release

on:
  workflow_call:
    inputs:
      tag: { required: true, type: string }
      source_ref: { required: true, type: string }
      publish: { required: true, type: boolean }
      replace_assets: { required: true, type: boolean }
      allow_validation_tag: { required: false, type: boolean, default: false }
      release_version: { required: false, type: string, default: "" }

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate protoc plugins release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag_sha: ${{ steps.release.outputs.tag_sha }}
      source_sha: ${{ steps.release.outputs.source_sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}
          path: source
          fetch-depth: 0
      - uses: actions/checkout@v5
        if: inputs.publish
        with:
          ref: ${{ inputs.tag }}
          path: tag-source
          fetch-depth: 0
      - name: Validate tag and workspace version
        id: release
        env:
          TAG: ${{ inputs.tag }}
          PUBLISH: ${{ inputs.publish }}
          ALLOW_VALIDATION_TAG: ${{ inputs.allow_validation_tag }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          if [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          elif [[ "$ALLOW_VALIDATION_TAG" == "true" && "$TAG" =~ ^validation-v([0-9]+\.[0-9]+\.[0-9]+-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "::error::Expected vX.Y.Z or an enabled validation-vX.Y.Z-<pre> tag, got $TAG"
            exit 1
          fi
          if [[ -n "$RELEASE_VERSION" && "$VERSION" != "$RELEASE_VERSION" ]]; then
            echo "::error::Tag $TAG resolved to $VERSION, expected $RELEASE_VERSION"
            exit 1
          fi
          WORKSPACE_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' source/Cargo.toml | head -1)
          [[ "$WORKSPACE_VERSION" == "$VERSION" ]] || {
            echo "::error::Tag $TAG expects workspace version $VERSION, got $WORKSPACE_VERSION"
            exit 1
          }
          SOURCE_SHA=$(git -C source rev-parse HEAD)
          if [[ "$PUBLISH" == "true" ]]; then
            TAG_SHA=$(git -C tag-source rev-parse HEAD)
          else
            TAG_SHA="$SOURCE_SHA"
          fi
          {
            echo "version=$VERSION"
            echo "tag_sha=$TAG_SHA"
            echo "source_sha=$SOURCE_SHA"
          } >>"$GITHUB_OUTPUT"

  build-rust:
    name: Build Rust plugin (macOS arm64)
    needs: validate
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      - name: Build
        run: cargo build --release -p actr-framework-protoc-codegen --bin protoc-gen-actrframework --target aarch64-apple-darwin --locked
      - name: Package
        env:
          EXPECTED_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/protoc-gen-actrframework dist/protoc-gen-actrframework
          chmod +x dist/protoc-gen-actrframework
          ACTUAL_VERSION=$(dist/protoc-gen-actrframework --version | head -1 | awk '{print $NF}')
          [[ "$ACTUAL_VERSION" == "$EXPECTED_VERSION" ]] || {
            echo "::error::Rust plugin reports $ACTUAL_VERSION, expected $EXPECTED_VERSION"
            exit 1
          }
          ZIP_NAME="protoc-gen-actrframework-macos-arm64.zip"
          ( cd dist && zip -q "$ZIP_NAME" protoc-gen-actrframework )
          ( cd dist && shasum -a 256 "$ZIP_NAME" > "$ZIP_NAME.sha256" )
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protoc-gen-actrframework-rust
          path: |
            dist/protoc-gen-actrframework-macos-arm64.zip
            dist/protoc-gen-actrframework-macos-arm64.zip.sha256
          if-no-files-found: error

  build-swift:
    name: Build Swift plugin (macOS arm64)
    needs: validate
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Build release artifact
        run: bash tools/protoc-gen/swift/scripts/build-release.sh
      - name: Verify plugin version
        env:
          EXPECTED_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          PLUGIN=tools/protoc-gen/swift/dist/protoc-gen-actrframework-swift
          ACTUAL_VERSION=$("$PLUGIN" --version | tail -1 | xargs)
          [[ "$ACTUAL_VERSION" == "$EXPECTED_VERSION" ]] || {
            echo "::error::Swift plugin reports $ACTUAL_VERSION, expected $EXPECTED_VERSION"
            exit 1
          }
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protoc-gen-actrframework-swift
          path: |
            tools/protoc-gen/swift/dist/protoc-gen-actrframework-swift-macos-arm64.zip
            tools/protoc-gen/swift/dist/protoc-gen-actrframework-swift-macos-arm64.zip.sha256
          if-no-files-found: error

  build-web:
    name: Build Web plugin (macOS arm64)
    needs: validate
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p actr-web-protoc-codegen --bin protoc-gen-actr-web --target aarch64-apple-darwin --locked
      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/protoc-gen-actr-web dist/protoc-gen-actr-web
          chmod +x dist/protoc-gen-actr-web
          ZIP_NAME="protoc-gen-actr-web-macos-arm64.zip"
          ( cd dist && zip -q "$ZIP_NAME" protoc-gen-actr-web )
          ( cd dist && shasum -a 256 "$ZIP_NAME" > "$ZIP_NAME.sha256" )
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protoc-gen-actr-web
          path: |
            dist/protoc-gen-actr-web-macos-arm64.zip
            dist/protoc-gen-actr-web-macos-arm64.zip.sha256
          if-no-files-found: error

  build-kotlin:
    name: Build Kotlin plugin
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build fat JAR
        run: (cd tools/protoc-gen/kotlin && ./gradlew protocPluginJar --no-daemon)
      - name: Package
        env:
          EXPECTED_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/build/libs
          cp tools/protoc-gen/kotlin/protoc-gen-actrframework-kotlin dist/protoc-gen-actrframework-kotlin
          cp tools/protoc-gen/kotlin/build/libs/protoc-gen-actrframework-kotlin.jar dist/build/libs/protoc-gen-actrframework-kotlin.jar
          chmod +x dist/protoc-gen-actrframework-kotlin
          ACTUAL_VERSION=$(cd dist && ./protoc-gen-actrframework-kotlin --version | awk '{print $NF}')
          [[ "$ACTUAL_VERSION" == "$EXPECTED_VERSION" ]] || {
            echo "::error::Kotlin plugin reports $ACTUAL_VERSION, expected $EXPECTED_VERSION"
            exit 1
          }
          ZIP_NAME="protoc-gen-actrframework-kotlin.zip"
          ( cd dist && zip -q "$ZIP_NAME" protoc-gen-actrframework-kotlin build/libs/protoc-gen-actrframework-kotlin.jar )
          ( cd dist && shasum -a 256 "$ZIP_NAME" > "$ZIP_NAME.sha256" )
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protoc-gen-actrframework-kotlin
          path: |
            dist/protoc-gen-actrframework-kotlin.zip
            dist/protoc-gen-actrframework-kotlin.zip.sha256
          if-no-files-found: error

  build-typescript:
    name: Build TypeScript plugin
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}
      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tools/protoc-gen/typescript/package-lock.json
      - name: Build
        run: (cd tools/protoc-gen/typescript && npm ci && npm run bundle)
      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist/scripts dist/dist
          cp tools/protoc-gen/typescript/scripts/protoc-gen-actrframework-typescript dist/scripts/protoc-gen-actrframework-typescript
          cp tools/protoc-gen/typescript/dist/bundle.js dist/dist/bundle.js
          cp tools/protoc-gen/typescript/package.json dist/package.json
          chmod +x dist/scripts/protoc-gen-actrframework-typescript
          ZIP_INPUTS=(scripts/protoc-gen-actrframework-typescript dist/bundle.js package.json)
          if grep -q 'require("typescript")' dist/dist/bundle.js; then
            mkdir -p dist/node_modules
            cp -R tools/protoc-gen/typescript/node_modules/typescript dist/node_modules/typescript
            ZIP_INPUTS+=(node_modules/typescript)
          fi
          ZIP_NAME="protoc-gen-actrframework-typescript.zip"
          ( cd dist && zip -qr "$ZIP_NAME" "${ZIP_INPUTS[@]}" )
          ( cd dist && shasum -a 256 "$ZIP_NAME" > "$ZIP_NAME.sha256" )
      - name: Verify self-contained bundle
        env:
          EXPECTED_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          TMPDIR="$(mktemp -d)"
          ( cd dist && unzip -q protoc-gen-actrframework-typescript.zip -d "$TMPDIR" )
          echo "Extracted contents:"
          find "$TMPDIR" -type f | sort
          ACTUAL_VERSION=$("$TMPDIR/scripts/protoc-gen-actrframework-typescript" --version | awk '{print $NF}')
          [[ "$ACTUAL_VERSION" == "$EXPECTED_VERSION" ]] || {
            echo "::error::TypeScript plugin reports $ACTUAL_VERSION, expected $EXPECTED_VERSION"
            exit 1
          }
          echo "Bundle is self-contained"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protoc-gen-actrframework-typescript
          path: |
            dist/protoc-gen-actrframework-typescript.zip
            dist/protoc-gen-actrframework-typescript.zip.sha256
          if-no-files-found: error

  build-python:
    name: Build Python plugin
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install build tools
        run: python -m pip install -U build twine
      - name: Build
        run: (cd tools/protoc-gen/python && python -m build)
      - name: Validate distributions
        run: python -m twine check tools/protoc-gen/python/dist/*
      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist
          cp tools/protoc-gen/python/dist/* dist/
          ( cd dist && for f in *.whl *.tar.gz; do shasum -a 256 "$f" > "$f.sha256"; done )
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protoc-gen-actrframework-python
          path: |
            dist/*.whl
            dist/*.whl.sha256
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Upload protoc plugin assets
    if: inputs.publish
    needs: [validate, build-rust, build-swift, build-web, build-kotlin, build-typescript, build-python]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download protoc plugin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: protoc-gen-*
          path: dist
      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          args=("--repo" "$GITHUB_REPOSITORY")
          if [[ "${{ inputs.replace_assets }}" == true ]]; then
            args+=("--clobber")
          fi
          echo "Uploading assets:"
          find dist -type f \( -name '*.zip' -o -name '*.whl' -o -name '*.tar.gz' -o -name '*.sha256' \) | sort
          find dist -type f \( -name '*.zip' -o -name '*.whl' -o -name '*.tar.gz' -o -name '*.sha256' \) -print0 \
            | sort -z \
            | xargs -0 -r gh release upload "$TAG" "${args[@]}"

  report:
    name: Collect protoc plugins release state
    if: always()
    needs: [validate, build-rust, build-swift, build-web, build-kotlin, build-typescript, build-python, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Report
        run: echo "protoc plugins release complete for ${{ inputs.tag }}"

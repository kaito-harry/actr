name: CI (TypeScript)

on:
  workflow_call:
  workflow_dispatch:

env:
  PROTOC_VERSION: "29.3"

permissions:
  contents: read

jobs:
  lint-and-build:
    name: TypeScript Format, Lint And Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: bindings/typescript/package.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        working-directory: bindings/typescript
        run: npm install

      - name: Check formatting
        working-directory: bindings/typescript
        run: npm run format

      - name: Run lint
        working-directory: bindings/typescript
        run: npm run lint

      - name: Build
        working-directory: bindings/typescript
        run: npm run build

      - name: Run unit tests
        working-directory: bindings/typescript
        run: npm test

      - name: Cargo check
        working-directory: bindings/typescript
        run: cargo check --locked --manifest-path Cargo.toml

  workload:
    name: TypeScript Workload Authoring Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            bindings/typescript/actr-workload/package-lock.json
            examples/typescript/echo-workload/package-lock.json

      - name: Verify TypeScript workload WIT drift
        run: |
          cmp core/framework/wit/actr-workload.wit bindings/typescript/actr-workload/src/wit/actr-workload.wit
          cmp core/framework/wit-v2/actr-workload.wit bindings/typescript/actr-workload/src/wit-v2/actr-workload.wit

      - name: Build TypeScript workload package
        working-directory: bindings/typescript/actr-workload
        run: |
          npm ci
          npm run build
          npm test
          node dist/cli.js bindings /tmp/actr-workload-ts-bindings --wit ../../../core/framework/wit/actr-workload.wit
          npm pack --dry-run

      - name: Build TypeScript EchoService workload
        working-directory: examples/typescript/echo-workload
        run: |
          npm ci
          npm run build
          npm run componentize

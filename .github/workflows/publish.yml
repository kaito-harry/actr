name: Publish

on:
  push:
    tags:
      - "v*"
      - "workload-py-v*"
      - "codegen-py-v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PROTOC_VERSION: "29.3"

jobs:
  preflight-rust:
    name: Preflight Rust CI
    if: |
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))) &&
      github.repository_owner != 'dependabot[bot]'
    uses: ./.github/workflows/ci-rust.yml

  publish:
    name: Publish to crates.io
    needs: preflight-rust
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    if: |
      (github.event_name == 'workflow_dispatch' || 
       (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))) &&
      github.repository_owner != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
      - name: Publish crates.io release train
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          packages=(
            actr-protocol
            actr-service-compat
            actr-config
            actr-framework
            actr-runtime-mailbox
            actr-framework-protoc-codegen
            actr-web-protoc-codegen
            actr-runtime
            actr
          )

          publish_one() {
            local package="$1"
            local publish_log
            publish_log="$(mktemp)"

            cargo package -p "$package" --locked --list >/dev/null

            if cargo publish -p "$package" --locked 2>&1 | tee "$publish_log"; then
              return 0
            fi

            if grep -q "already exists" "$publish_log"; then
              echo "$package already exists, skipping"
              return 0
            fi

            return 1
          }

          for package in "${packages[@]}"; do
            publish_one "$package"
          done

  preflight-workload-python:
    name: Preflight Python Workload CI
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/workload-py-v'))
    uses: ./.github/workflows/ci-python.yml

  build-workload-python:
    name: Build actr-workload
    needs: preflight-workload-python
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/workload-py-v'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build package
        run: |
          python -m pip install -U build
          python -m build bindings/python/actr-workload

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: actr-workload-dist
          path: bindings/python/actr-workload/dist/*
          if-no-files-found: error

  publish-workload-python:
    name: Publish actr-workload to PyPI
    needs: build-workload-python
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/workload-py-v'))
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: actr-workload-dist
          path: dist

      - name: Publish to TestPyPI
        if: contains(github.ref_name, 'beta')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

      - name: Publish to PyPI
        if: github.ref_type == 'tag' && !contains(github.ref_name, 'beta')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist

  preflight-codegen-python:
    name: Preflight Python Codegen CI
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/codegen-py-v'))
    uses: ./.github/workflows/ci-codegen-python.yml

  publish-codegen-python:
    name: Publish framework_codegen_python
    needs: preflight-codegen-python
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/codegen-py-v'))
    defaults:
      run:
        working-directory: tools/protoc-gen/python
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install -U build
          python -m build

      - name: Publish to TestPyPI
        if: contains(github.ref_name, 'beta')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          packages-dir: tools/protoc-gen/python/dist

      - name: Publish to PyPI
        if: github.ref_type == 'tag' && !contains(github.ref_name, 'beta')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: tools/protoc-gen/python/dist

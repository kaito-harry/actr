name: Release Asset Validation

on:
  workflow_dispatch:
    inputs:
      pre_release_version:
        description: Cross-ecosystem pre-release version to validate, for example 0.4.13-rc.1.
        required: true
        type: string
      source_ref:
        description: Source ref to validate. Defaults to the workflow ref selected at dispatch time.
        required: false
        type: string
      publish_package_sync:
        description: Publish Swift/Kotlin pre-release packages to matching package-sync repositories.
        required: true
        default: auto
        type: choice
        options:
          - auto
          - never
          - require
      replace_assets:
        description: Replace existing GitHub Release assets when re-running the same validation version.
        required: true
        default: true
        type: boolean
      notes:
        description: Optional notes to append to the validation release.
        required: false
        type: string

concurrency:
  group: release-asset-validation-${{ inputs.pre_release_version }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: write
  id-token: write
  packages: write

env:
  PROTOC_VERSION: "29.3"

jobs:
  context:
    name: Resolve validation context
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.resolve.outputs.base_version }}
      pre_release_version: ${{ steps.resolve.outputs.pre_release_version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}
      short_sha: ${{ steps.resolve.outputs.short_sha }}
      repository: ${{ steps.resolve.outputs.repository }}
      repository_owner: ${{ steps.resolve.outputs.repository_owner }}
      package_sync_owner: ${{ steps.resolve.outputs.package_sync_owner }}
      swift_sync_repo: ${{ steps.resolve.outputs.swift_sync_repo }}
      kotlin_sync_repo: ${{ steps.resolve.outputs.kotlin_sync_repo }}
    steps:
      - name: Checkout source ref
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.ref }}
          fetch-depth: 0

      - name: Resolve context
        id: resolve
        env:
          PRE_RELEASE_VERSION: ${{ inputs.pre_release_version }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail
          [[ "$PRE_RELEASE_VERSION" =~ ^((0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*))-(a|alpha|b|beta|c|rc|pre|preview|dev)([0-9]+|[-.](0|[1-9][0-9]*))?$ ]] || {
            echo "::error::pre_release_version must be strict SemVer and Python-compatible (for example X.Y.Z-rc.1), got ${PRE_RELEASE_VERSION}"
            exit 1
          }
          base_version="${BASH_REMATCH[1]}"
          workspace_version=$(python3 - <<'PY'
          import tomllib
          from pathlib import Path

          with Path("Cargo.toml").open("rb") as fh:
              data = tomllib.load(fh)
          print(data["workspace"]["package"]["version"])
          PY
          )
          [[ "$workspace_version" == "$base_version" ]] || {
            echo "::error::workspace version ${workspace_version} does not match pre-release base ${base_version}"
            exit 1
          }

          source_sha=$(git rev-parse HEAD)
          short_sha=$(git rev-parse --short=12 HEAD)
          source_ref="${INPUT_SOURCE_REF:-${GITHUB_REF_NAME:-${source_sha}}}"
          package_sync_owner="${GITHUB_REPOSITORY_OWNER}"
          release_tag="validation-v${PRE_RELEASE_VERSION}"

          {
            echo "base_version=${base_version}"
            echo "pre_release_version=${PRE_RELEASE_VERSION}"
            echo "release_tag=${release_tag}"
            echo "source_ref=${source_ref}"
            echo "source_sha=${source_sha}"
            echo "short_sha=${short_sha}"
            echo "repository=${GITHUB_REPOSITORY}"
            echo "repository_owner=${GITHUB_REPOSITORY_OWNER}"
            echo "package_sync_owner=${package_sync_owner}"
            echo "swift_sync_repo=${package_sync_owner}/actr-swift-package-sync"
            echo "kotlin_sync_repo=${package_sync_owner}/actr-kotlin-package-sync"
          } >> "$GITHUB_OUTPUT"

  prepare-validation-source:
    name: Prepare prerelease validation source
    needs: context
    runs-on: ubuntu-latest
    outputs:
      validation_sha: ${{ steps.prepare.outputs.validation_sha }}
    steps:
      - name: Checkout requested source commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.source_sha }}
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
          version: ${{ env.PROTOC_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@actrium"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Cache wasm-pack
        id: cache-wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: cargo-tools-v1-${{ runner.os }}-wp0.13.1

      - name: Install wasm-pack
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Prepare prerelease version commit
        id: prepare
        env:
          VERSION: ${{ needs.context.outputs.pre_release_version }}
          TAG: ${{ needs.context.outputs.release_tag }}
        run: |
          set -euo pipefail
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" >/dev/null 2>&1 || true
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            source_sha=$(git rev-parse HEAD)
            validation_sha=$(git rev-parse "refs/tags/${TAG}^{commit}")
            validation_parent=$(git rev-parse "${validation_sha}^" 2>/dev/null || true)
            [[ "$validation_parent" == "$source_sha" ]] || {
              echo "::error::Validation tag ${TAG} points to ${validation_sha}, whose parent is ${validation_parent}; expected source ${source_sha}"
              exit 1
            }
            echo "Reusing existing validation tag ${TAG} at ${validation_sha}"
          else
            scripts/release-train.sh --version "$VERSION" --prepare-only --pre-release
            validation_sha=$(git rev-parse HEAD)
            git tag "$TAG" "$validation_sha"
            git push origin "refs/tags/${TAG}"
          fi
          echo "validation_sha=${validation_sha}" >> "$GITHUB_OUTPUT"

  create-validation-release:
    name: Create validation release
    needs:
      - context
      - prepare-validation-source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout validation source commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.release_tag }}
          fetch-depth: 0

      - name: Create or verify validation tag
        env:
          TAG: ${{ needs.context.outputs.release_tag }}
          SOURCE_SHA: ${{ needs.prepare-validation-source.outputs.validation_sha }}
        run: |
          set -euo pipefail
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" >/dev/null 2>&1 || true
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            tag_sha=$(git rev-parse "refs/tags/${TAG}^{commit}")
            [[ "$tag_sha" == "$SOURCE_SHA" ]] || {
              echo "::error::Validation tag ${TAG} already points to ${tag_sha}, expected ${SOURCE_SHA}"
              exit 1
            }
            echo "Validation tag ${TAG} already points to ${SOURCE_SHA}"
          else
            git tag "$TAG" "$SOURCE_SHA"
            git push origin "refs/tags/${TAG}"
          fi

      - name: Create or update GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.context.outputs.release_tag }}
          VERSION: ${{ needs.context.outputs.pre_release_version }}
          SOURCE_REF: ${{ needs.context.outputs.source_ref }}
          SOURCE_SHA: ${{ needs.context.outputs.source_sha }}
          VALIDATION_SHA: ${{ needs.prepare-validation-source.outputs.validation_sha }}
          NOTES: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          Release-equivalent asset validation.

          This is not a stable Actrium release. It validates packaging and
          release asset completeness for a pre-release source commit.

          - Source repository: https://github.com/${GITHUB_REPOSITORY}
          - Source ref: ${SOURCE_REF}
          - Source sha: ${SOURCE_SHA}
          - Validation source sha: ${VALIDATION_SHA}
          - Pre-release version: ${VERSION}
          - Validation tag: ${TAG}
          EOF
          if [[ -n "$NOTES" ]]; then
            {
              echo ""
              echo "Additional notes:"
              echo "$NOTES"
            } >> release-notes.md
          fi

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$VALIDATION_SHA" \
              --title "$TAG" \
              --notes-file release-notes.md \
              --prerelease
          fi

  rust-package-assets:
    name: Package Rust crate assets
    needs:
      - context
      - prepare-validation-source
      - create-validation-release
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout source commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.release_tag }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
          version: ${{ env.PROTOC_VERSION }}

      - name: Cache wasm-pack
        id: cache-wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: cargo-tools-v1-${{ runner.os }}-wp0.13.1

      - name: Install wasm-pack
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Package publishable crates
        env:
          BASE_VERSION: ${{ needs.context.outputs.base_version }}
        run: |
          set -euo pipefail
          bash bindings/web/scripts/sync-cli-assets.sh --build
          mkdir -p release/validation/crates
          packages=(
            actr-protocol
            actr-service-compat
            actr-config
            actr-web-abi
            actr-framework
            actr-runtime-mailbox
            actr-runtime
            actr-platform-traits
            actr-pack
            actr-mock-actrix
            actr-hyper
            actr-platform-native
            actr-framework-protoc-codegen
            actr-web-protoc-codegen
            actr
            actr-cli
          )
          package_workspace_dir() {
            case "$1" in
              actr-web-abi) printf '%s\n' bindings/web ;;
              *) printf '%s\n' . ;;
            esac
          }
          for package in "${packages[@]}"; do
            echo "Packaging ${package}"
            (
              cd "$(package_workspace_dir "$package")"
              # --no-verify: prerelease path deps (e.g. actr-protocol 0.4.12-rc.1)
              # are not on crates.io, so tarball build verification pulls stale
              # stable versions and fails. Real `cargo publish` verifies later.
              cargo package -p "$package" --locked --allow-dirty --no-verify --target-dir "$GITHUB_WORKSPACE/target/release-validation"
            )
          done
          find target/release-validation/package -maxdepth 1 -type f -name '*.crate' -print0 |
            sort -z |
            xargs -0 -I{} cp {} release/validation/crates/
          (cd release/validation/crates && for asset in *.crate; do sha256sum "$asset" > "$asset.sha256"; done)
          test "$(find release/validation/crates -name '*.crate' | wc -l | tr -d ' ')" -eq "${#packages[@]}"

      - name: Upload Rust crate assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.context.outputs.release_tag }}
          REPLACE_ASSETS: ${{ inputs.replace_assets }}
        run: |
          set -euo pipefail
          args=(--repo "$GITHUB_REPOSITORY")
          [[ "$REPLACE_ASSETS" == "true" ]] && args+=(--clobber)
          find release/validation/crates -type f -print0 |
            sort -z |
            xargs -0 -r gh release upload "$TAG" "${args[@]}"

  typescript-native-assets:
    name: Build TypeScript native package (${{ matrix.target }})
    needs:
      - context
      - prepare-validation-source
      - create-validation-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15-intel
            artifact: actr.darwin-x64.node
            build_args: ""
            use_zig: false
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: actr.darwin-arm64.node
            build_args: ""
            use_zig: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: actr.linux-x64-gnu.node
            build_args: ""
            use_zig: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: actr.linux-x64-musl.node
            build_args: --cross-compile
            use_zig: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: actr.linux-arm64-gnu.node
            build_args: --cross-compile
            use_zig: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: actr.linux-arm64-musl.node
            build_args: --cross-compile
            use_zig: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: actr.win32-x64-msvc.node
            build_args: ""
            use_zig: false
    defaults:
      run:
        working-directory: bindings/typescript
    steps:
      - name: Checkout validation source
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: bindings/typescript/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
          version: ${{ env.PROTOC_VERSION }}

      - name: Setup Zig
        if: matrix.use_zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Install dependencies
        run: npm install

      - name: Build native package
        shell: bash
        run: npx napi build --platform --target ${{ matrix.target }} --release --output-dir artifacts ${{ matrix.build_args }}

      - name: Verify native package
        shell: bash
        run: test -f "artifacts/${{ matrix.artifact }}"

      - name: Upload native package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bindings/typescript/artifacts/${{ matrix.artifact }}
          if-no-files-found: error

  npm-package-assets:
    name: Package npm assets
    needs:
      - context
      - prepare-validation-source
      - create-validation-release
      - typescript-native-assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@actrium"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Download TypeScript native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: actr.*.node
          path: bindings/typescript/artifacts
          merge-multiple: true

      - name: Package web and TypeScript npm artifacts
        run: |
          set -euo pipefail
          dist="$GITHUB_WORKSPACE/release/validation/npm"
          mkdir -p "$dist"

          (
            cd bindings/web
            PUPPETEER_SKIP_DOWNLOAD=true \
            PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true \
            pnpm install --frozen-lockfile
            pnpm run build:packages
            for pkg in packages/actr-dom packages/web-sdk packages/web-react; do
              (cd "$pkg" && npm pack --pack-destination "$dist")
            done
          )

          (
            cd bindings/typescript/actr-workload
            npm ci
            npm run build
            npm pack --pack-destination "$dist"
          )

          (
            cd bindings/typescript
            npm install
            npm run compile:ts
            npx napi create-npm-dirs
            npm run artifacts -- --output-dir artifacts
            for pkg in \
              npm/darwin-x64 \
              npm/darwin-arm64 \
              npm/linux-x64-gnu \
              npm/linux-x64-musl \
              npm/linux-arm64-gnu \
              npm/linux-arm64-musl \
              npm/win32-x64-msvc; do
              npm pack "$pkg" --pack-destination "$dist"
            done
            npm pack --pack-destination "$dist" --ignore-scripts
          )

          (cd "$dist" && for asset in *.tgz; do sha256sum "$asset" > "$asset.sha256"; done)

      - name: Upload npm assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.context.outputs.release_tag }}
          REPLACE_ASSETS: ${{ inputs.replace_assets }}
        run: |
          set -euo pipefail
          args=(--repo "$GITHUB_REPOSITORY")
          [[ "$REPLACE_ASSETS" == "true" ]] && args+=(--clobber)
          find release/validation/npm -type f -print0 |
            sort -z |
            xargs -0 -r gh release upload "$TAG" "${args[@]}"

  cli-assets:
    name: Build actr CLI validation assets
    needs:
      - context
      - prepare-validation-source
      - create-validation-release
    uses: ./.github/workflows/_actr-cli-release.yml
    with:
      tag: ${{ needs.context.outputs.release_tag }}
      source_ref: ${{ needs.context.outputs.release_tag }}
      publish: true
      replace_assets: ${{ inputs.replace_assets }}
      allow_validation_tag: true
      release_version: ${{ needs.context.outputs.pre_release_version }}
    secrets: inherit

  actrix-assets:
    name: Build actrix validation assets
    needs:
      - context
      - prepare-validation-source
      - create-validation-release
    uses: ./.github/workflows/_actrix-release.yml
    with:
      tag: ${{ needs.context.outputs.release_tag }}
      source_ref: ${{ needs.context.outputs.release_tag }}
      publish: true
      replace_assets: ${{ inputs.replace_assets }}
      allow_validation_tag: true
      release_version: ${{ needs.context.outputs.pre_release_version }}
    secrets: inherit

  protoc-plugin-assets:
    name: Build protoc plugin validation assets
    needs:
      - context
      - prepare-validation-source
      - create-validation-release
    uses: ./.github/workflows/_protoc-plugins-release.yml
    with:
      tag: ${{ needs.context.outputs.release_tag }}
      source_ref: ${{ needs.context.outputs.release_tag }}
      publish: true
      replace_assets: ${{ inputs.replace_assets }}
      allow_validation_tag: true
      release_version: ${{ needs.context.outputs.pre_release_version }}
    secrets: inherit

  swift-package:
    name: Build Swift package validation assets
    needs:
      - context
      - prepare-validation-source
      - create-validation-release
    runs-on: macos-latest
    steps:
      - name: Checkout source commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.release_tag }}
          path: source

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,aarch64-apple-darwin

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
          version: ${{ env.PROTOC_VERSION }}

      - name: Cache UniFFI bindgen
        id: cache-uniffi
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/uniffi-bindgen*
          key: uniffi-bindgen-0.31.1-${{ runner.os }}-${{ runner.arch }}

      - name: Install UniFFI bindgen
        if: steps.cache-uniffi.outputs.cache-hit != 'true'
        run: cargo install --locked uniffi --version 0.31.1 --features cli --bin uniffi-bindgen

      - name: Install native dependencies
        run: brew install opus

      - name: Build and package Swift XCFramework
        working-directory: source/bindings/swift
        env:
          ACTR_BUILD_PROFILE: release
          ACTR_BINDINGS_PATH: dist/ActrBindings
          ACTR_BINARY_PATH: dist/ActrFFI.xcframework
          ACTR_RELEASE_REPOSITORY: ${{ github.repository }}
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          ./build-xcframework.sh
          ./scripts/package-binary.sh "${{ needs.context.outputs.release_tag }}"

      - name: Upload Swift validation assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.context.outputs.release_tag }}
          REPLACE_ASSETS: ${{ inputs.replace_assets }}
        run: |
          set -euo pipefail
          args=(--repo "$GITHUB_REPOSITORY")
          [[ "$REPLACE_ASSETS" == "true" ]] && args+=(--clobber)
          gh release upload "$TAG" \
            source/bindings/swift/dist/ActrFFI.xcframework.zip \
            source/bindings/swift/dist/release.txt \
            "${args[@]}"

      - name: Upload Swift package-sync inputs
        uses: actions/upload-artifact@v4
        with:
          name: swift-package-sync-inputs
          path: |
            source/bindings/swift/Sources/
            source/bindings/swift/dist/ActrBindings/
            source/bindings/swift/dist/ActrFFI.xcframework/
            source/bindings/swift/dist/ActrFFI.xcframework.zip
            source/bindings/swift/dist/release.txt
          if-no-files-found: error

  kotlin-package:
    name: Build Kotlin package validation assets
    needs:
      - context
      - prepare-validation-source
      - create-validation-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.release_tag }}
          path: source

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
          version: ${{ env.PROTOC_VERSION }}

      - name: Cache UniFFI bindgen
        id: cache-uniffi
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/uniffi-bindgen
          key: uniffi-bindgen-0.31.1-${{ runner.os }}-${{ runner.arch }}

      - name: Install UniFFI bindgen
        if: steps.cache-uniffi.outputs.cache-hit != 'true'
        run: cargo install --locked uniffi --version 0.31.1 --features cli --bin uniffi-bindgen

      - name: Build Kotlin Android package
        working-directory: source/bindings/kotlin
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: |
          ./build-android.sh
          ./gradlew :actr-kotlin:assembleRelease \
            --no-daemon \
            -PactrGroup=io.actrium \
            -PactrVersion=${{ needs.context.outputs.pre_release_version }}
          ACTR_RELEASE_REPOSITORY="$GITHUB_REPOSITORY" \
            ./scripts/package-binary.sh "${{ needs.context.outputs.release_tag }}"
          mkdir -p "$GITHUB_WORKSPACE/release/validation/kotlin"
          cp actr-kotlin/build/outputs/aar/actr-kotlin-release.aar "$GITHUB_WORKSPACE/release/validation/kotlin/"
          cp dist/actr-kotlin-native.zip "$GITHUB_WORKSPACE/release/validation/kotlin/"
          cp dist/release.txt "$GITHUB_WORKSPACE/release/validation/kotlin/kotlin-release.txt"
          (
            cd "$GITHUB_WORKSPACE/release/validation/kotlin"
            for asset in *.aar *.zip; do sha256sum "$asset" > "$asset.sha256"; done
          )

      - name: Upload Kotlin validation assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.context.outputs.release_tag }}
          REPLACE_ASSETS: ${{ inputs.replace_assets }}
        run: |
          set -euo pipefail
          args=(--repo "$GITHUB_REPOSITORY")
          [[ "$REPLACE_ASSETS" == "true" ]] && args+=(--clobber)
          find release/validation/kotlin -type f -print0 |
            sort -z |
            xargs -0 -r gh release upload "$TAG" "${args[@]}"

      - name: Upload Kotlin package-sync inputs
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-package-sync-inputs
          path: |
            source/bindings/kotlin/actr-kotlin/src/main/
            source/bindings/kotlin/actr-kotlin/build/outputs/aar/actr-kotlin-release.aar
            source/bindings/kotlin/dist/actr-kotlin-native.zip
          if-no-files-found: error

  prepare-swift-package-sync:
    name: Prepare Swift package-sync prerelease
    if: inputs.publish_package_sync != 'never'
    needs:
      - context
      - prepare-validation-source
      - rust-package-assets
      - typescript-native-assets
      - npm-package-assets
      - cli-assets
      - actrix-assets
      - protoc-plugin-assets
      - swift-package
      - kotlin-package
    runs-on: macos-latest
    outputs:
      publish: ${{ steps.probe.outputs.publish }}
      push_tag: ${{ steps.sync-prepare.outputs.push_tag }}
      tag_checksum: ${{ steps.sync-prepare.outputs.tag_checksum }}
    steps:
      - name: Probe Swift package-sync publishing
        id: probe
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
          MODE: ${{ inputs.publish_package_sync }}
          SYNC_REPO: ${{ needs.context.outputs.swift_sync_repo }}
        run: |
          set -euo pipefail
          publish=false
          reason=""
          if [[ -z "$GH_TOKEN" ]]; then
            reason="package_sync_token_missing"
          elif ! gh repo view "$SYNC_REPO" >/dev/null 2>&1; then
            reason="sync_repo_missing_or_inaccessible"
          else
            publish=true
            reason="enabled"
          fi
          if [[ "$MODE" == "require" && "$publish" != "true" ]]; then
            echo "::error::Swift package-sync publishing required but ${reason}"
            exit 1
          fi
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"

      - name: Checkout validation source
        if: steps.probe.outputs.publish == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.release_tag }}
          path: source
          persist-credentials: false

      - name: Download Swift package-sync inputs
        if: steps.probe.outputs.publish == 'true'
        uses: actions/download-artifact@v4
        with:
          name: swift-package-sync-inputs
          path: source/bindings/swift

      - name: Checkout Swift package-sync repository
        if: steps.probe.outputs.publish == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.context.outputs.swift_sync_repo }}
          token: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
          ref: main
          path: swift-sync
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Prepare Swift package-sync tag
        if: steps.probe.outputs.publish == 'true'
        id: sync-prepare
        env:
          PRE_VERSION: ${{ needs.context.outputs.pre_release_version }}
          SYNC_REPO: ${{ needs.context.outputs.swift_sync_repo }}
          SOURCE_REPO: ${{ needs.context.outputs.repository }}
          SOURCE_SHA: ${{ needs.prepare-validation-source.outputs.validation_sha }}
          SOURCE_TAG: ${{ needs.context.outputs.release_tag }}
        run: |
          set -euo pipefail
          sync_tag="v${PRE_VERSION}"
          if git -C swift-sync rev-parse -q --verify "refs/tags/${sync_tag}" >/dev/null 2>&1; then
            git -C swift-sync checkout --detach "refs/tags/${sync_tag}"
            python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path("swift-sync/release-metadata.json").read_text())
          expected = {
              "version": os.environ["PRE_VERSION"],
              "source_repository": f"https://github.com/{os.environ['SOURCE_REPO']}",
              "source_tag": os.environ["SOURCE_TAG"],
              "source_sha": os.environ["SOURCE_SHA"],
              "prerelease": True,
          }
          mismatches = {
              key: (metadata.get(key), value)
              for key, value in expected.items()
              if metadata.get(key) != value
          }
          if mismatches:
              raise SystemExit(f"existing Swift package-sync tag metadata mismatch: {mismatches}")
          PY
            tag_checksum=$(python3 - <<'PY'
          import re
          from pathlib import Path

          text = Path("swift-sync/Package.swift").read_text()
          match = re.search(
              r'let remoteBinaryChecksum = env\["ACTR_BINARY_CHECKSUM"\] \?\? "([^"]+)"',
              text,
          )
          if not match:
              raise SystemExit("existing Swift package-sync checksum not found")
          print(match.group(1))
          PY
            )
            echo "push_tag=false" >> "$GITHUB_OUTPUT"
            echo "tag_checksum=${tag_checksum}" >> "$GITHUB_OUTPUT"
            echo "Reusing immutable Swift package-sync tag ${sync_tag}"
          else
            mkdir -p swift-sync/Sources
            rsync -a --delete source/bindings/swift/Sources/ swift-sync/Sources/
            rsync -a --delete source/bindings/swift/dist/ActrBindings/ swift-sync/ActrBindings/

            # This executes the sync repository's Package.swift without exposing
            # PACKAGE_SYNC_GITHUB_TOKEN to the manifest process.
            (
              cd swift-sync
              ACTR_BINDINGS_PATH=ActrBindings \
              ACTR_BINARY_PATH="$GITHUB_WORKSPACE/source/bindings/swift/dist/ActrFFI.xcframework" \
              swift build
            )

            checksum=$(python3 - <<'PY'
          from pathlib import Path

          text = Path("source/bindings/swift/dist/release.txt").read_text()
          for line in text.splitlines():
              if line.startswith("SHA256 checksum:"):
                  print(line.split(":", 1)[1].strip())
                  break
          else:
              raise SystemExit("checksum not found")
          PY
            )

            python3 - "$checksum" <<'PY'
          from __future__ import annotations

          import os
          import re
          import sys
          from pathlib import Path

          checksum = sys.argv[1]
          version = os.environ["PRE_VERSION"]
          repo = os.environ["SYNC_REPO"]
          path = Path("swift-sync/Package.swift")
          text = path.read_text()
          text = re.sub(
              r'let releaseTag = env\["ACTR_BINARY_TAG"\] \?\? "v[^"]+"',
              f'let releaseTag = env["ACTR_BINARY_TAG"] ?? "v{version}"',
              text,
          )
          text = re.sub(
              r'let remoteBinaryURL = "https://github\.com/[^"]+/ActrFFI\.xcframework\.zip"',
              f'let remoteBinaryURL = "https://github.com/{repo}/releases/download/\\(releaseTag)/ActrFFI.xcframework.zip"',
              text,
          )
          text = re.sub(
              r'let remoteBinaryChecksum = env\["ACTR_BINARY_CHECKSUM"\] \?\? "[^"]+"',
              f'let remoteBinaryChecksum = env["ACTR_BINARY_CHECKSUM"] ?? "{checksum}"',
              text,
          )
          path.write_text(text)
          PY

            python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          payload = {
              "version": os.environ["PRE_VERSION"],
              "source_repository": f"https://github.com/{os.environ['SOURCE_REPO']}",
              "source_tag": os.environ["SOURCE_TAG"],
              "source_sha": os.environ["SOURCE_SHA"],
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "prerelease": True,
          }
          Path("swift-sync/release-metadata.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY

            (
              cd swift-sync
              git checkout --detach HEAD
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add Package.swift Sources ActrBindings release-metadata.json
              git commit -m "chore(release): publish ${sync_tag}"
              git tag "$sync_tag"
            )
            echo "push_tag=true" >> "$GITHUB_OUTPUT"
            echo "tag_checksum=${checksum}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload prepared Swift package-sync tree
        if: steps.probe.outputs.publish == 'true' && steps.sync-prepare.outputs.push_tag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: swift-package-sync-prepared
          path: |
            swift-sync/Package.swift
            swift-sync/Sources/
            swift-sync/ActrBindings/
            swift-sync/release-metadata.json
          if-no-files-found: error

  publish-swift-package-sync:
    name: Publish Swift package-sync prerelease
    if: inputs.publish_package_sync != 'never' && needs.prepare-swift-package-sync.outputs.publish == 'true'
    needs:
      - context
      - prepare-validation-source
      - rust-package-assets
      - typescript-native-assets
      - npm-package-assets
      - cli-assets
      - actrix-assets
      - protoc-plugin-assets
      - swift-package
      - kotlin-package
      - prepare-swift-package-sync
    runs-on: ubuntu-latest
    steps:
      - name: Download Swift package-sync inputs
        uses: actions/download-artifact@v4
        with:
          name: swift-package-sync-inputs
          path: swift-inputs

      - name: Download prepared Swift package-sync tree
        if: needs.prepare-swift-package-sync.outputs.push_tag == 'true'
        uses: actions/download-artifact@v4
        with:
          name: swift-package-sync-prepared
          path: swift-prepared

      - name: Checkout fresh Swift package-sync repository
        if: needs.prepare-swift-package-sync.outputs.push_tag == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.context.outputs.swift_sync_repo }}
          token: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
          ref: main
          path: swift-sync
          fetch-depth: 0
          persist-credentials: false

      - name: Create fresh Swift package-sync tag
        if: needs.prepare-swift-package-sync.outputs.push_tag == 'true'
        env:
          PRE_VERSION: ${{ needs.context.outputs.pre_release_version }}
        run: |
          set -euo pipefail
          sync_tag="v${PRE_VERSION}"
          test -f swift-prepared/Package.swift
          test ! -L swift-prepared/Package.swift
          test -f swift-prepared/release-metadata.json
          test ! -L swift-prepared/release-metadata.json
          test -z "$(find swift-prepared/Sources swift-prepared/ActrBindings -type l -print -quit)"
          rsync -a --delete swift-prepared/Sources/ swift-sync/Sources/
          rsync -a --delete swift-prepared/ActrBindings/ swift-sync/ActrBindings/
          cp swift-prepared/Package.swift swift-sync/Package.swift
          cp swift-prepared/release-metadata.json swift-sync/release-metadata.json
          (
            cd swift-sync
            git checkout --detach HEAD
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Package.swift Sources ActrBindings release-metadata.json
            git commit -m "chore(release): publish ${sync_tag}"
            git tag "$sync_tag"
          )

      - name: Publish Swift package-sync tag and release
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
          PRE_VERSION: ${{ needs.context.outputs.pre_release_version }}
          SYNC_REPO: ${{ needs.context.outputs.swift_sync_repo }}
          SOURCE_REPO: ${{ needs.context.outputs.repository }}
          SOURCE_SHA: ${{ needs.prepare-validation-source.outputs.validation_sha }}
          SOURCE_TAG: ${{ needs.context.outputs.release_tag }}
          PUSH_TAG: ${{ needs.prepare-swift-package-sync.outputs.push_tag }}
          TAG_CHECKSUM: ${{ needs.prepare-swift-package-sync.outputs.tag_checksum }}
          REPLACE_ASSETS: ${{ inputs.replace_assets }}
        run: |
          set -euo pipefail
          sync_tag="v${PRE_VERSION}"
          asset=swift-inputs/dist/ActrFFI.xcframework.zip
          if [[ "$PUSH_TAG" == "true" ]]; then
            basic_auth=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')
            echo "::add-mask::${basic_auth}"
            git -C swift-sync \
              -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${basic_auth}" \
              push origin "refs/tags/${sync_tag}"
          fi

          cat > swift-release-notes.md <<EOF
          Source repository: https://github.com/${SOURCE_REPO}
          Source tag: ${SOURCE_TAG}
          Source sha: ${SOURCE_SHA}
          EOF
          if gh release view "$sync_tag" --repo "$SYNC_REPO" >/dev/null 2>&1; then
            gh release edit "$sync_tag" \
              --repo "$SYNC_REPO" \
              --title "$sync_tag" \
              --notes-file swift-release-notes.md \
              --prerelease
            if [[ "$PUSH_TAG" == "true" ]]; then
              upload_args=(--repo "$SYNC_REPO")
              [[ "$REPLACE_ASSETS" == "true" ]] && upload_args+=(--clobber)
              gh release upload "$sync_tag" "$asset" "${upload_args[@]}"
            elif ! gh release view "$sync_tag" --repo "$SYNC_REPO" --json assets \
              --jq 'any(.assets[]; .name == "ActrFFI.xcframework.zip")' | grep -qx true; then
              new_checksum=$(sha256sum "$asset" | awk '{print $1}')
              [[ "$new_checksum" == "$TAG_CHECKSUM" ]] || {
                echo "::error::Rebuilt Swift asset checksum ${new_checksum} does not match immutable tag checksum ${TAG_CHECKSUM}"
                exit 1
              }
              gh release upload "$sync_tag" "$asset" --repo "$SYNC_REPO"
            else
              echo "Reusing immutable Swift package-sync asset for ${sync_tag}"
            fi
          else
            if [[ "$PUSH_TAG" != "true" ]]; then
              new_checksum=$(sha256sum "$asset" | awk '{print $1}')
              [[ "$new_checksum" == "$TAG_CHECKSUM" ]] || {
                echo "::error::Rebuilt Swift asset checksum ${new_checksum} does not match immutable tag checksum ${TAG_CHECKSUM}"
                exit 1
              }
            fi
            gh release create "$sync_tag" "$asset" \
              --repo "$SYNC_REPO" \
              --title "$sync_tag" \
              --notes-file swift-release-notes.md \
              --prerelease
          fi

  publish-kotlin-package-sync:
    name: Publish Kotlin package-sync prerelease
    if: inputs.publish_package_sync != 'never'
    needs:
      - context
      - prepare-validation-source
      - rust-package-assets
      - typescript-native-assets
      - npm-package-assets
      - cli-assets
      - actrix-assets
      - protoc-plugin-assets
      - swift-package
      - kotlin-package
    runs-on: ubuntu-latest
    steps:
      - name: Probe Kotlin package-sync publishing
        id: probe
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
          MODE: ${{ inputs.publish_package_sync }}
          SYNC_REPO: ${{ needs.context.outputs.kotlin_sync_repo }}
        run: |
          set -euo pipefail
          publish=false
          reason=""
          if [[ -z "$GH_TOKEN" ]]; then
            reason="package_sync_token_missing"
          elif ! gh repo view "$SYNC_REPO" >/dev/null 2>&1; then
            reason="sync_repo_missing_or_inaccessible"
          else
            publish=true
            reason="enabled"
          fi
          if [[ "$MODE" == "require" && "$publish" != "true" ]]; then
            echo "::error::Kotlin package-sync publishing required but ${reason}"
            exit 1
          fi
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"

      - name: Checkout validation source
        if: steps.probe.outputs.publish == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.release_tag }}
          path: source
          persist-credentials: false

      - name: Setup Java
        if: steps.probe.outputs.publish == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Download Kotlin package-sync inputs
        if: steps.probe.outputs.publish == 'true'
        uses: actions/download-artifact@v4
        with:
          name: kotlin-package-sync-inputs
          path: source/bindings/kotlin

      - name: Checkout Kotlin package-sync repository
        if: steps.probe.outputs.publish == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.context.outputs.kotlin_sync_repo }}
          token: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
          ref: main
          path: kotlin-sync
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Prepare Kotlin package-sync tag
        if: steps.probe.outputs.publish == 'true'
        id: sync-prepare
        env:
          PRE_VERSION: ${{ needs.context.outputs.pre_release_version }}
          SYNC_REPO: ${{ needs.context.outputs.kotlin_sync_repo }}
          SOURCE_REPO: ${{ needs.context.outputs.repository }}
          SOURCE_SHA: ${{ needs.prepare-validation-source.outputs.validation_sha }}
          SOURCE_TAG: ${{ needs.context.outputs.release_tag }}
        run: |
          set -euo pipefail
          sync_tag="v${PRE_VERSION}"
          if git -C kotlin-sync rev-parse -q --verify "refs/tags/${sync_tag}" >/dev/null 2>&1; then
            git -C kotlin-sync checkout --detach "refs/tags/${sync_tag}"
            python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path("kotlin-sync/release-metadata.json").read_text())
          expected = {
              "version": os.environ["PRE_VERSION"],
              "source_repository": f"https://github.com/{os.environ['SOURCE_REPO']}",
              "source_tag": os.environ["SOURCE_TAG"],
              "source_sha": os.environ["SOURCE_SHA"],
              "coordinate": f"io.actrium:actr:{os.environ['PRE_VERSION']}",
              "android_abis": ["arm64-v8a", "x86_64"],
              "prerelease": True,
          }
          mismatches = {
              key: (metadata.get(key), value)
              for key, value in expected.items()
              if metadata.get(key) != value
          }
          if mismatches:
              raise SystemExit(f"existing Kotlin package-sync tag metadata mismatch: {mismatches}")
          PY
            echo "push_tag=false" >> "$GITHUB_OUTPUT"
            echo "Reusing immutable Kotlin package-sync tag ${sync_tag}"
          else
            (
              cd source/bindings/kotlin
              ACTR_RELEASE_REPOSITORY="$SYNC_REPO" ./scripts/package-binary.sh "$sync_tag"
            )

            python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          payload = {
              "version": os.environ["PRE_VERSION"],
              "source_repository": f"https://github.com/{os.environ['SOURCE_REPO']}",
              "source_tag": os.environ["SOURCE_TAG"],
              "source_sha": os.environ["SOURCE_SHA"],
              "coordinate": f"io.actrium:actr:{os.environ['PRE_VERSION']}",
              "android_abis": ["arm64-v8a", "x86_64"],
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "prerelease": True,
          }
          Path("kotlin-sync/release-metadata.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY

            (
              cd kotlin-sync
              git checkout --detach HEAD
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add release-metadata.json
              git commit -m "chore(release): publish ${sync_tag}"
              git tag "$sync_tag"
            )
            echo "push_tag=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Kotlin Maven package, tag, and release
        if: steps.probe.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
          PRE_VERSION: ${{ needs.context.outputs.pre_release_version }}
          SYNC_REPO: ${{ needs.context.outputs.kotlin_sync_repo }}
          PUSH_TAG: ${{ steps.sync-prepare.outputs.push_tag }}
          REPLACE_ASSETS: ${{ inputs.replace_assets }}
        run: |
          set -euo pipefail
          sync_tag="v${PRE_VERSION}"
          if [[ "$PUSH_TAG" == "true" ]]; then
            package_actor=$(gh api user --jq .login)
            (
              cd source/bindings/kotlin
              GITHUB_ACTOR="$package_actor" \
              GITHUB_TOKEN="$GH_TOKEN" \
              ./gradlew :actr-kotlin:publish \
                --no-daemon \
                -PactrGroup=io.actrium \
                -PactrVersion="${PRE_VERSION}" \
                -PactrPublishUrl="https://maven.pkg.github.com/${SYNC_REPO}"
            )
            basic_auth=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')
            echo "::add-mask::${basic_auth}"
            git -C kotlin-sync \
              -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${basic_auth}" \
              push origin "refs/tags/${sync_tag}"
          fi

          if gh release view "$sync_tag" --repo "$SYNC_REPO" >/dev/null 2>&1; then
            gh release edit "$sync_tag" \
              --repo "$SYNC_REPO" \
              --title "$sync_tag" \
              --notes-file kotlin-sync/release-metadata.json \
              --prerelease
            upload_args=(--repo "$SYNC_REPO")
            [[ "$REPLACE_ASSETS" == "true" ]] && upload_args+=(--clobber)
            gh release upload "$sync_tag" \
              source/bindings/kotlin/dist/actr-kotlin-native.zip \
              source/bindings/kotlin/actr-kotlin/build/outputs/aar/actr-kotlin-release.aar \
              "${upload_args[@]}"
          else
            gh release create "$sync_tag" \
              source/bindings/kotlin/dist/actr-kotlin-native.zip \
              source/bindings/kotlin/actr-kotlin/build/outputs/aar/actr-kotlin-release.aar \
              --repo "$SYNC_REPO" \
              --title "$sync_tag" \
              --notes-file kotlin-sync/release-metadata.json \
              --prerelease
          fi

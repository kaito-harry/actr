name: Release Asset Validation

on:
  workflow_dispatch:
    inputs:
      pre_release_version:
        description: Cross-ecosystem pre-release version to validate, for example 0.4.13-rc.1.
        required: true
        type: string
      source_ref:
        description: Source ref to validate. Defaults to the workflow ref selected at dispatch time.
        required: false
        type: string
      publish_package_sync:
        description: Publish Swift/Kotlin pre-release packages to matching package-sync repositories.
        required: true
        default: never
        type: choice
        options:
          - auto
          - never
          - require
      replace_assets:
        description: Replace source validation release assets on rerun; published package-sync assets remain hash-locked.
        required: true
        default: true
        type: boolean
      notes:
        description: Optional notes to append to the validation release.
        required: false
        type: string

concurrency:
  group: release-asset-validation-${{ inputs.pre_release_version }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

env:
  PROTOC_VERSION: "29.3"

jobs:
  context:
    name: Resolve validation context
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.resolve.outputs.base_version }}
      pre_release_version: ${{ steps.resolve.outputs.pre_release_version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}
      short_sha: ${{ steps.resolve.outputs.short_sha }}
      repository: ${{ steps.resolve.outputs.repository }}
      repository_owner: ${{ steps.resolve.outputs.repository_owner }}
      package_sync_owner: ${{ steps.resolve.outputs.package_sync_owner }}
      swift_sync_repo: ${{ steps.resolve.outputs.swift_sync_repo }}
      kotlin_sync_repo: ${{ steps.resolve.outputs.kotlin_sync_repo }}
    steps:
      - name: Checkout source ref
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve context
        id: resolve
        env:
          PRE_RELEASE_VERSION: ${{ inputs.pre_release_version }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail
          [[ "$PRE_RELEASE_VERSION" =~ ^((0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*))-(a|alpha|b|beta|c|rc|pre|preview|dev)([0-9]+|[-.](0|[1-9][0-9]*))?$ ]] || {
            echo "::error::pre_release_version must be strict SemVer and Python-compatible (for example X.Y.Z-rc.1), got ${PRE_RELEASE_VERSION}"
            exit 1
          }
          base_version="${BASH_REMATCH[1]}"
          workspace_version=$(python3 - <<'PY'
          import tomllib
          from pathlib import Path

          with Path("Cargo.toml").open("rb") as fh:
              data = tomllib.load(fh)
          print(data["workspace"]["package"]["version"])
          PY
          )
          [[ "$workspace_version" == "$base_version" ]] || {
            echo "::error::workspace version ${workspace_version} does not match pre-release base ${base_version}"
            exit 1
          }

          source_sha=$(git rev-parse HEAD)
          short_sha=$(git rev-parse --short=12 HEAD)
          source_ref="${INPUT_SOURCE_REF:-${GITHUB_REF_NAME:-${source_sha}}}"
          package_sync_owner="${GITHUB_REPOSITORY_OWNER}"
          release_tag="validation-v${PRE_RELEASE_VERSION}"

          {
            echo "base_version=${base_version}"
            echo "pre_release_version=${PRE_RELEASE_VERSION}"
            echo "release_tag=${release_tag}"
            echo "source_ref=${source_ref}"
            echo "source_sha=${source_sha}"
            echo "short_sha=${short_sha}"
            echo "repository=${GITHUB_REPOSITORY}"
            echo "repository_owner=${GITHUB_REPOSITORY_OWNER}"
            echo "package_sync_owner=${package_sync_owner}"
            echo "swift_sync_repo=${package_sync_owner}/actr-swift-package-sync"
            echo "kotlin_sync_repo=${package_sync_owner}/actr-kotlin-package-sync"
          } >> "$GITHUB_OUTPUT"

  prepare-validation-source:
    name: Prepare prerelease validation source
    needs: context
    runs-on: ubuntu-latest
    outputs:
      validation_sha: ${{ steps.prepare.outputs.validation_sha }}
      push_tag: ${{ steps.prepare.outputs.push_tag }}
    steps:
      - name: Checkout requested source commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
          version: ${{ env.PROTOC_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@actrium"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Cache wasm-pack
        id: cache-wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: cargo-tools-v1-${{ runner.os }}-wp0.13.1

      - name: Install wasm-pack
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Prepare prerelease version commit
        id: prepare
        env:
          VERSION: ${{ needs.context.outputs.pre_release_version }}
          TAG: ${{ needs.context.outputs.release_tag }}
        run: |
          set -euo pipefail
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" >/dev/null 2>&1 || true
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            source_sha=$(git rev-parse HEAD)
            validation_sha=$(git rev-parse "refs/tags/${TAG}^{commit}")
            validation_parent=$(git rev-parse "${validation_sha}^" 2>/dev/null || true)
            [[ "$validation_parent" == "$source_sha" ]] || {
              echo "::error::Validation tag ${TAG} points to ${validation_sha}, whose parent is ${validation_parent}; expected source ${source_sha}"
              exit 1
            }
            echo "Reusing existing validation tag ${TAG} at ${validation_sha}"
            push_tag=false
          else
            scripts/release-train.sh --version "$VERSION" --prepare-only --pre-release
            validation_sha=$(git rev-parse HEAD)
            git tag "$TAG" "$validation_sha"
            push_tag=true
          fi
          {
            echo "validation_sha=${validation_sha}"
            echo "push_tag=${push_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Bundle prepared validation tag
        if: steps.prepare.outputs.push_tag == 'true'
        env:
          TAG: ${{ needs.context.outputs.release_tag }}
          SOURCE_SHA: ${{ needs.context.outputs.source_sha }}
        run: |
          set -euo pipefail
          git bundle create validation-source.bundle \
            "refs/tags/${TAG}" \
            "^${SOURCE_SHA}"
          git bundle verify validation-source.bundle

      - name: Upload prepared validation tag
        if: steps.prepare.outputs.push_tag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: validation-source-tag
          path: validation-source.bundle
          if-no-files-found: error

  publish-validation-tag:
    name: Publish prerelease validation tag
    needs:
      - context
      - prepare-validation-source
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout requested source commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download prepared validation tag
        if: needs.prepare-validation-source.outputs.push_tag == 'true'
        uses: actions/download-artifact@v4
        with:
          name: validation-source-tag

      - name: Push or verify validation tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.context.outputs.release_tag }}
          SOURCE_SHA: ${{ needs.context.outputs.source_sha }}
          VALIDATION_SHA: ${{ needs.prepare-validation-source.outputs.validation_sha }}
          PUSH_TAG: ${{ needs.prepare-validation-source.outputs.push_tag }}
        run: |
          set -euo pipefail
          if [[ "$PUSH_TAG" == "true" ]]; then
            git fetch validation-source.bundle "refs/tags/${TAG}:refs/tags/${TAG}"
          else
            git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}"
          fi
          tag_sha=$(git rev-parse "refs/tags/${TAG}^{commit}")
          tag_parent=$(git rev-parse "${tag_sha}^")
          [[ "$tag_sha" == "$VALIDATION_SHA" && "$tag_parent" == "$SOURCE_SHA" ]] || {
            echo "::error::Validation tag ${TAG} resolved to ${tag_sha} with parent ${tag_parent}; expected ${VALIDATION_SHA} with parent ${SOURCE_SHA}"
            exit 1
          }
          if [[ "$PUSH_TAG" != "true" ]]; then
            echo "Reusing validation tag ${TAG} at ${tag_sha}"
            exit 0
          fi
          basic_auth=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')
          echo "::add-mask::${basic_auth}"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${basic_auth}" \
            push origin "refs/tags/${TAG}"

  create-validation-release:
    name: Create validation release
    needs:
      - context
      - prepare-validation-source
      - publish-validation-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout validation source commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.release_tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Create or verify validation tag
        env:
          TAG: ${{ needs.context.outputs.release_tag }}
          SOURCE_SHA: ${{ needs.prepare-validation-source.outputs.validation_sha }}
        run: |
          set -euo pipefail
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" >/dev/null 2>&1 || true
          git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null 2>&1 || {
            echo "::error::Validation tag ${TAG} was not pushed by the preparation job"
            exit 1
          }
          tag_sha=$(git rev-parse "refs/tags/${TAG}^{commit}")
          [[ "$tag_sha" == "$SOURCE_SHA" ]] || {
            echo "::error::Validation tag ${TAG} already points to ${tag_sha}, expected ${SOURCE_SHA}"
            exit 1
          }
          echo "Validation tag ${TAG} already points to ${SOURCE_SHA}"

      - name: Create or update GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.context.outputs.release_tag }}
          VERSION: ${{ needs.context.outputs.pre_release_version }}
          SOURCE_REF: ${{ needs.context.outputs.source_ref }}
          SOURCE_SHA: ${{ needs.context.outputs.source_sha }}
          VALIDATION_SHA: ${{ needs.prepare-validation-source.outputs.validation_sha }}
          NOTES: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          Release-equivalent asset validation.

          This is not a stable Actrium release. It validates packaging and
          release asset completeness for a pre-release source commit.

          - Source repository: https://github.com/${GITHUB_REPOSITORY}
          - Source ref: ${SOURCE_REF}
          - Source sha: ${SOURCE_SHA}
          - Validation source sha: ${VALIDATION_SHA}
          - Pre-release version: ${VERSION}
          - Validation tag: ${TAG}
          EOF
          if [[ -n "$NOTES" ]]; then
            {
              echo ""
              echo "Additional notes:"
              echo "$NOTES"
            } >> release-notes.md
          fi

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$VALIDATION_SHA" \
              --verify-tag \
              --title "$TAG" \
              --notes-file release-notes.md \
              --prerelease
          fi

  build-rust-package-assets:
    name: Build Rust crate validation assets
    needs:
      - context
      - prepare-validation-source
      - create-validation-release
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout source commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.release_tag }}
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
          version: ${{ env.PROTOC_VERSION }}

      - name: Cache wasm-pack
        id: cache-wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: cargo-tools-v1-${{ runner.os }}-wp0.13.1

      - name: Install wasm-pack
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Package publishable crates
        env:
          BASE_VERSION: ${{ needs.context.outputs.base_version }}
        run: |
          set -euo pipefail
          bash bindings/web/scripts/sync-cli-assets.sh --build
          mkdir -p release/validation/crates
          packages=(
            actr-protocol
            actr-service-compat
            actr-config
            actr-web-abi
            actr-framework
            actr-runtime-mailbox
            actr-runtime
            actr-platform-traits
            actr-pack
            actr-mock-actrix
            actr-hyper
            actr-platform-native
            actr-framework-protoc-codegen
            actr-web-protoc-codegen
            actr
            actr-cli
          )
          package_workspace_dir() {
            case "$1" in
              actr-web-abi) printf '%s\n' bindings/web ;;
              *) printf '%s\n' . ;;
            esac
          }
          for package in "${packages[@]}"; do
            echo "Packaging ${package}"
            (
              cd "$(package_workspace_dir "$package")"
              # --no-verify: prerelease path deps (e.g. actr-protocol 0.4.12-rc.1)
              # are not on crates.io, so tarball build verification pulls stale
              # stable versions and fails. Real `cargo publish` verifies later.
              cargo package -p "$package" --locked --allow-dirty --no-verify --target-dir "$GITHUB_WORKSPACE/target/release-validation"
            )
          done
          find target/release-validation/package -maxdepth 1 -type f -name '*.crate' -print0 |
            sort -z |
            xargs -0 -I{} cp {} release/validation/crates/
          (cd release/validation/crates && for asset in *.crate; do sha256sum "$asset" > "$asset.sha256"; done)
          test "$(find release/validation/crates -name '*.crate' | wc -l | tr -d ' ')" -eq "${#packages[@]}"

      - name: Stage Rust crate assets
        uses: actions/upload-artifact@v4
        with:
          name: rust-package-assets
          path: release/validation/crates/
          if-no-files-found: error

  rust-package-assets:
    name: Publish Rust crate validation assets
    needs:
      - context
      - create-validation-release
      - build-rust-package-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Rust crate assets
        uses: actions/download-artifact@v4
        with:
          name: rust-package-assets
          path: release/validation/crates

      - name: Upload Rust crate assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.context.outputs.release_tag }}
          REPLACE_ASSETS: ${{ inputs.replace_assets }}
        run: |
          set -euo pipefail
          args=(--repo "$GITHUB_REPOSITORY")
          [[ "$REPLACE_ASSETS" == "true" ]] && args+=(--clobber)
          find release/validation/crates -type f -print0 |
            sort -z |
            xargs -0 -r gh release upload "$TAG" "${args[@]}"

  typescript-native-assets:
    name: Build TypeScript native package (${{ matrix.target }})
    needs:
      - context
      - prepare-validation-source
      - create-validation-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15-intel
            artifact: actr.darwin-x64.node
            build_args: ""
            use_zig: false
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: actr.darwin-arm64.node
            build_args: ""
            use_zig: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: actr.linux-x64-gnu.node
            build_args: ""
            use_zig: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: actr.linux-x64-musl.node
            build_args: --cross-compile
            use_zig: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: actr.linux-arm64-gnu.node
            build_args: --cross-compile
            use_zig: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: actr.linux-arm64-musl.node
            build_args: --cross-compile
            use_zig: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: actr.win32-x64-msvc.node
            build_args: ""
            use_zig: false
    defaults:
      run:
        working-directory: bindings/typescript
    steps:
      - name: Checkout validation source
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.release_tag }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
          version: ${{ env.PROTOC_VERSION }}

      - name: Setup Zig
        if: matrix.use_zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Install dependencies
        run: npm install

      - name: Build native package
        shell: bash
        run: npx napi build --platform --target ${{ matrix.target }} --release --output-dir artifacts ${{ matrix.build_args }}

      - name: Verify native package
        shell: bash
        run: test -f "artifacts/${{ matrix.artifact }}"

      - name: Upload native package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bindings/typescript/artifacts/${{ matrix.artifact }}
          if-no-files-found: error

  build-npm-package-assets:
    name: Build npm validation assets
    needs:
      - context
      - prepare-validation-source
      - create-validation-release
      - typescript-native-assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.release_tag }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@actrium"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Download TypeScript native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: actr.*.node
          path: bindings/typescript/artifacts
          merge-multiple: true

      - name: Package web and TypeScript npm artifacts
        run: |
          set -euo pipefail
          dist="$GITHUB_WORKSPACE/release/validation/npm"
          mkdir -p "$dist"

          (
            cd bindings/web
            PUPPETEER_SKIP_DOWNLOAD=true \
            PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true \
            pnpm install --frozen-lockfile
            pnpm run build:packages
            for pkg in packages/actr-dom packages/web-sdk packages/web-react; do
              (cd "$pkg" && npm pack --pack-destination "$dist")
            done
          )

          (
            cd bindings/typescript/actr-workload
            npm ci
            npm run build
            npm pack --pack-destination "$dist"
          )

          (
            cd bindings/typescript
            npm install
            npm run compile:ts
            npx napi create-npm-dirs
            npm run artifacts -- --output-dir artifacts
            for pkg in \
              npm/darwin-x64 \
              npm/darwin-arm64 \
              npm/linux-x64-gnu \
              npm/linux-x64-musl \
              npm/linux-arm64-gnu \
              npm/linux-arm64-musl \
              npm/win32-x64-msvc; do
              npm pack "./$pkg" --pack-destination "$dist"
            done
            npm pack --pack-destination "$dist" --ignore-scripts
          )

          (cd "$dist" && for asset in *.tgz; do sha256sum "$asset" > "$asset.sha256"; done)

      - name: Stage npm assets
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-assets
          path: release/validation/npm/
          if-no-files-found: error

  npm-package-assets:
    name: Publish npm validation assets
    needs:
      - context
      - create-validation-release
      - build-npm-package-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download npm assets
        uses: actions/download-artifact@v4
        with:
          name: npm-package-assets
          path: release/validation/npm

      - name: Upload npm assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.context.outputs.release_tag }}
          REPLACE_ASSETS: ${{ inputs.replace_assets }}
        run: |
          set -euo pipefail
          args=(--repo "$GITHUB_REPOSITORY")
          [[ "$REPLACE_ASSETS" == "true" ]] && args+=(--clobber)
          find release/validation/npm -type f -print0 |
            sort -z |
            xargs -0 -r gh release upload "$TAG" "${args[@]}"

  cli-assets:
    name: Build actr CLI validation assets
    needs:
      - context
      - prepare-validation-source
      - create-validation-release
    permissions:
      contents: write
    uses: ./.github/workflows/_actr-cli-release.yml
    with:
      tag: ${{ needs.context.outputs.release_tag }}
      source_ref: ${{ needs.context.outputs.release_tag }}
      publish: true
      replace_assets: ${{ inputs.replace_assets }}
      allow_validation_tag: true
      release_version: ${{ needs.context.outputs.pre_release_version }}

  actrix-assets:
    name: Build actrix validation assets
    needs:
      - context
      - prepare-validation-source
      - create-validation-release
    permissions:
      contents: write
    uses: ./.github/workflows/_actrix-release.yml
    with:
      tag: ${{ needs.context.outputs.release_tag }}
      source_ref: ${{ needs.context.outputs.release_tag }}
      publish: true
      replace_assets: ${{ inputs.replace_assets }}
      allow_validation_tag: true
      release_version: ${{ needs.context.outputs.pre_release_version }}

  protoc-plugin-assets:
    name: Build protoc plugin validation assets
    needs:
      - context
      - prepare-validation-source
      - create-validation-release
    permissions:
      contents: write
    uses: ./.github/workflows/_protoc-plugins-release.yml
    with:
      tag: ${{ needs.context.outputs.release_tag }}
      source_ref: ${{ needs.context.outputs.release_tag }}
      publish: true
      replace_assets: ${{ inputs.replace_assets }}
      allow_validation_tag: true
      release_version: ${{ needs.context.outputs.pre_release_version }}

  build-swift-package:
    name: Build Swift package validation assets
    needs:
      - context
      - prepare-validation-source
      - create-validation-release
    runs-on: macos-latest
    steps:
      - name: Checkout source commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.release_tag }}
          path: source
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,aarch64-apple-darwin

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
          version: ${{ env.PROTOC_VERSION }}

      - name: Cache UniFFI bindgen
        id: cache-uniffi
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/uniffi-bindgen*
          key: uniffi-bindgen-0.31.1-${{ runner.os }}-${{ runner.arch }}

      - name: Install UniFFI bindgen
        if: steps.cache-uniffi.outputs.cache-hit != 'true'
        run: cargo install --locked uniffi --version 0.31.1 --features cli --bin uniffi-bindgen

      - name: Install native dependencies
        run: brew install opus

      - name: Build and package Swift XCFramework
        working-directory: source/bindings/swift
        env:
          ACTR_BUILD_PROFILE: release
          ACTR_BINDINGS_PATH: dist/ActrBindings
          ACTR_BINARY_PATH: dist/ActrFFI.xcframework
          ACTR_RELEASE_REPOSITORY: ${{ github.repository }}
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          ./build-xcframework.sh
          ./scripts/package-binary.sh "${{ needs.context.outputs.release_tag }}"

      - name: Prepare Swift validation recovery asset
        run: |
          set -euo pipefail
          asset=source/bindings/swift/dist/ActrFFI.xcframework.zip
          release_info=source/bindings/swift/dist/release.txt
          checksum=$(sed -n 's/^SHA256 checksum:[[:space:]]*//p' "$release_info")
          [[ "$checksum" =~ ^[0-9a-f]{64}$ ]] || {
            echo "::error::Invalid Swift package checksum: ${checksum}"
            exit 1
          }

          # Preserve an immutable, content-addressed recovery copy before the
          # package-sync tag is pushed. A later run can recover the exact bytes
          # even if rebuilding the XCFramework is not bit-for-bit identical.
          recovery_asset="source/bindings/swift/dist/ActrFFI.xcframework.${checksum}.zip"
          cp "$asset" "$recovery_asset"

      - name: Stage Swift validation assets
        uses: actions/upload-artifact@v4
        with:
          name: swift-validation-assets
          path: |
            source/bindings/swift/dist/ActrFFI.xcframework.zip
            source/bindings/swift/dist/ActrFFI.xcframework.*.zip
            source/bindings/swift/dist/release.txt
          if-no-files-found: error

      - name: Upload Swift package-sync inputs
        uses: actions/upload-artifact@v4
        with:
          name: swift-package-sync-inputs
          path: |
            source/bindings/swift/Sources/
            source/bindings/swift/dist/ActrBindings/
            source/bindings/swift/dist/ActrFFI.xcframework/
            source/bindings/swift/dist/ActrFFI.xcframework.zip
            source/bindings/swift/dist/release.txt
          if-no-files-found: error

  swift-package:
    name: Publish Swift package validation assets
    needs:
      - context
      - create-validation-release
      - build-swift-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Swift validation assets
        uses: actions/download-artifact@v4
        with:
          name: swift-validation-assets
          path: swift-validation

      - name: Upload Swift validation assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.context.outputs.release_tag }}
          REPLACE_ASSETS: ${{ inputs.replace_assets }}
        run: |
          set -euo pipefail
          asset=swift-validation/ActrFFI.xcframework.zip
          release_info=swift-validation/release.txt
          checksum=$(sed -n 's/^SHA256 checksum:[[:space:]]*//p' "$release_info")
          [[ "$checksum" =~ ^[0-9a-f]{64}$ ]] || {
            echo "::error::Invalid Swift package checksum: ${checksum}"
            exit 1
          }
          recovery_asset="swift-validation/ActrFFI.xcframework.${checksum}.zip"
          recovery_name=$(basename "$recovery_asset")
          [[ -f "$asset" && -f "$release_info" && -f "$recovery_asset" ]] || {
            echo "::error::Swift validation artifact set is incomplete"
            exit 1
          }
          [[ -z "$(find swift-validation -type l -print -quit)" ]] || {
            echo "::error::Swift validation artifact set contains a symbolic link"
            exit 1
          }
          actual_checksum=$(sha256sum "$asset" | awk '{print $1}')
          recovery_checksum=$(sha256sum "$recovery_asset" | awk '{print $1}')
          [[ "$actual_checksum" == "$checksum" && "$recovery_checksum" == "$checksum" ]] || {
            echo "::error::Swift validation artifact checksum mismatch"
            exit 1
          }
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets \
            --jq '.assets[].name' | grep -Fxq "$recovery_name"; then
            recovery_dir=$(mktemp -d)
            gh release download "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$recovery_name" \
              --dir "$recovery_dir" \
              --clobber
            existing_checksum=$(sha256sum "$recovery_dir/$recovery_name" | awk '{print $1}')
            [[ "$existing_checksum" == "$checksum" ]] || {
              echo "::error::Recovery asset ${recovery_name} has checksum ${existing_checksum}, expected ${checksum}"
              exit 1
            }
          else
            gh release upload "$TAG" "$recovery_asset" --repo "$GITHUB_REPOSITORY"
          fi

          args=(--repo "$GITHUB_REPOSITORY")
          [[ "$REPLACE_ASSETS" == "true" ]] && args+=(--clobber)
          gh release upload "$TAG" \
            "$asset" \
            "$release_info" \
            "${args[@]}"

  build-kotlin-package:
    name: Build Kotlin package validation assets
    needs:
      - context
      - prepare-validation-source
      - create-validation-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.release_tag }}
          path: source
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
          version: ${{ env.PROTOC_VERSION }}

      - name: Cache UniFFI bindgen
        id: cache-uniffi
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/uniffi-bindgen
          key: uniffi-bindgen-0.31.1-${{ runner.os }}-${{ runner.arch }}

      - name: Install UniFFI bindgen
        if: steps.cache-uniffi.outputs.cache-hit != 'true'
        run: cargo install --locked uniffi --version 0.31.1 --features cli --bin uniffi-bindgen

      - name: Build Kotlin Android package
        working-directory: source/bindings/kotlin
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: |
          ./build-android.sh
          ./gradlew :actr-kotlin:assembleRelease \
            --no-daemon \
            -PactrGroup=io.actrium \
            -PactrVersion=${{ needs.context.outputs.pre_release_version }}
          ./gradlew :actr-kotlin:publishMavenPublicationToValidationStagingRepository \
            --no-daemon \
            -PactrGroup=io.actrium \
            -PactrVersion=${{ needs.context.outputs.pre_release_version }} \
            -PactrSourceRepository="${GITHUB_REPOSITORY}" \
            -PactrSourceTag=${{ needs.context.outputs.release_tag }} \
            -PactrSourceSha=${{ needs.prepare-validation-source.outputs.validation_sha }} \
            -PactrValidationStagingUrl="$GITHUB_WORKSPACE/release/validation/kotlin-maven"
          ACTR_RELEASE_REPOSITORY="$GITHUB_REPOSITORY" \
            ./scripts/package-binary.sh "${{ needs.context.outputs.release_tag }}"
          mkdir -p "$GITHUB_WORKSPACE/release/validation/kotlin"
          cp actr-kotlin/build/outputs/aar/actr-kotlin-release.aar "$GITHUB_WORKSPACE/release/validation/kotlin/"
          cp dist/actr-kotlin-native.zip "$GITHUB_WORKSPACE/release/validation/kotlin/"
          cp dist/release.txt "$GITHUB_WORKSPACE/release/validation/kotlin/kotlin-release.txt"
          (
            cd "$GITHUB_WORKSPACE/release/validation/kotlin"
            native_checksum=$(sha256sum actr-kotlin-native.zip | awk '{print $1}')
            cp actr-kotlin-native.zip "actr-kotlin-native.${native_checksum}.zip"
            for asset in *.aar *.zip; do sha256sum "$asset" > "$asset.sha256"; done
          )

      - name: Stage Kotlin validation assets
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-validation-assets
          path: release/validation/kotlin/
          if-no-files-found: error

      - name: Stage Kotlin Maven repository
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-maven-staging
          path: release/validation/kotlin-maven/
          if-no-files-found: error

  kotlin-package:
    name: Publish Kotlin package validation assets
    needs:
      - context
      - create-validation-release
      - build-kotlin-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Kotlin validation assets
        uses: actions/download-artifact@v4
        with:
          name: kotlin-validation-assets
          path: release/validation/kotlin

      - name: Upload Kotlin validation assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.context.outputs.release_tag }}
          REPLACE_ASSETS: ${{ inputs.replace_assets }}
        run: |
          set -euo pipefail
          assets=release/validation/kotlin
          test -f "$assets/actr-kotlin-release.aar"
          test -f "$assets/actr-kotlin-release.aar.sha256"
          test -f "$assets/actr-kotlin-native.zip"
          test -f "$assets/actr-kotlin-native.zip.sha256"
          test -f "$assets/kotlin-release.txt"
          test -z "$(find "$assets" -type l -print -quit)"
          (
            cd "$assets"
            sha256sum -c actr-kotlin-release.aar.sha256
            sha256sum -c actr-kotlin-native.zip.sha256
          )

          native_checksum=$(sha256sum "$assets/actr-kotlin-native.zip" | awk '{print $1}')
          recovery_asset="$assets/actr-kotlin-native.${native_checksum}.zip"
          recovery_name=$(basename "$recovery_asset")
          test -f "$recovery_asset"
          [[ "$(sha256sum "$recovery_asset" | awk '{print $1}')" == "$native_checksum" ]]
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets \
            --jq '.assets[].name' | grep -Fxq "$recovery_name"; then
            recovery_dir=$(mktemp -d)
            gh release download "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$recovery_name" \
              --dir "$recovery_dir" \
              --clobber
            [[ "$(sha256sum "$recovery_dir/$recovery_name" | awk '{print $1}')" == "$native_checksum" ]] || {
              echo "::error::Kotlin recovery asset ${recovery_name} has the wrong checksum"
              exit 1
            }
          else
            gh release upload "$TAG" "$recovery_asset" --repo "$GITHUB_REPOSITORY"
          fi

          args=(--repo "$GITHUB_REPOSITORY")
          [[ "$REPLACE_ASSETS" == "true" ]] && args+=(--clobber)
          gh release upload "$TAG" \
            "$assets/actr-kotlin-release.aar" \
            "$assets/actr-kotlin-release.aar.sha256" \
            "$assets/actr-kotlin-native.zip" \
            "$assets/actr-kotlin-native.zip.sha256" \
            "$assets/kotlin-release.txt" \
            "${args[@]}"

  prepare-swift-package-sync:
    name: Prepare Swift package-sync prerelease
    if: inputs.publish_package_sync != 'never'
    needs:
      - context
      - prepare-validation-source
      - rust-package-assets
      - typescript-native-assets
      - npm-package-assets
      - cli-assets
      - actrix-assets
      - protoc-plugin-assets
      - swift-package
      - kotlin-package
    runs-on: macos-latest
    outputs:
      publish: ${{ steps.probe.outputs.publish }}
      push_tag: ${{ steps.sync-prepare.outputs.push_tag }}
      tag_checksum: ${{ steps.sync-prepare.outputs.tag_checksum }}
    steps:
      - name: Probe Swift package-sync publishing
        id: probe
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
          MODE: ${{ inputs.publish_package_sync }}
          SYNC_REPO: ${{ needs.context.outputs.swift_sync_repo }}
        run: |
          set -euo pipefail
          publish=false
          reason=""
          if [[ -z "$GH_TOKEN" ]]; then
            reason="package_sync_token_missing"
          elif ! gh repo view "$SYNC_REPO" >/dev/null 2>&1; then
            reason="sync_repo_missing_or_inaccessible"
          else
            publish=true
            reason="enabled"
          fi
          if [[ "$MODE" == "require" && "$publish" != "true" ]]; then
            echo "::error::Swift package-sync publishing required but ${reason}"
            exit 1
          fi
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"

      - name: Checkout validation source
        if: steps.probe.outputs.publish == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.context.outputs.release_tag }}
          path: source
          persist-credentials: false

      - name: Download Swift package-sync inputs
        if: steps.probe.outputs.publish == 'true'
        uses: actions/download-artifact@v4
        with:
          name: swift-package-sync-inputs
          path: source/bindings/swift

      - name: Checkout Swift package-sync repository
        if: steps.probe.outputs.publish == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.context.outputs.swift_sync_repo }}
          token: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
          ref: main
          path: swift-sync
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Prepare Swift package-sync tag
        if: steps.probe.outputs.publish == 'true'
        id: sync-prepare
        env:
          PRE_VERSION: ${{ needs.context.outputs.pre_release_version }}
          SYNC_REPO: ${{ needs.context.outputs.swift_sync_repo }}
          SOURCE_REPO: ${{ needs.context.outputs.repository }}
          SOURCE_SHA: ${{ needs.prepare-validation-source.outputs.validation_sha }}
          SOURCE_TAG: ${{ needs.context.outputs.release_tag }}
        run: |
          set -euo pipefail
          sync_tag="v${PRE_VERSION}"
          if git -C swift-sync rev-parse -q --verify "refs/tags/${sync_tag}" >/dev/null 2>&1; then
            git -C swift-sync checkout --detach "refs/tags/${sync_tag}"
            python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path("swift-sync/release-metadata.json").read_text())
          expected = {
              "version": os.environ["PRE_VERSION"],
              "source_repository": f"https://github.com/{os.environ['SOURCE_REPO']}",
              "source_tag": os.environ["SOURCE_TAG"],
              "source_sha": os.environ["SOURCE_SHA"],
              "prerelease": True,
          }
          mismatches = {
              key: (metadata.get(key), value)
              for key, value in expected.items()
              if metadata.get(key) != value
          }
          if mismatches:
              raise SystemExit(f"existing Swift package-sync tag metadata mismatch: {mismatches}")
          PY
            tag_checksum=$(python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          text = Path("swift-sync/Package.swift").read_text()
          assignments = {
              "release tag": (
                  r'let releaseTag = env\["ACTR_BINARY_TAG"\] \?\? "([^"]+)"',
                  f"v{os.environ['PRE_VERSION']}",
              ),
              "remote binary URL": (
                  r'let remoteBinaryURL = "([^"]+)"',
                  f"https://github.com/{os.environ['SYNC_REPO']}/releases/download/\\(releaseTag)/ActrFFI.xcframework.zip",
              ),
              "remote binary checksum": (
                  r'let remoteBinaryChecksum = env\["ACTR_BINARY_CHECKSUM"\] \?\? "([^"]+)"',
                  None,
              ),
          }
          values = {}
          for label, (pattern, expected) in assignments.items():
              matches = re.findall(pattern, text)
              if len(matches) != 1:
                  raise SystemExit(
                      f"expected exactly one existing {label} assignment, found {len(matches)}"
                  )
              values[label] = matches[0]
              if expected is not None and matches[0] != expected:
                  raise SystemExit(
                      f"existing Swift {label} mismatch: expected {expected}, got {matches[0]}"
                  )
          checksum = values["remote binary checksum"]
          if not re.fullmatch(r"[0-9a-f]{64}", checksum):
              raise SystemExit(f"invalid existing Swift package-sync checksum: {checksum}")
          print(checksum)
          PY
            )
            echo "push_tag=false" >> "$GITHUB_OUTPUT"
            echo "tag_checksum=${tag_checksum}" >> "$GITHUB_OUTPUT"
            echo "Reusing immutable Swift package-sync tag ${sync_tag}"
          else
            mkdir -p swift-sync/Sources
            rsync -a --delete source/bindings/swift/Sources/ swift-sync/Sources/
            rsync -a --delete source/bindings/swift/dist/ActrBindings/ swift-sync/ActrBindings/
            rsync -a --delete \
              source/bindings/swift/dist/ActrFFI.xcframework/ \
              swift-sync/ActrFFI.xcframework/

            # This executes the sync repository's Package.swift without exposing
            # PACKAGE_SYNC_GITHUB_TOKEN to the manifest process.
            (
              cd swift-sync
              ACTR_BINDINGS_PATH=ActrBindings \
              ACTR_BINARY_PATH=ActrFFI.xcframework \
              swift build
            )
            rm -rf swift-sync/ActrFFI.xcframework

            checksum=$(python3 - <<'PY'
          from pathlib import Path

          text = Path("source/bindings/swift/dist/release.txt").read_text()
          for line in text.splitlines():
              if line.startswith("SHA256 checksum:"):
                  print(line.split(":", 1)[1].strip())
                  break
          else:
              raise SystemExit("checksum not found")
          PY
            )
            [[ "$checksum" =~ ^[0-9a-f]{64}$ ]] || {
              echo "::error::Invalid generated Swift package checksum: ${checksum}"
              exit 1
            }

            python3 - "$checksum" <<'PY'
          from __future__ import annotations

          import os
          import re
          import sys
          from pathlib import Path

          checksum = sys.argv[1]
          version = os.environ["PRE_VERSION"]
          repo = os.environ["SYNC_REPO"]
          path = Path("swift-sync/Package.swift")
          text = path.read_text()


          def replace_exactly_once(pattern: str, replacement: str, label: str) -> None:
              global text
              text, count = re.subn(pattern, lambda _: replacement, text)
              if count != 1:
                  raise SystemExit(
                      f"expected exactly one {label} assignment in Package.swift, found {count}"
                  )


          replace_exactly_once(
              r'let releaseTag = env\["ACTR_BINARY_TAG"\] \?\? "v[^"]+"',
              f'let releaseTag = env["ACTR_BINARY_TAG"] ?? "v{version}"',
              "release tag",
          )
          replace_exactly_once(
              r'let remoteBinaryURL = "https://github\.com/[^"]+/ActrFFI\.xcframework\.zip"',
              f'let remoteBinaryURL = "https://github.com/{repo}/releases/download/\\(releaseTag)/ActrFFI.xcframework.zip"',
              "remote binary URL",
          )
          replace_exactly_once(
              r'let remoteBinaryChecksum = env\["ACTR_BINARY_CHECKSUM"\] \?\? "[^"]+"',
              f'let remoteBinaryChecksum = env["ACTR_BINARY_CHECKSUM"] ?? "{checksum}"',
              "remote binary checksum",
          )
          path.write_text(text)
          PY

            python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          payload = {
              "version": os.environ["PRE_VERSION"],
              "source_repository": f"https://github.com/{os.environ['SOURCE_REPO']}",
              "source_tag": os.environ["SOURCE_TAG"],
              "source_sha": os.environ["SOURCE_SHA"],
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "prerelease": True,
          }
          Path("swift-sync/release-metadata.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY

            (
              cd swift-sync
              git checkout --detach HEAD
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add Package.swift Sources ActrBindings release-metadata.json
              git commit -m "chore(release): publish ${sync_tag}"
              git tag "$sync_tag"
            )
            echo "push_tag=true" >> "$GITHUB_OUTPUT"
            echo "tag_checksum=${checksum}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload prepared Swift package-sync tree
        if: steps.probe.outputs.publish == 'true' && steps.sync-prepare.outputs.push_tag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: swift-package-sync-prepared
          path: |
            swift-sync/Package.swift
            swift-sync/Sources/
            swift-sync/ActrBindings/
            swift-sync/release-metadata.json
          if-no-files-found: error

  publish-swift-package-sync:
    name: Publish Swift package-sync prerelease
    if: inputs.publish_package_sync != 'never' && needs.prepare-swift-package-sync.outputs.publish == 'true'
    needs:
      - context
      - prepare-validation-source
      - rust-package-assets
      - typescript-native-assets
      - npm-package-assets
      - cli-assets
      - actrix-assets
      - protoc-plugin-assets
      - swift-package
      - kotlin-package
      - prepare-swift-package-sync
    runs-on: ubuntu-latest
    steps:
      - name: Download Swift package-sync inputs
        uses: actions/download-artifact@v4
        with:
          name: swift-package-sync-inputs
          path: swift-inputs

      - name: Download prepared Swift package-sync tree
        if: needs.prepare-swift-package-sync.outputs.push_tag == 'true'
        uses: actions/download-artifact@v4
        with:
          name: swift-package-sync-prepared
          path: swift-prepared

      - name: Checkout fresh Swift package-sync repository
        if: needs.prepare-swift-package-sync.outputs.push_tag == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.context.outputs.swift_sync_repo }}
          token: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
          ref: main
          path: swift-sync
          fetch-depth: 0
          persist-credentials: false

      - name: Create fresh Swift package-sync tag
        if: needs.prepare-swift-package-sync.outputs.push_tag == 'true'
        env:
          PRE_VERSION: ${{ needs.context.outputs.pre_release_version }}
        run: |
          set -euo pipefail
          sync_tag="v${PRE_VERSION}"
          test -f swift-prepared/Package.swift
          test ! -L swift-prepared/Package.swift
          test -f swift-prepared/release-metadata.json
          test ! -L swift-prepared/release-metadata.json
          test -z "$(find swift-prepared/Sources swift-prepared/ActrBindings -type l -print -quit)"
          rsync -a --delete swift-prepared/Sources/ swift-sync/Sources/
          rsync -a --delete swift-prepared/ActrBindings/ swift-sync/ActrBindings/
          cp swift-prepared/Package.swift swift-sync/Package.swift
          cp swift-prepared/release-metadata.json swift-sync/release-metadata.json
          (
            cd swift-sync
            git checkout --detach HEAD
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Package.swift Sources ActrBindings release-metadata.json
            git commit -m "chore(release): publish ${sync_tag}"
            git tag "$sync_tag"
          )

      - name: Publish Swift package-sync tag and release
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
          PRE_VERSION: ${{ needs.context.outputs.pre_release_version }}
          SYNC_REPO: ${{ needs.context.outputs.swift_sync_repo }}
          SOURCE_REPO: ${{ needs.context.outputs.repository }}
          SOURCE_SHA: ${{ needs.prepare-validation-source.outputs.validation_sha }}
          SOURCE_TAG: ${{ needs.context.outputs.release_tag }}
          PUSH_TAG: ${{ needs.prepare-swift-package-sync.outputs.push_tag }}
          TAG_CHECKSUM: ${{ needs.prepare-swift-package-sync.outputs.tag_checksum }}
        run: |
          set -euo pipefail
          sync_tag="v${PRE_VERSION}"
          local_asset=swift-inputs/dist/ActrFFI.xcframework.zip
          [[ "$TAG_CHECKSUM" =~ ^[0-9a-f]{64}$ ]] || {
            echo "::error::Invalid immutable Swift tag checksum: ${TAG_CHECKSUM}"
            exit 1
          }

          release_exists=false
          release_is_draft=false
          asset_exists=false
          asset_needs_clobber=false
          if gh release view "$sync_tag" --repo "$SYNC_REPO" >/dev/null 2>&1; then
            release_exists=true
            release_is_draft=$(gh release view "$sync_tag" \
              --repo "$SYNC_REPO" \
              --json isDraft \
              --jq .isDraft)
            if gh release view "$sync_tag" --repo "$SYNC_REPO" --json assets \
              --jq '.assets[].name' | grep -Fxq ActrFFI.xcframework.zip; then
              asset_exists=true
              remote_dir=$(mktemp -d)
              if gh release download "$sync_tag" \
                --repo "$SYNC_REPO" \
                --pattern ActrFFI.xcframework.zip \
                --dir "$remote_dir" \
                --clobber; then
                asset="$remote_dir/ActrFFI.xcframework.zip"
                remote_checksum=$(sha256sum "$asset" | awk '{print $1}')
                if [[ "$remote_checksum" != "$TAG_CHECKSUM" ]]; then
                  if [[ "$release_is_draft" == "true" ]]; then
                    echo "Replacing incomplete Swift draft asset with immutable tag bytes"
                    asset_exists=false
                    asset_needs_clobber=true
                  else
                    echo "::error::Published Swift asset checksum ${remote_checksum} does not match immutable tag checksum ${TAG_CHECKSUM}"
                    exit 1
                  fi
                fi
              elif [[ "$release_is_draft" == "true" ]]; then
                echo "Replacing unreadable Swift draft asset with immutable tag bytes"
                asset_exists=false
                asset_needs_clobber=true
              else
                echo "::error::Published Swift asset ActrFFI.xcframework.zip could not be downloaded"
                exit 1
              fi
            fi
          fi

          if [[ "$asset_exists" != "true" ]]; then
            asset="$local_asset"
            local_checksum=$(sha256sum "$asset" | awk '{print $1}')
            if [[ "$local_checksum" != "$TAG_CHECKSUM" ]]; then
              recovery_name="ActrFFI.xcframework.${TAG_CHECKSUM}.zip"
              recovery_dir=$(mktemp -d)
              if ! gh release download "$SOURCE_TAG" \
                --repo "$SOURCE_REPO" \
                --pattern "$recovery_name" \
                --dir "$recovery_dir" \
                --clobber; then
                echo "::error::Current Swift ZIP checksum ${local_checksum} differs from immutable tag ${TAG_CHECKSUM}, and recovery asset ${recovery_name} is unavailable"
                exit 1
              fi
              recovered_asset="$recovery_dir/ActrFFI.xcframework.zip"
              cp "$recovery_dir/$recovery_name" "$recovered_asset"
              asset="$recovered_asset"
              local_checksum=$(sha256sum "$asset" | awk '{print $1}')
            fi
            [[ "$local_checksum" == "$TAG_CHECKSUM" ]] || {
              echo "::error::Swift asset checksum ${local_checksum} does not match immutable tag checksum ${TAG_CHECKSUM}"
              exit 1
            }
          fi

          if [[ "$PUSH_TAG" == "true" ]]; then
            basic_auth=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')
            echo "::add-mask::${basic_auth}"
            git -C swift-sync \
              -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${basic_auth}" \
              push origin "refs/tags/${sync_tag}"
          fi

          cat > swift-release-notes.md <<EOF
          Source repository: https://github.com/${SOURCE_REPO}
          Source tag: ${SOURCE_TAG}
          Source sha: ${SOURCE_SHA}
          EOF
          if [[ "$release_exists" == "true" ]]; then
            if [[ "$asset_exists" != "true" ]]; then
              upload_args=(--repo "$SYNC_REPO")
              [[ "$asset_needs_clobber" == "true" ]] && upload_args+=(--clobber)
              gh release upload "$sync_tag" "$asset" "${upload_args[@]}"
            else
              echo "Reusing immutable Swift package-sync asset for ${sync_tag}"
            fi
            edit_args=(
              --repo "$SYNC_REPO"
              --title "$sync_tag"
              --notes-file swift-release-notes.md
              --prerelease
            )
            [[ "$release_is_draft" == "true" ]] && edit_args+=(--draft=false)
            gh release edit "$sync_tag" "${edit_args[@]}"
          else
            gh release create "$sync_tag" "$asset" \
              --repo "$SYNC_REPO" \
              --verify-tag \
              --title "$sync_tag" \
              --notes-file swift-release-notes.md \
              --prerelease
          fi

  publish-kotlin-package-sync:
    name: Publish Kotlin package-sync prerelease
    if: inputs.publish_package_sync != 'never'
    needs:
      - context
      - prepare-validation-source
      - rust-package-assets
      - typescript-native-assets
      - npm-package-assets
      - cli-assets
      - actrix-assets
      - protoc-plugin-assets
      - swift-package
      - kotlin-package
    runs-on: ubuntu-latest
    concurrency:
      group: release-asset-validation-kotlin-maven-${{ github.repository_owner }}
      cancel-in-progress: false
    steps:
      - name: Probe Kotlin package-sync publishing
        id: probe
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
          MODE: ${{ inputs.publish_package_sync }}
          SYNC_REPO: ${{ needs.context.outputs.kotlin_sync_repo }}
        run: |
          set -euo pipefail
          publish=false
          reason=""
          if [[ -z "$GH_TOKEN" ]]; then
            reason="package_sync_token_missing"
          elif ! gh repo view "$SYNC_REPO" >/dev/null 2>&1; then
            reason="sync_repo_missing_or_inaccessible"
          else
            publish=true
            reason="enabled"
          fi
          if [[ "$MODE" == "require" && "$publish" != "true" ]]; then
            echo "::error::Kotlin package-sync publishing required but ${reason}"
            exit 1
          fi
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"

      - name: Download Kotlin validation assets
        if: steps.probe.outputs.publish == 'true'
        uses: actions/download-artifact@v4
        with:
          name: kotlin-validation-assets
          path: kotlin-inputs

      - name: Download staged Kotlin Maven repository
        if: steps.probe.outputs.publish == 'true'
        uses: actions/download-artifact@v4
        with:
          name: kotlin-maven-staging
          path: kotlin-maven

      - name: Checkout Kotlin package-sync repository
        if: steps.probe.outputs.publish == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.context.outputs.kotlin_sync_repo }}
          token: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
          ref: main
          path: kotlin-sync
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Validate Kotlin package-sync inputs
        if: steps.probe.outputs.publish == 'true'
        env:
          PRE_VERSION: ${{ needs.context.outputs.pre_release_version }}
          SOURCE_REPO: ${{ needs.context.outputs.repository }}
          SOURCE_SHA: ${{ needs.prepare-validation-source.outputs.validation_sha }}
          SOURCE_TAG: ${{ needs.context.outputs.release_tag }}
        run: |
          set -euo pipefail
          test -z "$(find kotlin-inputs kotlin-maven -type l -print -quit)"
          test -f kotlin-inputs/actr-kotlin-release.aar
          test -f kotlin-inputs/actr-kotlin-release.aar.sha256
          test -f kotlin-inputs/actr-kotlin-native.zip
          test -f kotlin-inputs/actr-kotlin-native.zip.sha256
          (
            cd kotlin-inputs
            sha256sum -c actr-kotlin-release.aar.sha256
            sha256sum -c actr-kotlin-native.zip.sha256
          )

          staged_pom="kotlin-maven/io/actrium/actr/${PRE_VERSION}/actr-${PRE_VERSION}.pom"
          staged_aar="kotlin-maven/io/actrium/actr/${PRE_VERSION}/actr-${PRE_VERSION}.aar"
          staged_sources="kotlin-maven/io/actrium/actr/${PRE_VERSION}/actr-${PRE_VERSION}-sources.jar"
          staged_module="kotlin-maven/io/actrium/actr/${PRE_VERSION}/actr-${PRE_VERSION}.module"
          test -f "$staged_pom"
          test -f "$staged_aar"
          test -f "$staged_sources"
          test -f "$staged_module"
          cmp -s "$staged_aar" kotlin-inputs/actr-kotlin-release.aar || {
            echo "::error::Staged Maven AAR differs from the validation AAR"
            exit 1
          }

          python3 - "$staged_pom" kotlin-maven <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          import re
          import sys
          from pathlib import Path
          from xml.etree import ElementTree

          version = os.environ["PRE_VERSION"]
          root = ElementTree.parse(sys.argv[1]).getroot()
          actual_coordinate = (
              root.findtext("{*}groupId"),
              root.findtext("{*}artifactId"),
              root.findtext("{*}version"),
          )
          expected_coordinate = ("io.actrium", "actr", version)
          if actual_coordinate != expected_coordinate:
              raise SystemExit(
                  f"staged Maven coordinate mismatch: expected {expected_coordinate}, "
                  f"got {actual_coordinate}"
              )

          properties = root.find("{*}properties")
          actual_properties = (
              {}
              if properties is None
              else {child.tag.rsplit("}", 1)[-1]: child.text for child in properties}
          )
          expected_properties = {
              "actr.source.repository": os.environ["SOURCE_REPO"],
              "actr.source.tag": os.environ["SOURCE_TAG"],
              "actr.source.sha": os.environ["SOURCE_SHA"],
          }
          mismatches = {
              key: (actual_properties.get(key), value)
              for key, value in expected_properties.items()
              if actual_properties.get(key) != value
          }
          if mismatches:
              raise SystemExit(f"staged Maven provenance mismatch: {mismatches}")

          module_path = Path(sys.argv[1]).with_suffix(".module")
          module = json.loads(module_path.read_text())
          expected_component = {
              "group": "io.actrium",
              "module": "actr",
              "version": version,
          }
          component = module.get("component", {})
          component_mismatches = {
              key: (component.get(key), value)
              for key, value in expected_component.items()
              if component.get(key) != value
          }
          if component_mismatches:
              raise SystemExit(
                  f"staged Gradle module coordinate mismatch: "
                  f"{component_mismatches}"
              )

          staging = Path(sys.argv[2])
          checksum = r"(?:md5|sha1|sha256|sha512)"
          version_pattern = re.escape(version)
          allowed = re.compile(
              rf"^io/actrium/actr/(?:"
              rf"maven-metadata\.xml(?:\.{checksum})?"
              rf"|{version_pattern}/actr-{version_pattern}"
              rf"(?:\.(?:aar|pom|module)|-sources\.jar)(?:\.{checksum})?"
              rf")$"
          )
          files = sorted(path for path in staging.rglob("*") if path.is_file())
          unexpected = [
              path.relative_to(staging).as_posix()
              for path in files
              if not allowed.fullmatch(path.relative_to(staging).as_posix())
          ]
          if unexpected:
              raise SystemExit(f"unexpected staged Maven files: {unexpected}")
          if not files:
              raise SystemExit("staged Maven repository is empty")

          algorithms = {
              "md5": hashlib.md5,
              "sha1": hashlib.sha1,
              "sha256": hashlib.sha256,
              "sha512": hashlib.sha512,
          }
          for sidecar in files:
              algorithm = sidecar.suffix.removeprefix(".")
              if algorithm not in algorithms:
                  continue
              target = sidecar.with_suffix("")
              if not target.is_file():
                  raise SystemExit(f"checksum target is missing for {sidecar}")
              expected = algorithms[algorithm](target.read_bytes()).hexdigest()
              actual = sidecar.read_text().strip()
              if actual != expected:
                  raise SystemExit(
                      f"invalid {algorithm} checksum for "
                      f"{target.relative_to(staging)}: expected {expected}, got {actual}"
                  )
          PY

      - name: Publish Kotlin Maven package, tag, and release
        if: steps.probe.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_SYNC_GITHUB_TOKEN }}
          PRE_VERSION: ${{ needs.context.outputs.pre_release_version }}
          SYNC_REPO: ${{ needs.context.outputs.kotlin_sync_repo }}
          SOURCE_REPO: ${{ needs.context.outputs.repository }}
          SOURCE_SHA: ${{ needs.prepare-validation-source.outputs.validation_sha }}
          SOURCE_TAG: ${{ needs.context.outputs.release_tag }}
        run: |
          set -euo pipefail
          sync_tag="v${PRE_VERSION}"
          package_actor=$(gh api user --jq .login)
          maven_repo="${SYNC_REPO,,}"
          maven_base="https://maven.pkg.github.com/${maven_repo}/io/actrium/actr/${PRE_VERSION}/actr-${PRE_VERSION}"
          probe_dir=$(mktemp -d)

          validate_maven_pom() {
            PRE_VERSION="$PRE_VERSION" \
            SOURCE_REPO="$SOURCE_REPO" \
            SOURCE_TAG="$SOURCE_TAG" \
            SOURCE_SHA="$SOURCE_SHA" \
              python3 - "$1" <<'PY'
          from __future__ import annotations

          import os
          import sys
          from xml.etree import ElementTree

          root = ElementTree.parse(sys.argv[1]).getroot()
          actual_coordinate = (
              root.findtext("{*}groupId"),
              root.findtext("{*}artifactId"),
              root.findtext("{*}version"),
          )
          expected_coordinate = ("io.actrium", "actr", os.environ["PRE_VERSION"])
          if actual_coordinate != expected_coordinate:
              raise SystemExit(
                  f"existing Maven coordinate mismatch: expected {expected_coordinate}, "
                  f"got {actual_coordinate}"
              )

          properties = root.find("{*}properties")
          actual_properties = (
              {}
              if properties is None
              else {child.tag.rsplit("}", 1)[-1]: child.text for child in properties}
          )
          expected_properties = {
              "actr.source.repository": os.environ["SOURCE_REPO"],
              "actr.source.tag": os.environ["SOURCE_TAG"],
              "actr.source.sha": os.environ["SOURCE_SHA"],
          }
          mismatches = {
              key: (actual_properties.get(key), value)
              for key, value in expected_properties.items()
              if actual_properties.get(key) != value
          }
          if mismatches:
              raise SystemExit(f"existing Maven provenance mismatch: {mismatches}")
          PY
          }

          probe_maven() {
            local pom_status aar_status
            pom_status=$(curl --silent --show-error --location \
              --retry 3 --retry-all-errors --retry-delay 2 \
              --user "${package_actor}:${GH_TOKEN}" \
              --header 'Cache-Control: no-cache' \
              --output "$probe_dir/actr.pom" \
              --write-out '%{http_code}' \
              "${maven_base}.pom")
            aar_status=$(curl --silent --show-error --location \
              --retry 3 --retry-all-errors --retry-delay 2 \
              --user "${package_actor}:${GH_TOKEN}" \
              --header 'Cache-Control: no-cache' \
              --output "$probe_dir/actr.aar" \
              --write-out '%{http_code}' \
              "${maven_base}.aar")

            if [[ "$pom_status" == "200" ]]; then
              validate_maven_pom "$probe_dir/actr.pom"
            fi
            if [[ "$pom_status" == "200" && "$aar_status" == "200" ]]; then
              maven_probe_state=published
            elif [[ "$pom_status" == "404" && "$aar_status" == "404" ]]; then
              maven_probe_state=missing
            elif [[ "$pom_status" =~ ^(200|404)$ && "$aar_status" =~ ^(200|404)$ ]]; then
              maven_probe_state="partial:${pom_status}:${aar_status}"
            else
              maven_probe_state="inaccessible:${pom_status}:${aar_status}"
            fi
          }

          fetch_maven_file() {
            local relative_path=$1 destination=$2
            maven_http_status=$(curl --silent --show-error --location \
              --retry 3 --retry-all-errors --retry-delay 2 \
              --user "${package_actor}:${GH_TOKEN}" \
              --header 'Cache-Control: no-cache' \
              --output "$destination" \
              --write-out '%{http_code}' \
              "https://maven.pkg.github.com/${maven_repo}/${relative_path}")
          }

          upload_maven_file() {
            local source_file=$1 relative_path=$2 upload_status
            upload_status=$(curl --silent --show-error \
              --retry 3 --retry-all-errors --retry-delay 2 \
              --user "${package_actor}:${GH_TOKEN}" \
              --request PUT \
              --upload-file "$source_file" \
              --output "$probe_dir/upload-response" \
              --write-out '%{http_code}' \
              "https://maven.pkg.github.com/${maven_repo}/${relative_path}")
            case "$upload_status" in
              200|201|204) ;;
              *)
                echo "::error::Maven upload failed for ${relative_path} (HTTP ${upload_status})"
                exit 1
                ;;
            esac
          }

          wait_for_maven_file() {
            local relative_path=$1 destination=$2 attempt
            for attempt in {1..12}; do
              fetch_maven_file "$relative_path" "$destination"
              if [[ "$maven_http_status" == "200" ]]; then
                return
              fi
              [[ "$maven_http_status" == "404" ]] || {
                echo "::error::Maven probe failed for ${relative_path} (HTTP ${maven_http_status})"
                exit 1
              }
              echo "Waiting for Maven file ${relative_path} (attempt ${attempt})"
              sleep 5
            done
            echo "::error::Maven file ${relative_path} did not become visible"
            exit 1
          }

          reconcile_maven_checksums() {
            local canonical_file=$1 relative_path=$2
            local algorithms=${3:-"md5 sha1 sha256 sha512"} algorithm checksum
            local checksum_file checksum_path remote_checksum_file actual_checksum
            local checksum_verified attempt
            for algorithm in $algorithms; do
              case "$algorithm" in
                md5) checksum=$(md5sum "$canonical_file" | awk '{print $1}') ;;
                sha1) checksum=$(sha1sum "$canonical_file" | awk '{print $1}') ;;
                sha256) checksum=$(sha256sum "$canonical_file" | awk '{print $1}') ;;
                sha512) checksum=$(sha512sum "$canonical_file" | awk '{print $1}') ;;
              esac
              checksum_file="$probe_dir/$(basename "$relative_path").${algorithm}"
              checksum_path="${relative_path}.${algorithm}"
              remote_checksum_file="$probe_dir/remote-$(basename "$checksum_path")"
              printf '%s\n' "$checksum" > "$checksum_file"
              fetch_maven_file "$checksum_path" "$remote_checksum_file"
              checksum_verified=false
              case "$maven_http_status" in
                200)
                  actual_checksum=$(tr -d '[:space:]' < "$remote_checksum_file")
                  [[ "$actual_checksum" == "$checksum" ]] && checksum_verified=true
                  ;;
                404) ;;
                *)
                  echo "::error::Maven checksum probe failed for ${checksum_path} (HTTP ${maven_http_status})"
                  exit 1
                  ;;
              esac
              if [[ "$checksum_verified" != "true" ]]; then
                upload_maven_file "$checksum_file" "$checksum_path"
                for attempt in {1..12}; do
                  fetch_maven_file "$checksum_path" "$remote_checksum_file"
                  if [[ "$maven_http_status" == "200" ]]; then
                    actual_checksum=$(tr -d '[:space:]' < "$remote_checksum_file")
                    if [[ "$actual_checksum" == "$checksum" ]]; then
                      checksum_verified=true
                      break
                    fi
                  elif [[ "$maven_http_status" != "404" ]]; then
                    echo "::error::Maven checksum probe failed for ${checksum_path} (HTTP ${maven_http_status})"
                    exit 1
                  fi
                  echo "Waiting for Maven checksum ${checksum_path} (attempt ${attempt})"
                  sleep 5
                done
              fi
              [[ "$checksum_verified" == "true" ]] || {
                echo "::error::Maven checksum ${checksum_path} did not become consistent"
                exit 1
              }
            done
          }

          reconcile_maven_primary() {
            local staged_file=$1 relative_path canonical_file
            [[ -f "$staged_file" ]] || {
              echo "::error::Staged Maven primary is missing: ${staged_file}"
              return 1
            }
            relative_path=${staged_file#kotlin-maven/}
            canonical_file="$probe_dir/canonical-$(basename "$staged_file")"
            fetch_maven_file "$relative_path" "$canonical_file"
            case "$maven_http_status" in
              200) ;;
              404)
                upload_maven_file "$staged_file" "$relative_path"
                wait_for_maven_file "$relative_path" "$canonical_file"
                ;;
              *)
                echo "::error::Maven probe failed for ${relative_path} (HTTP ${maven_http_status})"
                exit 1
                ;;
            esac
            if [[ "$staged_file" == *.pom ]]; then
              validate_maven_pom "$canonical_file"
            fi
            reconcile_maven_checksums "$canonical_file" "$relative_path"
          }

          canonicalize_gradle_module() {
            local input_module=$1 canonical_aar=$2 canonical_sources=$3 output_module=$4 mode=$5
            PRE_VERSION="$PRE_VERSION" python3 - \
              "$input_module" "$canonical_aar" "$canonical_sources" "$output_module" "$mode" <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          import sys
          from pathlib import Path

          input_path, aar_path, sources_path, output_path = map(Path, sys.argv[1:5])
          mode = sys.argv[5]
          version = os.environ["PRE_VERSION"]
          module = json.loads(input_path.read_text())
          if not isinstance(module, dict) or module.get("formatVersion") != "1.1":
              raise SystemExit(
                  f"unsupported Gradle module formatVersion: "
                  f"{module.get('formatVersion') if isinstance(module, dict) else None}"
              )
          component = module.get("component", {})
          if not isinstance(component, dict):
              raise SystemExit("Gradle module component must be an object")
          expected_component = {
              "group": "io.actrium",
              "module": "actr",
              "version": version,
          }
          mismatches = {
              key: (component.get(key), value)
              for key, value in expected_component.items()
              if component.get(key) != value
          }
          if mismatches:
              raise SystemExit(f"Gradle module coordinate mismatch: {mismatches}")

          def expected_file(path: Path, name: str) -> dict[str, str | int]:
              payload = path.read_bytes()
              return {
                  "name": name,
                  "url": name,
                  "size": len(payload),
                  "sha512": hashlib.sha512(payload).hexdigest(),
                  "sha256": hashlib.sha256(payload).hexdigest(),
                  "sha1": hashlib.sha1(payload).hexdigest(),
                  "md5": hashlib.md5(payload).hexdigest(),
              }

          expected_files = {
              f"actr-{version}.aar": expected_file(
                  aar_path, f"actr-{version}.aar"
              ),
              f"actr-{version}-sources.jar": expected_file(
                  sources_path, f"actr-{version}-sources.jar"
              ),
          }
          seen_files: set[str] = set()
          variants = module.get("variants")
          if not isinstance(variants, list) or not variants:
              raise SystemExit("Gradle module variants must be a non-empty array")
          for variant in variants:
              if not isinstance(variant, dict):
                  raise SystemExit("Gradle module variant must be an object")
              files = variant.get("files", [])
              if not isinstance(files, list):
                  raise SystemExit("Gradle module variant files must be an array")
              for artifact in files:
                  if not isinstance(artifact, dict):
                      raise SystemExit("Gradle module artifact must be an object")
                  artifact_name = artifact.get("name")
                  expected = expected_files.get(artifact_name)
                  if expected is None or artifact.get("url") != expected["url"]:
                      raise SystemExit(f"unexpected Gradle module artifact: {artifact}")
                  seen_files.add(artifact_name)
                  if mode == "rewrite":
                      artifact.update(expected)
                  else:
                      file_mismatches = {
                          key: (artifact.get(key), value)
                          for key, value in expected.items()
                          if artifact.get(key) != value
                      }
                      if file_mismatches:
                          raise SystemExit(
                              f"Gradle module artifact metadata mismatch: {file_mismatches}"
                          )
          missing_files = sorted(set(expected_files) - seen_files)
          if missing_files:
              raise SystemExit(
                  f"Gradle module metadata is missing artifacts: {missing_files}"
              )
          output_path.write_text(json.dumps(module, indent=2) + "\n")
          PY
          }

          compare_gradle_modules() {
            python3 - "$1" "$2" <<'PY'
          import json
          import sys
          from pathlib import Path

          expected = json.loads(Path(sys.argv[1]).read_text())
          actual = json.loads(Path(sys.argv[2]).read_text())
          if actual != expected:
              raise SystemExit(
                  "published Gradle module semantics differ from the staged validation module"
              )
          PY
          }

          reconcile_gradle_module() {
            local staged_module="kotlin-maven/io/actrium/actr/${PRE_VERSION}/actr-${PRE_VERSION}.module"
            local relative_path=${staged_module#kotlin-maven/}
            local canonical_aar="$probe_dir/canonical-actr-${PRE_VERSION}.aar"
            local canonical_sources="$probe_dir/canonical-actr-${PRE_VERSION}-sources.jar"
            local expected_module="$probe_dir/expected-actr-${PRE_VERSION}.module"
            local canonical_module="$probe_dir/canonical-actr-${PRE_VERSION}.module"
            local remote_module="$probe_dir/remote-actr-${PRE_VERSION}.module"
            test -f "$staged_module"
            test -f "$canonical_aar"
            test -f "$canonical_sources"
            canonicalize_gradle_module \
              "$staged_module" "$canonical_aar" "$canonical_sources" \
              "$expected_module" rewrite
            fetch_maven_file "$relative_path" "$remote_module"
            case "$maven_http_status" in
              200)
                canonicalize_gradle_module \
                  "$remote_module" "$canonical_aar" "$canonical_sources" \
                  "$canonical_module" validate
                compare_gradle_modules "$expected_module" "$canonical_module"
                ;;
              404)
                upload_maven_file "$expected_module" "$relative_path"
                wait_for_maven_file "$relative_path" "$remote_module"
                canonicalize_gradle_module \
                  "$remote_module" "$canonical_aar" "$canonical_sources" \
                  "$canonical_module" validate
                compare_gradle_modules "$expected_module" "$canonical_module"
                ;;
              *)
                echo "::error::Gradle module probe failed for ${relative_path} (HTTP ${maven_http_status})"
                exit 1
                ;;
            esac
            reconcile_maven_checksums "$remote_module" "$relative_path"
          }

          ensure_maven_metadata() {
            local relative_path="io/actrium/actr/maven-metadata.xml"
            local staged_metadata="kotlin-maven/${relative_path}"
            local remote_metadata="$probe_dir/remote-maven-metadata.xml"
            local merged_metadata="$probe_dir/merged-maven-metadata.xml"
            local metadata_visible=false attempt
            test -f "$staged_metadata"
            fetch_maven_file "$relative_path" "$remote_metadata"
            case "$maven_http_status" in
              200) remote_input="$remote_metadata" ;;
              404) remote_input="" ;;
              *)
                echo "::error::Maven metadata probe failed (HTTP ${maven_http_status})"
                exit 1
                ;;
            esac

            PRE_VERSION="$PRE_VERSION" python3 - \
              "$remote_input" "$staged_metadata" "$merged_metadata" <<'PY'
          from __future__ import annotations

          import os
          import shutil
          import sys
          from datetime import datetime, timezone
          from pathlib import Path
          from xml.etree import ElementTree

          remote_path, staged_path, output_path = map(Path, sys.argv[1:])
          version = os.environ["PRE_VERSION"]
          source_path = remote_path if str(remote_path) and remote_path.is_file() else staged_path
          tree = ElementTree.parse(source_path)
          root = tree.getroot()
          namespace = root.tag.rsplit("}", 1)[0] + "}" if "}" in root.tag else ""

          def child(parent: ElementTree.Element, name: str) -> ElementTree.Element | None:
              return parent.find(f"{namespace}{name}")

          coordinate = (child(root, "groupId"), child(root, "artifactId"))
          actual_coordinate = tuple(item.text if item is not None else None for item in coordinate)
          if actual_coordinate != ("io.actrium", "actr"):
              raise SystemExit(f"Maven metadata coordinate mismatch: {actual_coordinate}")
          versioning = child(root, "versioning")
          if versioning is None:
              versioning = ElementTree.SubElement(root, f"{namespace}versioning")
          versions = child(versioning, "versions")
          if versions is None:
              versions = ElementTree.SubElement(versioning, f"{namespace}versions")
          existing_versions = [item.text for item in versions.findall(f"{namespace}version")]
          if version in existing_versions:
              shutil.copyfile(source_path, output_path)
          else:
              ElementTree.SubElement(versions, f"{namespace}version").text = version
              latest = child(versioning, "latest")
              if latest is None:
                  latest = ElementTree.SubElement(versioning, f"{namespace}latest")
              if not latest.text:
                  latest.text = version
              updated = child(versioning, "lastUpdated")
              if updated is None:
                  updated = ElementTree.SubElement(versioning, f"{namespace}lastUpdated")
              updated.text = datetime.now(timezone.utc).strftime("%Y%m%d%H%M%S")
              ElementTree.indent(tree, space="  ")
              tree.write(output_path, encoding="utf-8", xml_declaration=True)
          PY

            if [[ -z "$remote_input" ]] || ! cmp -s "$remote_metadata" "$merged_metadata"; then
              upload_maven_file "$merged_metadata" "$relative_path"
            fi

            for attempt in {1..12}; do
              fetch_maven_file "$relative_path" "$remote_metadata"
              if [[ "$maven_http_status" == "200" ]] && \
                PRE_VERSION="$PRE_VERSION" python3 - "$remote_metadata" <<'PY'
          import os
          import sys
          from xml.etree import ElementTree

          root = ElementTree.parse(sys.argv[1]).getroot()
          coordinate = (root.findtext("{*}groupId"), root.findtext("{*}artifactId"))
          versions = [item.text for item in root.findall("{*}versioning/{*}versions/{*}version")]
          raise SystemExit(
              0
              if coordinate == ("io.actrium", "actr")
              and os.environ["PRE_VERSION"] in versions
              else 1
          )
          PY
              then
                metadata_visible=true
                break
              fi
              echo "Waiting for Maven metadata to include ${PRE_VERSION} (attempt ${attempt})"
              sleep 5
            done
            [[ "$metadata_visible" == "true" ]] || {
              echo "::error::Published Maven metadata does not contain ${PRE_VERSION}"
              exit 1
            }
            reconcile_maven_checksums "$remote_metadata" "$relative_path" "md5 sha1"
          }

          probe_maven
          [[ "$maven_probe_state" != inaccessible:* ]] || {
            echo "::error::Maven package is inaccessible (${maven_probe_state})"
            exit 1
          }
          echo "Reconciling Maven package io.actrium:actr:${PRE_VERSION} from state ${maven_probe_state}"
          reconcile_maven_primary "kotlin-maven/io/actrium/actr/${PRE_VERSION}/actr-${PRE_VERSION}.aar"
          reconcile_maven_primary "kotlin-maven/io/actrium/actr/${PRE_VERSION}/actr-${PRE_VERSION}-sources.jar"
          reconcile_gradle_module
          reconcile_maven_primary "kotlin-maven/io/actrium/actr/${PRE_VERSION}/actr-${PRE_VERSION}.pom"
          ensure_maven_metadata
          probe_maven
          [[ "$maven_probe_state" == "published" ]] || {
            echo "::error::Maven package did not become complete; final state ${maven_probe_state}"
            exit 1
          }

          canonical_aar="$probe_dir/actr.aar"
          maven_aar_checksum=$(sha256sum "$canonical_aar" | awk '{print $1}')
          canonical_sources="$probe_dir/canonical-actr-${PRE_VERSION}-sources.jar"
          maven_sources_checksum=$(sha256sum "$canonical_sources" | awk '{print $1}')
          current_native_asset=kotlin-inputs/actr-kotlin-native.zip
          current_native_checksum=$(sha256sum "$current_native_asset" | awk '{print $1}')

          if git -C kotlin-sync rev-parse -q --verify "refs/tags/${sync_tag}" >/dev/null 2>&1; then
            git -C kotlin-sync checkout --detach "refs/tags/${sync_tag}"
            native_checksum=$(MAVEN_AAR_CHECKSUM="$maven_aar_checksum" \
              MAVEN_SOURCES_CHECKSUM="$maven_sources_checksum" python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          import re
          from pathlib import Path

          metadata = json.loads(Path("kotlin-sync/release-metadata.json").read_text())
          expected = {
              "version": os.environ["PRE_VERSION"],
              "source_repository": f"https://github.com/{os.environ['SOURCE_REPO']}",
              "source_tag": os.environ["SOURCE_TAG"],
              "source_sha": os.environ["SOURCE_SHA"],
              "coordinate": f"io.actrium:actr:{os.environ['PRE_VERSION']}",
              "android_abis": ["arm64-v8a", "x86_64"],
              "maven_aar_sha256": os.environ["MAVEN_AAR_CHECKSUM"],
              "maven_sources_sha256": os.environ["MAVEN_SOURCES_CHECKSUM"],
              "prerelease": True,
          }
          mismatches = {
              key: (metadata.get(key), value)
              for key, value in expected.items()
              if metadata.get(key) != value
          }
          if mismatches:
              raise SystemExit(f"existing Kotlin package-sync tag metadata mismatch: {mismatches}")
          native_checksum = metadata.get("native_zip_sha256", "")
          if not re.fullmatch(r"[0-9a-f]{64}", native_checksum):
              raise SystemExit(f"invalid Kotlin native ZIP checksum in tag: {native_checksum}")
          print(native_checksum)
          PY
            )
            push_tag=false
            echo "Reusing immutable Kotlin package-sync tag ${sync_tag}"
          else
            native_checksum="$current_native_checksum"
            MAVEN_AAR_CHECKSUM="$maven_aar_checksum" \
            MAVEN_SOURCES_CHECKSUM="$maven_sources_checksum" \
            NATIVE_ZIP_CHECKSUM="$native_checksum" \
              python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          payload = {
              "version": os.environ["PRE_VERSION"],
              "source_repository": f"https://github.com/{os.environ['SOURCE_REPO']}",
              "source_tag": os.environ["SOURCE_TAG"],
              "source_sha": os.environ["SOURCE_SHA"],
              "coordinate": f"io.actrium:actr:{os.environ['PRE_VERSION']}",
              "android_abis": ["arm64-v8a", "x86_64"],
              "maven_aar_sha256": os.environ["MAVEN_AAR_CHECKSUM"],
              "maven_sources_sha256": os.environ["MAVEN_SOURCES_CHECKSUM"],
              "native_zip_sha256": os.environ["NATIVE_ZIP_CHECKSUM"],
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "prerelease": True,
          }
          Path("kotlin-sync/release-metadata.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY
            (
              cd kotlin-sync
              git checkout --detach HEAD
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add release-metadata.json
              git commit -m "chore(release): publish ${sync_tag}"
              git tag "$sync_tag"
            )
            push_tag=true
          fi

          release_exists=false
          release_is_draft=false
          aar_exists=false
          native_exists=false
          aar_needs_clobber=false
          native_needs_clobber=false
          release_dir=$(mktemp -d)
          if gh release view "$sync_tag" --repo "$SYNC_REPO" >/dev/null 2>&1; then
            release_exists=true
            release_is_draft=$(gh release view "$sync_tag" \
              --repo "$SYNC_REPO" \
              --json isDraft \
              --jq .isDraft)
            release_assets=$(gh release view "$sync_tag" --repo "$SYNC_REPO" --json assets --jq '.assets[].name')
            if grep -Fxq actr-kotlin-release.aar <<<"$release_assets"; then
              aar_exists=true
              if gh release download "$sync_tag" \
                --repo "$SYNC_REPO" \
                --pattern actr-kotlin-release.aar \
                --dir "$release_dir" \
                --clobber; then
                if [[ "$(sha256sum "$release_dir/actr-kotlin-release.aar" | awk '{print $1}')" != "$maven_aar_checksum" ]]; then
                  if [[ "$release_is_draft" == "true" ]]; then
                    echo "Replacing incomplete Kotlin AAR draft asset with canonical Maven bytes"
                    aar_exists=false
                    aar_needs_clobber=true
                  else
                    echo "::error::Published Kotlin AAR differs from the canonical Maven AAR"
                    exit 1
                  fi
                fi
              elif [[ "$release_is_draft" == "true" ]]; then
                echo "Replacing unreadable Kotlin AAR draft asset with canonical Maven bytes"
                aar_exists=false
                aar_needs_clobber=true
              else
                echo "::error::Published Kotlin AAR could not be downloaded"
                exit 1
              fi
            fi
            if grep -Fxq actr-kotlin-native.zip <<<"$release_assets"; then
              native_exists=true
              if gh release download "$sync_tag" \
                --repo "$SYNC_REPO" \
                --pattern actr-kotlin-native.zip \
                --dir "$release_dir" \
                --clobber; then
                if [[ "$(sha256sum "$release_dir/actr-kotlin-native.zip" | awk '{print $1}')" != "$native_checksum" ]]; then
                  if [[ "$release_is_draft" == "true" ]]; then
                    echo "Replacing incomplete Kotlin native ZIP draft asset with immutable tag bytes"
                    native_exists=false
                    native_needs_clobber=true
                  else
                    echo "::error::Published Kotlin native ZIP differs from the immutable tag metadata"
                    exit 1
                  fi
                fi
              elif [[ "$release_is_draft" == "true" ]]; then
                echo "Replacing unreadable Kotlin native ZIP draft asset with immutable tag bytes"
                native_exists=false
                native_needs_clobber=true
              else
                echo "::error::Published Kotlin native ZIP could not be downloaded"
                exit 1
              fi
            fi
          fi

          canonical_dir=$(mktemp -d)
          aar_asset="$canonical_dir/actr-kotlin-release.aar"
          cp "$canonical_aar" "$aar_asset"
          if [[ "$native_exists" == "true" ]]; then
            native_asset="$release_dir/actr-kotlin-native.zip"
          elif [[ "$current_native_checksum" == "$native_checksum" ]]; then
            native_asset="$current_native_asset"
          else
            recovery_name="actr-kotlin-native.${native_checksum}.zip"
            if ! gh release download "$SOURCE_TAG" \
              --repo "$SOURCE_REPO" \
              --pattern "$recovery_name" \
              --dir "$canonical_dir" \
              --clobber; then
              echo "::error::Kotlin native ZIP recovery asset ${recovery_name} is unavailable"
              exit 1
            fi
            native_asset="$canonical_dir/actr-kotlin-native.zip"
            cp "$canonical_dir/$recovery_name" "$native_asset"
          fi
          [[ "$(sha256sum "$native_asset" | awk '{print $1}')" == "$native_checksum" ]] || {
            echo "::error::Kotlin native ZIP does not match immutable tag metadata"
            exit 1
          }

          if [[ "$push_tag" == "true" ]]; then
            basic_auth=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')
            echo "::add-mask::${basic_auth}"
            git -C kotlin-sync \
              -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${basic_auth}" \
              push origin "refs/tags/${sync_tag}"
          fi

          if [[ "$release_exists" == "true" ]]; then
            if [[ "$aar_exists" == "true" ]]; then
              echo "Reusing immutable Kotlin package-sync asset actr-kotlin-release.aar"
            else
              aar_upload_args=(--repo "$SYNC_REPO")
              [[ "$aar_needs_clobber" == "true" ]] && aar_upload_args+=(--clobber)
              gh release upload "$sync_tag" "$aar_asset" "${aar_upload_args[@]}"
            fi

            if [[ "$native_exists" == "true" ]]; then
              echo "Reusing immutable Kotlin package-sync asset actr-kotlin-native.zip"
            else
              native_upload_args=(--repo "$SYNC_REPO")
              [[ "$native_needs_clobber" == "true" ]] && native_upload_args+=(--clobber)
              gh release upload "$sync_tag" "$native_asset" "${native_upload_args[@]}"
            fi

            edit_args=(
              --repo "$SYNC_REPO"
              --title "$sync_tag"
              --notes-file kotlin-sync/release-metadata.json
              --prerelease
            )
            [[ "$release_is_draft" == "true" ]] && edit_args+=(--draft=false)
            gh release edit "$sync_tag" "${edit_args[@]}"
          else
            gh release create "$sync_tag" "$aar_asset" "$native_asset" \
              --repo "$SYNC_REPO" \
              --verify-tag \
              --title "$sync_tag" \
              --notes-file kotlin-sync/release-metadata.json \
              --prerelease
          fi

name: CI (Rust)

on:
  workflow_call:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PROTOC_VERSION: "29.3"
  # Fail the build if core/hyper/build.rs can't compile the wasm fixture
  # (missing wasm32-wasip2 / wasm-component-ld) rather than silently compiling
  # the fixture tests out — symmetric with ci-gate.yml.
  ACTR_REQUIRE_WASM_FIXTURE: "1"

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check

  # DynClib cannot consume `wit-bindgen c` output (it is wasm-targeted, not
  # portable C ABI), so its hand-written ABI lives in
  # core/framework/src/guest/dynclib_abi.rs. `wit-lint` is the drift guard that
  # keeps that file aligned with the WIT contract. Runs separately and
  # fast-fails before the heavier build / test jobs.
  wit-lint:
    name: WIT shape consistency
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: WIT <-> DynClib ABI drift check
        run: cargo run -p wit-lint --release

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # wasm32-wasip2 is required for the Component Model guest fixture
          # rebuilt by core/hyper/build.rs under --all-features (wasm-engine).
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      # Component Model toolchain:
      # - wasm-component-ld 0.5.22 is still required: the legacy async-lift
      #   fixture (tests/legacy_asynclift_guest, kept as a rejection sample)
      #   links the older async-ABI custom sections, and >= 0.5.22 is the
      #   first release that accepts them. The current sync-lift guests link
      #   fine with it too.
      # - wasm-tools 1.249 matches wasmtime 46's embedded validator, so
      #   `wasm-tools validate` agrees with the runtime on the async-lift
      #   rejection (diagnostic consistency) and for local inspection.
      - name: Install wasm Component Model toolchain
        run: |
          cargo install wasm-component-ld --version 0.5.22 --locked
          cargo install wasm-tools --version 1.249.0 --locked
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Build workspace
        run: cargo build --verbose --all-features
      - name: Build release
        run: cargo build --release --verbose --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      # Phase 1 Component Model toolchain — see `build` job for rationale.
      - name: Install wasm Component Model toolchain
        run: |
          cargo install wasm-component-ld --version 0.5.22 --locked
          cargo install wasm-tools --version 1.249.0 --locked
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Run tests
        run: cargo test --workspace --verbose --all-features

  dynclib-e2e:
    name: Dynclib E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - name: Run dynclib tests
        run: |
          set -euo pipefail
          # dynclib_actor_e2e tests serialise themselves via DYNCLIB_SERIAL,
          # so a single invocation is safe.
          cargo test -p actr-hyper --features dynclib-engine,test-utils --test dynclib_actor_e2e -- --nocapture

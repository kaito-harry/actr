[package]
name = "actr-sw-host"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Actor-RTC Service Worker host: Component Model bridge + runtime wiring"

[lints]
workspace = true

[lib]
crate-type = ["cdylib", "rlib"] # Build both WASM and Rust library outputs

[dependencies]
# Shared code
actr-web-common = { path = "../common" }
actr-protocol.workspace = true
actr-framework.workspace = true
actr-platform-traits.workspace = true
actr-platform-web = { path = "../platform-web" }

# Mailbox
actr-mailbox-web = { path = "../mailbox-web" }

# Package verification (replaces the old JS verifyActrPackage)
actr-pack = { path = "../../../../core/pack", version = "0.4.9" }
ed25519-dalek = "2"
base64 = "0.22"

# WASM bindings
wasm-bindgen.workspace = true
wasm-bindgen-futures.workspace = true
js-sys.workspace = true
serde-wasm-bindgen.workspace = true

# Web APIs (Service Worker environment)
web-sys = { workspace = true, features = [
    "console",
    "MessageEvent",
    "ExtendableMessageEvent",
    "MessagePort",
    "MessageChannel",
    "WebSocket",
    "BinaryType",
    "CloseEvent",
    "ErrorEvent",
    "WorkerGlobalScope",
    "ServiceWorkerGlobalScope",
] }

# IndexedDB (Mailbox persistence)
rexie.workspace = true
gloo-timers.workspace = true

# Async runtime
futures.workspace = true
async-trait.workspace = true

# Serialization
serde.workspace = true
serde_json.workspace = true

# Utilities
log.workspace = true
wasm-logger.workspace = true
console_error_panic_hook.workspace = true
thiserror.workspace = true
getrandom.workspace = true

# Data structures
bytes = "1.5"
parking_lot.workspace = true
dashmap.workspace = true


# Tracing + OpenTelemetry (for span context propagation)
tracing.workspace = true
opentelemetry.workspace = true
tracing-opentelemetry.workspace = true

[dev-dependencies]
wasm-bindgen-test = "0.3"
uuid.workspace = true

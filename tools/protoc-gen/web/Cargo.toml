[package]
name = "actr-web-protoc-codegen"
version = "0.4.5"
edition = "2024"
license = "Apache-2.0"
authors = ["kookyleo@gmail.com"]
repository = "https://github.com/Actrium/actr"
description = "Protoc plugin for generating actr-web code from protobuf definitions"
keywords = ["actor", "codegen", "protobuf", "wasm", "web"]
categories = ["development-tools", "development-tools::build-utils", "wasm"]

[lints]
workspace = true

[lib]
name = "actr_web_protoc_codegen"

[[bin]]
name = "protoc-gen-actr-web"
path = "src/main.rs"

[dependencies]
# Protobuf
prost.workspace = true
prost-types.workspace = true
prost-build.workspace = true
bytes.workspace = true

# Code generation
quote.workspace = true
proc-macro2.workspace = true
syn = { version = "2.0", features = ["full"] }
heck.workspace = true

# Template engine
handlebars = "5.1"

# Utilities
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror.workspace = true
anyhow = "1.0"
tracing = "0.1"
toml = "0.8"

[dev-dependencies]
tempfile = "3.0"
tracing-subscriber = "0.3"

# SPDX-License-Identifier: Apache-2.0
#
# actr build manifest for the Go echo workload.
#
# Compilation is driven by `build.sh` (wit-bindgen + patched Go), so this
# manifest does **not** declare a `[build]` section. Run packaging with:
#
#     ./build.sh                       # produce dist/echo-go-...wasm
#     actr build --no-compile -m manifest.toml
#                                      # pack the wasm into .actr
#
# Produces: dist/acme-EchoWorkloadGo-0.1.0-wasm32-wasip2.actr

edition = 1

[package]
name = "EchoWorkloadGo"
manufacturer = "acme"
version = "0.1.0"
description = "Go echo workload for the async actr:workload@0.2.0 Component Model ABI"
license = "Apache-2.0"

# ── Binary artifact ──────────────────────────────────────────────────────────
#
# `wasm32-wasip2` triggers BinaryKind::Component in actr_pack — the host loads
# this through `Component::from_binary` (Phase 1 Component Model rewrite).
[binary]
path = "dist/echo-go-0.1.0-wasm32-wasip2.wasm"
target = "wasm32-wasip2"

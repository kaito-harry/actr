[workspace]

[package]
name = "wasm-actor-fixture"
version = "0.1.0"
edition = "2021"

# cdylib is the correct crate-type for wasm32-wasip2 Component Model builds
# (wasm-component-ld links a cdylib into a Component).
#
# The SAME guest source is ALSO compiled natively by the M6 isomorphism suite
# (`dispatch_isomorphism.rs`), but via a `#[path]` module include rather than a
# crate dependency — this crate deliberately stays its own workspace (see
# `core/hyper/build.rs`), so it is never linked as an rlib dependency. On a
# native (non-wasm32, no `cdylib` feature) build the `entry!` macro expands to
# nothing, leaving only the plain `DoubleActor` / `DoubleDispatcher` types.
[lib]
crate-type = ["cdylib"]

[dependencies]
actr-framework = { path = "../../../../core/framework" }
actr-protocol = { path = "../../../../core/protocol" }
async-trait = "0.1"
bytes = "1.10"

# actr-framework's `entry!` macro references `#[cfg(feature = "cdylib")]`
# to select the native shared-library ABI. That feature lives on the
# framework crate, not the fixture; silencing the lint here keeps
# user-crate consumers from tripping on a framework-internal gate.
[lints.rust]
unexpected_cfgs = { level = "allow", check-cfg = ['cfg(feature, values("cdylib"))'] }

[profile.release]
opt-level = "s"

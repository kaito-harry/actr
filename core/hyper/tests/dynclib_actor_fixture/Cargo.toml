[workspace]

[package]
name = "dynclib-actor-fixture"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[features]
default = ["cdylib"]
cdylib = ["actr-framework/cdylib"]
web = []

[dependencies]
actr-framework = { path = "../../../../core/framework" }
actr-protocol = { path = "../../../../core/protocol" }
async-trait = "0.1"
bytes = "1.10"
tokio = { version = "1.48", features = ["time"] }
